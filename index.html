<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="color-scheme" content="dark" />
<meta name="theme-color" content="#050810" />
<title>Bolão FIFA 2026 — Premium</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@300;400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://unpkg.com/@babel/standalone@7.24.0/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
  :root {
    color-scheme: dark;
    --bg-0: #050810;
    --bg-1: #0a0f1c;
    --bg-2: #111828;
    --bg-3: #1a2238;
    --line: rgba(255,255,255,0.08);
    --line-strong: rgba(255,255,255,0.18);
    --text: #ecf0f8;
    --text-dim: #8a93a8;
    --text-muted: #5b6478;
    --gold: #d4af37;
    --gold-bright: #f4d35e;
    --gold-dim: #8b7320;
    --neon: #00f0ff;
    --neon-dim: #0099aa;
    --green: #00d68a;
    --red: #ff4d6d;
    --orange: #ff9f43;
    --purple: #a855f7;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  /* ===== FORÇA COR DOS INPUTS DE PLACAR EM TODOS OS CENÁRIOS ===== */
  /* Funciona mesmo com dark mode forçado do sistema/navegador/iOS */
  input.score-input,
  input.ko-score-input,
  input.bk-edit-score,
  input[type="number"].score-input,
  input[type="number"].ko-score-input,
  input[type="number"].bk-edit-score {
    color: #f4d35e !important;
    -webkit-text-fill-color: #f4d35e !important;
    background-color: rgba(0, 0, 0, 0.5) !important;
    background-image: none !important;
    -webkit-appearance: none !important;
    appearance: none !important;
    opacity: 1 !important;
    caret-color: #f4d35e !important;
    forced-color-adjust: none !important;
  }
  input.score-input:focus,
  input.ko-score-input:focus,
  input.bk-edit-score:focus {
    color: #f4d35e !important;
    -webkit-text-fill-color: #f4d35e !important;
    background-color: rgba(0, 0, 0, 0.7) !important;
  }
  /* Modo de alto contraste do Windows também */
  @media (forced-colors: active) {
    input.score-input,
    input.ko-score-input,
    input.bk-edit-score {
      color: #f4d35e !important;
      -webkit-text-fill-color: #f4d35e !important;
      forced-color-adjust: none !important;
    }
  }
  /* Para todos os inputs de número do app, garantir cor clara */
  input[type="number"] {
    color-scheme: dark;
  }
  /* ===== FIM regras forçadas ===== */

  html, body { background: var(--bg-0); color: var(--text); font-family: 'Manrope', sans-serif; min-height: 100vh; -webkit-font-smoothing: antialiased; }
  body {
    background:
      radial-gradient(ellipse 80% 50% at 50% -20%, rgba(212,175,55,0.12), transparent 60%),
      radial-gradient(ellipse 60% 50% at 100% 100%, rgba(0,240,255,0.06), transparent 60%),
      var(--bg-0);
    background-attachment: fixed;
  }

  /* Grain overlay */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence baseFrequency='0.9' numOctaves='2'/></filter><rect width='100%' height='100%' filter='url(%23n)' opacity='0.4'/></svg>");
    opacity: 0.025;
    pointer-events: none;
    z-index: 1000;
    mix-blend-mode: overlay;
  }

  button { font-family: inherit; cursor: pointer; border: 0; background: none; color: inherit; }
  input, select { font-family: inherit; color: inherit; }
  a { color: inherit; text-decoration: none; }

  .app { min-height: 100vh; }

  /* === HEADER === */
  .header {
    position: sticky; top: 0; z-index: 100;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    background: rgba(5,8,16,0.7);
    border-bottom: 1px solid var(--line);
  }
  .header-inner {
    max-width: 1400px; margin: 0 auto;
    padding: 14px 24px;
    display: flex; align-items: center; justify-content: space-between;
    gap: 16px;
  }
  .brand {
    display: flex; align-items: center; gap: 12px;
  }
  .brand-logo {
    width: 42px; height: 42px;
    background: linear-gradient(135deg, var(--gold) 0%, var(--gold-bright) 50%, var(--gold) 100%);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 24px rgba(212,175,55,0.4), inset 0 0 12px rgba(255,255,255,0.2);
    font-size: 22px;
  }
  .brand-text { display: flex; flex-direction: column; line-height: 1; }
  .brand-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px; letter-spacing: 1px;
    background: linear-gradient(180deg, #fff 0%, #aab1c5 100%);
    -webkit-background-clip: text; background-clip: text;
    color: transparent;
  }
  .brand-sub { font-size: 10px; letter-spacing: 3px; color: var(--gold); margin-top: 2px; text-transform: uppercase; }

  .header-nav { display: flex; gap: 4px; align-items: center; }
  .nav-btn {
    padding: 8px 14px; border-radius: 8px;
    font-size: 12px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase;
    color: var(--text-dim);
    transition: all 0.15s;
  }
  .nav-btn:hover { color: var(--text); background: rgba(255,255,255,0.04); }
  .nav-btn.active {
    color: var(--gold-bright);
    background: rgba(212,175,55,0.1);
    box-shadow: inset 0 0 0 1px rgba(212,175,55,0.3);
  }

  .header-user {
    display: flex; align-items: center; gap: 10px;
    padding: 6px 12px 6px 6px;
    background: rgba(255,255,255,0.04);
    border-radius: 24px;
    border: 1px solid var(--line);
  }
  .user-avatar {
    width: 30px; height: 30px; border-radius: 50%;
    background: linear-gradient(135deg, var(--neon), var(--purple));
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700;
  }
  .user-name { font-size: 13px; font-weight: 600; }
  .user-logout { font-size: 11px; color: var(--text-muted); padding: 0 4px; }
  .user-logout:hover { color: var(--red); }

  /* === MAIN LAYOUT === */
  .main { max-width: 1400px; margin: 0 auto; padding: 32px 24px 80px; }

  .page-header { margin-bottom: 28px; }
  .page-eyebrow {
    font-size: 11px; letter-spacing: 4px; text-transform: uppercase;
    color: var(--gold); font-weight: 700; margin-bottom: 8px;
  }
  .page-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(34px, 5vw, 56px);
    letter-spacing: 1px; line-height: 1;
  }
  .page-sub { color: var(--text-dim); margin-top: 8px; max-width: 600px; font-size: 14px; }

  /* === LOGIN / WELCOME === */
  .welcome {
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 32px 20px;
    position: relative;
  }
  .welcome::before {
    content: '';
    position: absolute; inset: 0;
    background:
      radial-gradient(circle at 30% 20%, rgba(212,175,55,0.15), transparent 50%),
      radial-gradient(circle at 70% 80%, rgba(0,240,255,0.08), transparent 50%);
    pointer-events: none;
  }
  .welcome-card {
    max-width: 460px; width: 100%;
    background: linear-gradient(180deg, rgba(26,34,56,0.7), rgba(10,15,28,0.9));
    border: 1px solid var(--line-strong);
    border-radius: 24px;
    padding: 40px 32px;
    box-shadow: 0 30px 80px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.08);
    position: relative; z-index: 1;
    backdrop-filter: blur(20px);
  }
  .welcome-trophy {
    width: 80px; height: 80px; margin: 0 auto 20px;
    background: linear-gradient(135deg, var(--gold) 0%, var(--gold-bright) 50%, var(--gold) 100%);
    border-radius: 20px;
    display: flex; align-items: center; justify-content: center;
    font-size: 42px;
    box-shadow: 0 20px 40px rgba(212,175,55,0.3), inset 0 0 20px rgba(255,255,255,0.2);
    animation: pulse-glow 3s ease-in-out infinite;
  }
  @keyframes pulse-glow {
    0%, 100% { box-shadow: 0 20px 40px rgba(212,175,55,0.3), inset 0 0 20px rgba(255,255,255,0.2); }
    50% { box-shadow: 0 20px 60px rgba(212,175,55,0.5), inset 0 0 30px rgba(255,255,255,0.3); }
  }
  .welcome-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 48px; letter-spacing: 1px; text-align: center; line-height: 0.95;
    background: linear-gradient(180deg, #fff, #c0c8dc);
    -webkit-background-clip: text; background-clip: text;
    color: transparent;
  }
  .welcome-sub {
    text-align: center; color: var(--gold); font-size: 11px; letter-spacing: 4px;
    margin-top: 8px; text-transform: uppercase; font-weight: 700;
  }
  .welcome-desc {
    text-align: center; color: var(--text-dim);
    font-size: 13px; margin-top: 16px; line-height: 1.6;
  }
  .welcome-form { margin-top: 32px; display: flex; flex-direction: column; gap: 14px; }

  .field-label {
    font-size: 11px; text-transform: uppercase; letter-spacing: 2px;
    color: var(--text-dim); font-weight: 700; margin-bottom: 6px;
  }
  .field-input {
    width: 100%;
    background: rgba(0,0,0,0.3);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 14px 16px;
    font-size: 15px;
    transition: all 0.15s;
  }
  .field-input:focus {
    outline: none;
    border-color: var(--gold);
    background: rgba(0,0,0,0.5);
    box-shadow: 0 0 0 3px rgba(212,175,55,0.1);
  }
  .field-input::placeholder { color: var(--text-muted); }

  .btn-primary {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, var(--gold) 0%, var(--gold-bright) 100%);
    color: #1a1100;
    font-weight: 800; font-size: 14px; letter-spacing: 2px;
    text-transform: uppercase;
    border-radius: 12px;
    transition: all 0.15s;
    box-shadow: 0 8px 20px rgba(212,175,55,0.2);
  }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 12px 28px rgba(212,175,55,0.4); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .btn-ghost {
    padding: 10px 18px;
    border-radius: 10px;
    color: var(--text-dim);
    font-weight: 600; font-size: 13px;
    transition: all 0.15s;
    border: 1px solid var(--line);
  }
  .btn-ghost:hover { color: var(--text); border-color: var(--line-strong); background: rgba(255,255,255,0.04); }

  .btn-secondary {
    padding: 12px 20px;
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--line-strong);
    border-radius: 10px;
    font-size: 13px; font-weight: 600;
    transition: all 0.15s;
  }
  .btn-secondary:hover { background: rgba(255,255,255,0.1); }

  .auth-toggle {
    margin-top: 18px; text-align: center; font-size: 12px; color: var(--text-muted);
  }
  .auth-toggle button { color: var(--gold); font-weight: 700; }

  .welcome-rules {
    margin-top: 26px;
    padding: 16px;
    background: rgba(0,0,0,0.3);
    border-radius: 12px;
    border: 1px solid var(--line);
  }
  .welcome-rules-title {
    font-size: 10px; text-transform: uppercase; letter-spacing: 3px;
    color: var(--gold); font-weight: 700; margin-bottom: 10px;
  }
  .welcome-rules-row {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 12px; padding: 4px 0;
    color: var(--text-dim);
  }
  .welcome-rules-row strong { color: var(--text); }

  /* === COUNTDOWN === */
  .countdown {
    display: flex; justify-content: center; gap: 8px;
    margin: 20px 0;
    flex-wrap: wrap;
  }
  .countdown-box {
    background: rgba(0,0,0,0.4);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 10px 14px;
    min-width: 60px;
    text-align: center;
  }
  .countdown-value {
    font-family: 'Space Mono', monospace;
    font-size: 22px; font-weight: 700;
    color: var(--gold-bright);
    line-height: 1;
  }
  .countdown-label {
    font-size: 9px; text-transform: uppercase; letter-spacing: 2px;
    color: var(--text-muted); margin-top: 4px;
  }

  /* === STATS CARDS === */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 14px;
    margin-bottom: 28px;
  }
  .stat-card {
    background: linear-gradient(180deg, rgba(26,34,56,0.5), rgba(10,15,28,0.5));
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 18px 20px;
    position: relative; overflow: hidden;
    transition: all 0.2s;
  }
  .stat-card:hover { border-color: var(--line-strong); transform: translateY(-2px); }
  .stat-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    opacity: 0.5;
  }
  .stat-label {
    font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
    color: var(--text-muted); font-weight: 700;
  }
  .stat-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 36px; line-height: 1; margin-top: 8px;
    color: var(--gold-bright);
  }
  .stat-meta { font-size: 11px; color: var(--text-dim); margin-top: 4px; }

  /* === MATCH CARDS === */
  .group-section { margin-bottom: 36px; }
  .group-header {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 14px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--line);
  }
  .group-badge {
    width: 36px; height: 36px; border-radius: 10px;
    background: linear-gradient(135deg, var(--bg-3), var(--bg-2));
    border: 1px solid var(--gold);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px; color: var(--gold-bright);
    box-shadow: inset 0 0 12px rgba(212,175,55,0.1);
  }
  .group-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px; letter-spacing: 1px;
  }
  .group-meta { font-size: 11px; color: var(--text-muted); margin-left: auto; }

  .match-list { display: flex; flex-direction: column; gap: 8px; }

  .match-card {
    background: linear-gradient(180deg, rgba(26,34,56,0.4), rgba(10,15,28,0.4));
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 14px 16px;
    display: grid;
    grid-template-columns: 90px 1fr auto 1fr;
    align-items: center; gap: 12px;
    transition: all 0.15s;
    position: relative;
  }
  .match-card:hover { border-color: var(--line-strong); }
  .match-card.locked {
    opacity: 0.55;
    background: rgba(10,15,28,0.6);
  }
  .match-card.locked::after {
    content: '🔒';
    position: absolute; top: 6px; right: 8px;
    font-size: 11px;
  }
  .match-date {
    font-size: 10px; line-height: 1.4;
    color: var(--text-dim);
  }
  .match-date strong { color: var(--gold); display: block; font-size: 11px; }
  .match-team {
    display: flex; align-items: center; gap: 10px;
    font-weight: 600; font-size: 14px;
  }
  .match-team.right { justify-content: flex-end; text-align: right; }
  .team-flag {
    width: 32px; height: 22px; border-radius: 3px;
    background-size: cover; background-position: center;
    border: 1px solid rgba(255,255,255,0.1);
    flex-shrink: 0;
    font-size: 18px;
    display: flex; align-items: center; justify-content: center;
    line-height: 1;
  }
  .team-name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .match-score {
    display: flex; align-items: center; gap: 6px;
  }
  .score-input {
    width: 42px; height: 42px;
    text-align: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px !important;
    font-weight: 700;
    background: rgba(0,0,0,0.4) !important;
    border: 1px solid var(--line);
    border-radius: 8px;
    transition: all 0.15s;
    color: #f4d35e !important;
    -webkit-text-fill-color: #f4d35e !important;
    caret-color: #f4d35e;
    text-shadow: 0 0 6px rgba(212,175,55,0.2);
  }
  .score-input::placeholder {
    color: rgba(255,255,255,0.25);
    -webkit-text-fill-color: rgba(255,255,255,0.25);
    font-size: 18px;
  }
  .score-input:focus {
    outline: none;
    border-color: var(--gold);
    background: rgba(0,0,0,0.6) !important;
    box-shadow: 0 0 0 3px rgba(212,175,55,0.1);
  }
  .score-input.filled {
    background: rgba(212,175,55,0.08) !important;
    border-color: rgba(212,175,55,0.4);
  }
  /* Remover setinhas de spinner do input number */
  .score-input::-webkit-outer-spin-button,
  .score-input::-webkit-inner-spin-button {
    -webkit-appearance: none;
    margin: 0;
  }
  .score-input[type=number] {
    -moz-appearance: textfield;
  }
  .score-sep { color: var(--text-muted); font-weight: 700; }

  /* === STANDINGS TABLE === */
  .standings {
    background: linear-gradient(180deg, rgba(26,34,56,0.5), rgba(10,15,28,0.5));
    border: 1px solid var(--line);
    border-radius: 14px;
    overflow: hidden;
    margin-top: 12px;
  }
  .standings-row {
    display: grid;
    grid-template-columns: 30px 2fr repeat(6, 30px);
    gap: 8px;
    padding: 10px 14px;
    align-items: center;
    font-size: 12px;
    border-bottom: 1px solid var(--line);
  }
  .standings-row:last-child { border-bottom: none; }
  .standings-row.head {
    font-size: 9px; letter-spacing: 2px; text-transform: uppercase;
    color: var(--text-muted); font-weight: 700;
    background: rgba(0,0,0,0.3);
  }
  .standings-row .pos {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px; color: var(--gold);
  }
  .standings-row.qualified { background: rgba(212,175,55,0.06); }
  .standings-row.qualified .pos { color: var(--gold-bright); }
  .standings-row.third { background: rgba(0,240,255,0.04); }
  .standings-row .num { text-align: center; font-family: 'Space Mono', monospace; }

  /* === BRACKET === */
  .bracket-wrap {
    overflow-x: auto;
    padding-bottom: 20px;
    -webkit-overflow-scrolling: touch;
  }
  .bracket {
    display: flex;
    gap: 24px;
    min-width: 1400px;
    padding: 20px 0;
  }
  .bracket-round {
    display: flex; flex-direction: column;
    justify-content: space-around;
    gap: 16px;
    flex: 1;
    min-width: 200px;
  }
  .bracket-round-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px; letter-spacing: 2px;
    color: var(--gold); text-align: center;
    margin-bottom: 8px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--line);
  }
  .bracket-match {
    background: rgba(26,34,56,0.6);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 10px;
    font-size: 12px;
    transition: all 0.15s;
  }
  .bracket-match:hover { border-color: var(--gold-dim); }
  .bracket-match.final-match {
    border-color: var(--gold);
    background: linear-gradient(180deg, rgba(212,175,55,0.1), rgba(26,34,56,0.6));
    box-shadow: 0 0 20px rgba(212,175,55,0.2);
  }
  .bracket-team {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 4px;
    border-radius: 6px;
  }
  .bracket-team.winner { background: rgba(212,175,55,0.1); color: var(--gold-bright); font-weight: 700; }
  .bracket-team .flag-mini { font-size: 14px; }
  .bracket-team .name { flex: 1; font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .bracket-team .score {
    font-family: 'Space Mono', monospace;
    font-weight: 700; min-width: 20px; text-align: center;
  }
  .bracket-team .score-edit {
    width: 28px; height: 24px; padding: 0;
    font-size: 13px;
  }
  .bracket-sep { height: 1px; background: var(--line); margin: 2px 0; }
  .bracket-label {
    font-size: 9px; text-transform: uppercase; letter-spacing: 1px;
    color: var(--text-muted); text-align: center; margin-top: 4px;
  }

  /* === RANKING === */
  .ranking-card {
    background: linear-gradient(180deg, rgba(26,34,56,0.6), rgba(10,15,28,0.6));
    border: 1px solid var(--line);
    border-radius: 16px;
    overflow: hidden;
  }
  .ranking-row {
    display: grid;
    grid-template-columns: 60px 1fr 100px 80px 80px;
    align-items: center;
    padding: 14px 20px;
    border-bottom: 1px solid var(--line);
    gap: 12px;
    transition: all 0.15s;
  }
  .ranking-row:last-child { border-bottom: none; }
  .ranking-row:hover { background: rgba(255,255,255,0.02); }
  .ranking-row.head {
    background: rgba(0,0,0,0.3);
    font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
    color: var(--text-muted); font-weight: 700;
  }
  .ranking-pos {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px; color: var(--text-dim);
    text-align: center;
  }
  .ranking-row.gold .ranking-pos { color: var(--gold-bright); text-shadow: 0 0 12px rgba(212,175,55,0.6); }
  .ranking-row.silver .ranking-pos { color: #c0c0c0; }
  .ranking-row.bronze .ranking-pos { color: #cd7f32; }
  .ranking-user {
    display: flex; align-items: center; gap: 12px;
  }
  .ranking-avatar {
    width: 36px; height: 36px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 14px;
    background: linear-gradient(135deg, var(--neon), var(--purple));
  }
  .ranking-name { font-weight: 600; font-size: 14px; }
  .ranking-meta { font-size: 11px; color: var(--text-muted); }
  .ranking-points {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px; color: var(--gold-bright);
    text-align: right;
  }
  .ranking-points .pts-suffix { font-size: 11px; color: var(--text-muted); font-family: 'Manrope'; margin-left: 4px; letter-spacing: 2px; }
  .ranking-stat { text-align: center; }
  .ranking-stat-value { font-family: 'Space Mono', monospace; font-weight: 700; }
  .ranking-stat-label { font-size: 9px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }

  /* === RULES SECTION (estilos abaixo, perto do final) === */

  /* === KNOCKOUT BRACKET (Interactive) === */
  .ko-phases-nav {
    display: flex;
    gap: 4px;
    overflow-x: auto;
    margin-bottom: 20px;
    padding-bottom: 4px;
    -webkit-overflow-scrolling: touch;
  }
  .ko-phase-btn {
    padding: 10px 16px;
    border-radius: 10px;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    font-weight: 700;
    color: var(--text-muted);
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--line);
    white-space: nowrap;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }
  .ko-phase-btn:hover { color: var(--text); border-color: var(--line-strong); }
  .ko-phase-btn.active {
    color: var(--gold-bright);
    background: rgba(212,175,55,0.1);
    border-color: var(--gold);
    box-shadow: 0 0 12px rgba(212,175,55,0.2);
  }
  .ko-phase-btn .badge-mini {
    background: rgba(255,255,255,0.08);
    border-radius: 100px;
    padding: 1px 8px;
    font-size: 10px;
    font-family: 'Space Mono', monospace;
  }
  .ko-phase-btn.active .badge-mini {
    background: rgba(212,175,55,0.2);
    color: var(--gold-bright);
  }
  .ko-phase-btn.done .badge-mini {
    background: rgba(0,214,138,0.2);
    color: var(--green);
  }

  /* Knockout match card - interactive */
  .ko-match {
    background: linear-gradient(180deg, rgba(26,34,56,0.6), rgba(10,15,28,0.7));
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 14px 16px;
    transition: all 0.15s;
    position: relative;
  }
  .ko-match.complete {
    border-color: rgba(0,214,138,0.3);
    background: linear-gradient(180deg, rgba(0,214,138,0.05), rgba(10,15,28,0.7));
  }
  .ko-match.locked {
    opacity: 0.6;
  }
  .ko-match.locked::after {
    content: '🔒';
    position: absolute; top: 8px; right: 12px;
    font-size: 12px;
  }
  .ko-match-header {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 10px; text-transform: uppercase; letter-spacing: 2px;
    color: var(--text-muted); font-weight: 700;
    margin-bottom: 10px;
    padding-bottom: 8px;
    border-bottom: 1px dashed var(--line);
  }
  .ko-match-header .ko-match-id {
    color: var(--gold);
    background: rgba(212,175,55,0.1);
    padding: 2px 8px;
    border-radius: 6px;
  }
  .ko-match-row {
    display: grid;
    grid-template-columns: 28px 1fr 50px;
    gap: 10px;
    align-items: center;
    padding: 8px 0;
  }
  .ko-team-flag {
    font-size: 20px;
    text-align: center;
  }
  .ko-team-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .ko-team-name.pending {
    color: var(--text-muted);
    font-style: italic;
    font-weight: 400;
  }
  .ko-team-name.winner {
    color: var(--gold-bright);
  }
  .ko-score-input {
    width: 56px; height: 42px;
    text-align: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 24px !important;
    font-weight: 700;
    background: rgba(0,0,0,0.5) !important;
    border: 1px solid rgba(212,175,55,0.4);
    border-radius: 8px;
    color: #f4d35e !important;
    -webkit-text-fill-color: #f4d35e !important;
    caret-color: #f4d35e;
    text-shadow: 0 0 8px rgba(212,175,55,0.3);
  }
  .ko-score-input::placeholder {
    color: rgba(255,255,255,0.3);
    -webkit-text-fill-color: rgba(255,255,255,0.3);
    font-size: 18px;
  }
  .ko-score-input:focus {
    outline: none;
    border-color: var(--gold);
    background: rgba(0,0,0,0.7) !important;
    box-shadow: 0 0 0 3px rgba(212,175,55,0.15);
  }
  .ko-score-input:disabled {
    opacity: 0.5;
  }
  /* Remover setinhas de spinner do input number */
  .ko-score-input::-webkit-outer-spin-button,
  .ko-score-input::-webkit-inner-spin-button {
    -webkit-appearance: none;
    margin: 0;
  }
  .ko-score-input[type=number] {
    -moz-appearance: textfield;
  }

  .ko-penalty-section {
    margin-top: 10px;
    padding: 12px;
    background: rgba(255,159,67,0.06);
    border: 1px dashed rgba(255,159,67,0.3);
    border-radius: 10px;
  }
  .ko-penalty-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--orange);
    font-weight: 700;
    margin-bottom: 10px;
    text-align: center;
  }
  .ko-tiebreak-mode {
    display: flex;
    gap: 4px;
    margin-bottom: 10px;
    background: rgba(0,0,0,0.3);
    padding: 4px;
    border-radius: 8px;
  }
  .ko-tiebreak-mode button {
    flex: 1;
    padding: 6px 8px;
    background: transparent;
    border: 0;
    border-radius: 6px;
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    font-weight: 700;
    color: var(--text-muted);
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
  }
  .ko-tiebreak-mode button.active {
    background: rgba(255,159,67,0.2);
    color: var(--orange);
    box-shadow: inset 0 0 0 1px rgba(255,159,67,0.4);
  }
  .ko-tiebreak-mode button:hover:not(.active):not(:disabled) {
    color: var(--text);
  }
  .ko-penalty-buttons {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
  }
  .ko-penalty-btn {
    padding: 8px 10px;
    background: rgba(0,0,0,0.3);
    border: 1px solid var(--line);
    border-radius: 6px;
    font-size: 11px;
    font-weight: 600;
    color: var(--text);
    display: flex; align-items: center; gap: 6px;
    justify-content: center;
    transition: all 0.15s;
  }
  .ko-penalty-btn:hover { border-color: var(--gold-dim); }
  .ko-penalty-btn.selected {
    background: rgba(212,175,55,0.15);
    border-color: var(--gold);
    color: var(--gold-bright);
  }
  .ko-penalty-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  .ko-winner-tag {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-top: 8px;
    padding: 5px 10px;
    background: rgba(0,214,138,0.1);
    border: 1px solid rgba(0,214,138,0.3);
    border-radius: 100px;
    font-size: 11px;
    font-weight: 700;
    color: var(--green);
  }

  .ko-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 14px;
    margin-bottom: 20px;
  }

  .ko-progress {
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 12px 16px;
    margin-bottom: 16px;
    display: flex; align-items: center; gap: 12px;
    font-size: 12px;
  }
  .ko-progress-text { flex: 1; color: var(--text-dim); }
  .ko-progress-text strong { color: var(--gold-bright); }

  /* Trophy display for champion */
  .trophy-display {
    background: linear-gradient(180deg, rgba(212,175,55,0.15), rgba(212,175,55,0.05));
    border: 1px solid rgba(212,175,55,0.4);
    border-radius: 20px;
    padding: 30px 20px;
    text-align: center;
    margin: 20px 0;
    position: relative;
    overflow: hidden;
  }
  .trophy-display::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(circle at 50% 0%, rgba(244,211,94,0.2), transparent 60%);
    pointer-events: none;
  }
  .trophy-display .trophy-icon {
    font-size: 64px;
    margin-bottom: 10px;
    filter: drop-shadow(0 0 24px rgba(212,175,55,0.6));
    animation: pulse-glow 3s ease-in-out infinite;
  }
  .trophy-display .trophy-flag {
    font-size: 48px;
    margin: 12px 0;
  }
  .trophy-display .trophy-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 42px;
    letter-spacing: 2px;
    background: linear-gradient(180deg, var(--gold-bright), var(--gold));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    line-height: 1;
  }
  .trophy-display .trophy-label {
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--gold);
    text-transform: uppercase;
    font-weight: 700;
    margin-bottom: 8px;
  }
  .trophy-display .trophy-pending {
    color: var(--text-muted);
    font-style: italic;
  }

  /* Final showdown card */
  .final-showdown {
    background: linear-gradient(135deg, rgba(212,175,55,0.1), rgba(10,15,28,0.8));
    border: 2px solid var(--gold);
    border-radius: 18px;
    padding: 20px;
    box-shadow: 0 0 40px rgba(212,175,55,0.15);
    margin-bottom: 24px;
  }

  @media (max-width: 768px) {
    .ko-grid { grid-template-columns: 1fr; }
    .trophy-display .trophy-name { font-size: 32px; }
  }

  .rules-grid-old { display: none; }

  /* === BRACKET VISUAL (Champions League style) === */
  .bracket-toggle {
    display: inline-flex;
    background: rgba(0,0,0,0.3);
    border: 1px solid var(--line);
    border-radius: 100px;
    padding: 4px;
    gap: 2px;
    margin-bottom: 20px;
  }
  .bracket-toggle-btn {
    padding: 8px 16px;
    border-radius: 100px;
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    font-weight: 700;
    color: var(--text-muted);
    transition: all 0.15s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .bracket-toggle-btn.active {
    background: linear-gradient(135deg, var(--gold), var(--gold-bright));
    color: #1a1100;
  }
  .bracket-toggle-btn:not(.active):hover { color: var(--text); }

  /* Container do bracket */
  .bracket-canvas {
    background:
      radial-gradient(ellipse 60% 40% at 50% 50%, rgba(212,175,55,0.04), transparent 70%),
      linear-gradient(180deg, rgba(10,15,28,0.6), rgba(5,8,16,0.8));
    border: 1px solid var(--line);
    border-radius: 20px;
    padding: 24px 20px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    position: relative;
  }
  .bracket-canvas::before {
    content: '';
    position: absolute; inset: 0;
    background-image:
      radial-gradient(circle at 50% 50%, rgba(212,175,55,0.03) 1px, transparent 1px);
    background-size: 24px 24px;
    pointer-events: none;
    opacity: 0.4;
  }

  .bracket-tree {
    display: grid;
    grid-template-columns: repeat(7, minmax(180px, 1fr));
    gap: 10px;
    min-width: 1400px;
    position: relative;
    align-items: stretch;
    z-index: 1;
  }

  .bracket-col {
    display: flex;
    flex-direction: column;
    justify-content: space-around;
    gap: 8px;
    position: relative;
  }

  .bracket-col-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 13px;
    letter-spacing: 3px;
    color: var(--gold);
    text-align: center;
    margin-bottom: 14px;
    padding-bottom: 10px;
    border-bottom: 1px solid rgba(212,175,55,0.2);
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .bracket-col-title .col-points {
    font-family: 'Manrope', sans-serif;
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--text-muted);
    text-transform: uppercase;
    font-weight: 600;
  }

  /* Card de jogo no bracket */
  .bk-match {
    background: linear-gradient(180deg, rgba(26,34,56,0.7), rgba(10,15,28,0.85));
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 8px 10px;
    transition: all 0.2s;
    position: relative;
    cursor: pointer;
    min-height: 80px;
  }
  .bk-match::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
    opacity: 0;
    transition: opacity 0.15s;
  }
  .bk-match:hover {
    border-color: var(--gold);
    transform: translateY(-1px);
    box-shadow: 0 6px 16px rgba(0,0,0,0.4), 0 0 0 1px rgba(212,175,55,0.2);
  }
  .bk-match:hover::before { opacity: 1; }

  .bk-match.complete {
    border-color: rgba(0,214,138,0.3);
    background: linear-gradient(180deg, rgba(0,214,138,0.05), rgba(10,15,28,0.85));
  }
  .bk-match.editing {
    border-color: var(--gold);
    box-shadow: 0 0 0 2px rgba(212,175,55,0.3), 0 8px 24px rgba(212,175,55,0.15);
  }
  .bk-match.locked { opacity: 0.5; }
  .bk-match.pending { opacity: 0.4; cursor: not-allowed; }

  .bk-match-id {
    position: absolute; top: 6px; right: 8px;
    font-size: 8px; letter-spacing: 1px;
    color: var(--text-muted);
    font-family: 'Space Mono', monospace;
  }

  .bk-team {
    display: grid;
    grid-template-columns: 18px 1fr 22px;
    gap: 6px;
    align-items: center;
    padding: 4px 2px;
    font-size: 11px;
    border-radius: 4px;
  }
  .bk-team + .bk-team {
    border-top: 1px dashed rgba(255,255,255,0.06);
    margin-top: 2px;
    padding-top: 6px;
  }
  .bk-team .flag-mini { font-size: 14px; line-height: 1; }
  .bk-team .nm {
    font-size: 11px;
    font-weight: 600;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    color: var(--text);
  }
  .bk-team .nm.pending {
    color: var(--text-muted);
    font-style: italic;
    font-weight: 400;
    font-size: 10px;
  }
  .bk-team .sc {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 14px; font-weight: 700;
    color: var(--gold-bright);
    text-align: center;
    background: rgba(0,0,0,0.4);
    border-radius: 4px;
    padding: 1px 2px;
    line-height: 1.2;
    min-width: 20px;
  }
  .bk-team .sc.empty { color: var(--text-muted); }
  .bk-team.winner .nm { color: var(--gold-bright); font-weight: 700; }
  .bk-team.winner .sc {
    background: rgba(212,175,55,0.2);
    color: var(--gold-bright);
  }

  .bk-pen-indicator {
    position: absolute;
    bottom: 4px;
    left: 0; right: 0;
    text-align: center;
    font-size: 8px;
    letter-spacing: 1.5px;
    color: var(--orange);
    font-weight: 700;
    text-transform: uppercase;
  }

  /* Linhas conectoras entre jogos do bracket */
  .bk-connector {
    position: absolute;
    pointer-events: none;
  }
  .bk-connector-h {
    height: 1px;
    background: linear-gradient(90deg, rgba(212,175,55,0.5), rgba(212,175,55,0.2));
  }
  .bk-connector-v {
    width: 1px;
    background: rgba(212,175,55,0.3);
  }

  /* Coluna especial: 3º lugar (centro) */
  .bracket-3rd {
    margin-top: 28px;
    padding: 16px;
    background: linear-gradient(180deg, rgba(205,127,50,0.05), rgba(10,15,28,0.5));
    border: 1px dashed rgba(205,127,50,0.3);
    border-radius: 14px;
    max-width: 360px;
    margin-left: auto;
    margin-right: auto;
  }
  .bracket-3rd-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 14px;
    letter-spacing: 3px;
    text-align: center;
    color: #cd7f32;
    margin-bottom: 10px;
  }

  /* Final - coluna do meio destacada */
  .bracket-col.final-col .bk-match {
    background: linear-gradient(180deg, rgba(212,175,55,0.15), rgba(10,15,28,0.85));
    border-color: var(--gold);
    box-shadow: 0 0 24px rgba(212,175,55,0.15);
    min-height: 100px;
  }
  .bracket-col.final-col .bracket-col-title {
    color: var(--gold-bright);
    font-size: 16px;
    text-shadow: 0 0 12px rgba(212,175,55,0.4);
  }

  /* Modal de edição que aparece ao clicar em um jogo do bracket */
  .bk-edit-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    z-index: 200;
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
    animation: fadein 0.2s ease;
  }
  @keyframes fadein { from { opacity: 0; } to { opacity: 1; } }

  .bk-edit-modal {
    background: linear-gradient(180deg, rgba(26,34,56,0.95), rgba(10,15,28,0.98));
    border: 1px solid var(--gold);
    border-radius: 20px;
    padding: 28px;
    max-width: 440px;
    width: 100%;
    box-shadow: 0 30px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(212,175,55,0.2);
    animation: slidein 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    position: relative;
  }
  @keyframes slidein {
    from { opacity: 0; transform: translateY(20px) scale(0.96); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  .bk-edit-close {
    position: absolute; top: 14px; right: 14px;
    width: 30px; height: 30px;
    border-radius: 50%;
    background: rgba(255,255,255,0.08);
    color: var(--text-dim);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    transition: all 0.15s;
  }
  .bk-edit-close:hover { background: rgba(255,77,109,0.2); color: var(--red); }

  .bk-edit-eyebrow {
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--gold);
    text-transform: uppercase;
    font-weight: 700;
    text-align: center;
  }
  .bk-edit-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    letter-spacing: 2px;
    text-align: center;
    margin: 4px 0 4px;
  }
  .bk-edit-date {
    font-size: 11px;
    color: var(--text-dim);
    text-align: center;
    margin-bottom: 22px;
    letter-spacing: 1px;
  }

  .bk-edit-versus {
    display: grid;
    grid-template-columns: 1fr 50px 1fr;
    gap: 14px;
    align-items: center;
    margin-bottom: 18px;
  }
  .bk-edit-team {
    display: flex; flex-direction: column;
    align-items: center;
    text-align: center;
    gap: 8px;
  }
  .bk-edit-team .flag-big { font-size: 42px; line-height: 1; }
  .bk-edit-team .nm-big {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 1px;
    line-height: 1.1;
    color: var(--text);
  }
  .bk-edit-team .nm-big.winner-text {
    color: var(--gold-bright);
    text-shadow: 0 0 12px rgba(212,175,55,0.4);
  }
  .bk-edit-score {
    width: 100%;
    height: 60px;
    text-align: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 36px !important;
    background: rgba(0,0,0,0.5) !important;
    border: 2px solid rgba(212,175,55,0.4);
    border-radius: 12px;
    color: #f4d35e !important;
    -webkit-text-fill-color: #f4d35e !important;
    text-shadow: 0 0 12px rgba(212,175,55,0.3);
    caret-color: var(--gold);
  }

  constructor(props) {
    super(props);
    this.state = { hasError: false, error: null, info: null };
  }
  static getDerivedStateFromError(error) {
    return { hasError: true, error };
  }
  componentDidCatch(error, info) {
    console.error('🛑 ErrorBoundary capturou:', error, info);
    this.setState({ info });
  }
  render() {
    if (this.state.hasError) {
      const msg = this.state.error?.message || 'Erro desconhecido';
      const stack = this.state.error?.stack || '';
      return (
        <div style={{
          padding: 20, margin: 20, color: '#fca5a5',
          background: 'rgba(239,68,68,0.10)', border: '1px solid #ef4444', borderRadius: 8,

          <div style={{ marginBottom: 8 }}>
            <strong>Mensagem:</strong> {msg}
          </div>
          {stack && (
            <details>

              <pre style={{ background: 'rgba(0,0,0,0.3)', padding: 10, borderRadius: 4, overflow: 'auto', maxHeight: 300 }}>{stack}</pre>

          )}
          <div style={{ marginTop: 10 }}>
            <button
              onClick={() => this.setState({ hasError: false, error: null, info: null })}

        </div>

async function loadAllFromSupabase() {
  try {
    const [{ data: users, error: e1 }, { data: results, error: e2 }] = await Promise.all([
      sb.from('bolao_users').select('*'),
      sb.from('bolao_results').select('*').eq('id', 1).maybeSingle(),
    ]);
    if (e1) console.error('Erro ao carregar usuários:', e1);
    if (e2) console.error('Erro ao carregar resultados:', e2);

    const usersMap = {};
    (users || []).forEach(u => { usersMap[u.username] = userFromRow(u); });
    return {
      users: usersMap,
      results: resultsFromRow(results),
      currentUser: localStorage.getItem(SESSION_KEY) || null,
    };
  } catch (err) {
    console.error('Erro Supabase:', err);
    return defaultStore();
  }
}

async function upsertUser(user) {
  const row = {
    username: user.username,
    name: user.name,
    whatsapp: user.whatsapp || '',
    password: user.password,
    paid: !!user.paid,
    is_admin: !!user.isAdmin,
    predictions: user.predictions || {},
    extras: user.extras || {},
    knockout: user.knockout || {},
    updated_at: new Date().toISOString(),
  };
  const { error } = await sb.from('bolao_users').upsert(row, { onConflict: 'username' });
  if (error) console.error('Erro ao salvar usuário:', error);
  return !error;
}

  return !error;

function calcStandings(predictions, group) {
  // From a user's match predictions, calculate group standings
  const teams = GROUPS[group];
  const table = teams.map(t => ({ team: t, p: 0, w: 0, d: 0, l: 0, gf: 0, ga: 0, gd: 0, pts: 0 }));
  const groupFixtures = FIXTURES.filter(f => f.group === group);

  groupFixtures.forEach(fix => {
    const pred = predictions?.[fix.id];
    if (!pred || pred.home === '' || pred.away === '') return;
    const h = parseInt(pred.home), a = parseInt(pred.away);
    if (isNaN(h) || isNaN(a)) return;
    const rowH = table.find(r => r.team === fix.home);
    const rowA = table.find(r => r.team === fix.away);
    if (!rowH || !rowA) return;
    rowH.p++; rowA.p++;
    rowH.gf += h; rowH.ga += a;
    rowA.gf += a; rowA.ga += h;
    if (h > a) { rowH.w++; rowH.pts += 3; rowA.l++; }
    else if (h < a) { rowA.w++; rowA.pts += 3; rowH.l++; }
    else { rowH.d++; rowA.d++; rowH.pts++; rowA.pts++; }
  });

  table.forEach(r => r.gd = r.gf - r.ga);
  table.sort((x, y) => y.pts - x.pts || y.gd - x.gd || y.gf - x.gf || x.team.localeCompare(y.team));
  return table;
}

function getQualifiedTeams(predictions) {
  // returns object: { firstPlaces: {A:..., B:...}, secondPlaces: {...}, thirdPlaces: [...] (sorted) }
  const firstPlaces = {}, secondPlaces = {}, thirdPlacesArr = [];
  Object.keys(GROUPS).forEach(g => {
    const t = calcStandings(predictions, g);
    firstPlaces[g] = t[0]?.team || '';
    secondPlaces[g] = t[1]?.team || '';
    if (t[2]) thirdPlacesArr.push({ group: g, ...t[2] });
  });
  // 8 best thirds by pts, gd, gf
  thirdPlacesArr.sort((x, y) => y.pts - x.pts || y.gd - x.gd || y.gf - x.gf);
  return { firstPlaces, secondPlaces, thirdPlaces: thirdPlacesArr.slice(0, 8) };
}

// =====================================================================
// BRACKET RESOLUTION — descobre os times de cada confronto do mata-mata
// =====================================================================

// Determina o vencedor de um jogo do mata-mata baseado em placar + pênaltis (se empate)
function getKnockoutWinner(matchData) {
  if (!matchData) return null;
  const a = parseInt(matchData.scoreA);
  const b = parseInt(matchData.scoreB);
  if (isNaN(a) || isNaN(b)) return null;
  if (a > b) return 'A';
  if (b > a) return 'B';
  // Empate -> precisa de pênalti
  if (matchData.penaltyWinner === 'A' || matchData.penaltyWinner === 'B') {
    return matchData.penaltyWinner;
  }
  return null;
}

// Resolve nome do time a partir de um "slot" (ex: "1A", "2C", "W:R32-1", "3A/B/C/D/F")
function resolveSlot(slot, qualified, knockout) {
  if (!slot) return null;
  // "1A" = primeiro colocado do grupo A
  if (/^1[A-L]$/.test(slot)) return qualified.firstPlaces[slot[1]] || null;
  // "2A" = segundo do A
  if (/^2[A-L]$/.test(slot)) return qualified.secondPlaces[slot[1]] || null;
  // "3X/Y/Z..." = melhor terceiro entre os grupos listados (que ainda não foi alocado)
  if (slot.startsWith('3')) {
    const allowed = slot.substring(1).split('/');
    // Pega o melhor terceiro elegível (já usado é registrado no escopo do resolveAllKnockout abaixo)
    for (const t of qualified.thirdPlaces) {
      if (allowed.includes(t.group)) return t.team;
    }
    return null;
  }
  // "W:R32-1" = vencedor do jogo R32-1
  if (slot.startsWith('W:')) {
    const matchId = slot.slice(2);
    const data = knockout[matchId];
    if (!data) return null;
    const w = getKnockoutWinner(data);
    if (!w) return null;
    return w === 'A' ? data.teamA : data.teamB;
  }
  // "L:SF-1" = perdedor da semi SF-1
  if (slot.startsWith('L:')) {
    const matchId = slot.slice(2);
    const data = knockout[matchId];
    if (!data) return null;
    const w = getKnockoutWinner(data);
    if (!w) return null;
    return w === 'A' ? data.teamB : data.teamA;
  }
  return null;
}

// Mapeamento dos 8 slots FIFA pros matchIdx do KO_STRUCTURE.R32 (todos lado 'b')
const FIFA_SLOTS_ORDER = [
  { slot: '1A', matchIdx: 10 },  // R32-11
  { slot: '1B', matchIdx: 14 },  // R32-15
  { slot: '1D', matchIdx: 6  },  // R32-7
  { slot: '1E', matchIdx: 0  },  // R32-1
  { slot: '1G', matchIdx: 7  },  // R32-8
  { slot: '1I', matchIdx: 1  },  // R32-2
  { slot: '1K', matchIdx: 15 },  // R32-16
  { slot: '1L', matchIdx: 11 },  // R32-12
];


// Retorna: { R32: [{id, teamA, teamB, ...userData}], R16: [...], ... }
function resolveAllKnockout(predictions, knockoutPicks) {
  const qualified = getQualifiedTeams(predictions);
  const knockout = { ...(knockoutPicks || {}) };

  // ===== ATRIBUIÇÃO DOS MELHORES TERCEIROS AOS SLOTS R32 =====
  // O FIFA tem uma tabela oficial complexa. Como cada slot R32 aceita terceiros
  // de grupos específicos, precisamos encontrar uma atribuição que aloque
  // TODOS os 8 terceiros classificados em slots válidos.
  // Algoritmo: backtracking. Para cada slot, tenta cada terceiro elegível ainda não usado.

  // 1) Coletar todos os slots R32 que aceitam um terceiro lugar e os grupos permitidos
  const thirdSlots = [];
  KO_STRUCTURE.R32.forEach((m, idx) => {
    if (m.a.startsWith('3')) thirdSlots.push({ matchIdx: idx, side: 'a', allowed: m.a.substring(1).split('/') });
    if (m.b.startsWith('3')) thirdSlots.push({ matchIdx: idx, side: 'b', allowed: m.b.substring(1).split('/') });
  });

  // 2) Mapear cada terceiro pelo seu grupo
  const thirdsByGroup = {};
  qualified.thirdPlaces.forEach(t => { thirdsByGroup[t.group] = t.team; });
  const availableGroups = Object.keys(thirdsByGroup);

  // 3) Atribuição: PRIMEIRO tenta a tabela OFICIAL FIFA (Anexo C, 495 combinações);
  //    se não achar, faz fallback pro backtracking.
  const assignment = {}; // matchIdx_side -> group

  if (availableGroups.length >= 8) {
    // Pega os 8 melhores terceiros (já vêm rankeados em qualified.thirdPlaces, top 8 primeiro)
    const top8Groups = qualified.thirdPlaces.slice(0, 8).map(t => t.group);
    const key = top8Groups.slice().sort().join('');
    const fifaEntry = FIFA_OFFICIAL_THIRDS_TABLE[key];
    if (fifaEntry && fifaEntry.length === 8) {
      // Usa a tabela oficial FIFA. Cada char é o grupo do terceiro pro slot na ordem FIFA_SLOTS_ORDER
      FIFA_SLOTS_ORDER.forEach((s, i) => {
        const g = fifaEntry[i];
        if (top8Groups.includes(g)) {
          assignment[`${s.matchIdx}_b`] = g;
        }
      });
    } else {
      // Fallback: backtracking (heurística MRV)
      const slotOptionsCount = thirdSlots.map(s => s.allowed.filter(g => availableGroups.includes(g)).length);
      const slotOrder = thirdSlots.map((_, i) => i).sort((a, b) => slotOptionsCount[a] - slotOptionsCount[b]);
      function tryAssign(orderIdx, usedGroups) {
        if (orderIdx === slotOrder.length) return true;
        const slotIdx = slotOrder[orderIdx];
        const slot = thirdSlots[slotIdx];
        for (const g of slot.allowed) {
          if (!availableGroups.includes(g)) continue;
          if (usedGroups.has(g)) continue;
          const k = `${slot.matchIdx}_${slot.side}`;
          assignment[k] = g;
          usedGroups.add(g);
          if (tryAssign(orderIdx + 1, usedGroups)) return true;
          usedGroups.delete(g);
          delete assignment[k];
        }
        return false;
      }
      tryAssign(0, new Set());
    }
  }

  // Função para resolver o slot do terceiro lugar usando a atribuição computada
  const getThirdForSlot = (matchIdx, side) => {
    const key = `${matchIdx}_${side}`;
    const group = assignment[key];
    return group ? thirdsByGroup[group] : null;
  };

  const out = {};
  KO_PHASE_ORDER.forEach(phase => {
    out[phase] = KO_STRUCTURE[phase].map((m, idx) => {
      let teamA, teamB;

      if (phase === 'R32') {
        if (m.a.startsWith('3')) teamA = getThirdForSlot(idx, 'a');
        else teamA = resolveSlot(m.a, qualified, knockout);

        if (m.b.startsWith('3')) teamB = getThirdForSlot(idx, 'b');
        else teamB = resolveSlot(m.b, qualified, knockout);
      } else {
        teamA = resolveSlot(m.a, qualified, knockout);
        teamB = resolveSlot(m.b, qualified, knockout);
      }

      const userData = knockout[m.id] || {};
      // Atualiza o objeto knockout em memória pra próxima fase ler corretamente
      // userData.teamA/teamB (override manual do admin) tem prioridade sobre o calculado
      knockout[m.id] = {
        teamA: userData.teamA || teamA || null,
        teamB: userData.teamB || teamB || null,
        scoreA: userData.scoreA ?? '',
        scoreB: userData.scoreB ?? '',
        penaltyWinner: userData.penaltyWinner || null,
        tiebreakMode: userData.tiebreakMode || null,
      };
      return {
        id: m.id,
        date: m.date,
        slotA: m.a,
        slotB: m.b,
        teamA: knockout[m.id].teamA,
        teamB: knockout[m.id].teamB,
        scoreA: knockout[m.id].scoreA,
        scoreB: knockout[m.id].scoreB,
        penaltyWinner: knockout[m.id].penaltyWinner,
        tiebreakMode: knockout[m.id].tiebreakMode,
        winner: getKnockoutWinner(knockout[m.id]),
        winnerTeam: (() => {
          const w = getKnockoutWinner(knockout[m.id]);
          if (!w) return null;
          return w === 'A' ? knockout[m.id].teamA : knockout[m.id].teamB;
        })(),
      };
    });
  });
  return out;
}

// =====================================================================
// BÔNUS POR SOBREVIVÊNCIA — pontos por acertar quem CHEGA em cada fase
// (independente do confronto). Recompensa "feeling" mesmo errando a chave.
// =====================================================================
const SURVIVAL_POINTS = {
  R16: 1,  // +1 pt por time que VOCÊ palpitou nas oitavas E ele chegou lá de fato
  QF:  2,  // +2 pts por time nas quartas
  SF:  3,  // +3 pts por time nas semifinais
  F:   5,  // +5 pts por time na final
};

// Retorna { R16: Set<times>, QF: Set<times>, SF: Set<times>, F: Set<times> }
// = quais times chegaram a cada fase (ou seja, são os "teamA" e "teamB" da fase seguinte ou os vencedores da própria fase)
function getSurvivorsByPhase(allKO) {
  // Times que CHEGAM a uma fase = times participantes daquela fase
  // Em R16: os 16 times que jogam as oitavas (vencedores de R32)
  // Em QF:  os 8 times que jogam as quartas (vencedores de R16)
  // Em SF:  os 4 times que jogam as semis (vencedores de QF)
  // Em F:   os 2 times que jogam a final (vencedores de SF)
  const out = { R16: new Set(), QF: new Set(), SF: new Set(), F: new Set() };
  ['R16', 'QF', 'SF', 'F'].forEach(phase => {
    (allKO[phase] || []).forEach(m => {
      if (m.teamA) out[phase].add(m.teamA);
      if (m.teamB) out[phase].add(m.teamB);
    });
  });
  return out;
}

// Calcula os pontos de bônus por sobrevivência do usuário
// e retorna detalhamento (quantos times acertou em cada fase)
function computeSurvivalBonus(userAllKO, realAllKO) {
  const userSurv = getSurvivorsByPhase(userAllKO);
  const realSurv = getSurvivorsByPhase(realAllKO);
  let totalPoints = 0;
  const breakdown = {};
  ['R16', 'QF', 'SF', 'F'].forEach(phase => {
    const matches = [...userSurv[phase]].filter(t => realSurv[phase].has(t));
    breakdown[phase] = {
      matched: matches.length,
      total: realSurv[phase].size,
      points: matches.length * SURVIVAL_POINTS[phase],
      pointsPerTeam: SURVIVAL_POINTS[phase],
      teams: matches,
    };
    totalPoints += breakdown[phase].points;
  });
  return { totalPoints, breakdown };
}

function computeUserPoints(user, results) {
  let points = 0;
  let stats = { exact: 0, winner: 0, totalGames: 0, koMatches: 0 };
  if (!user || !user.predictions) return { points, stats };

  // 1. Match results (fase de grupos)
  FIXTURES.forEach(fix => {
    const pred = user.predictions[fix.id];
    const real = results.matches[fix.id];
    if (!pred || !real || pred.home === '' || pred.away === '' || real.home === '' || real.away === '') return;
    if (real.home === undefined || real.away === undefined) return;
    stats.totalGames++;
    const ph = parseInt(pred.home), pa = parseInt(pred.away);
    const rh = parseInt(real.home), ra = parseInt(real.away);
    if (isNaN(ph) || isNaN(pa) || isNaN(rh) || isNaN(ra)) return;
    if (ph === rh && pa === ra) { points += 5; stats.exact++; }
    else {
      const pResult = ph > pa ? 'H' : ph < pa ? 'A' : 'D';
      const rResult = rh > ra ? 'H' : rh < ra ? 'A' : 'D';
      if (pResult === rResult) { points += 2; stats.winner++; }
    }
  });

  // 2. Group standings (positions) — calcula on-the-fly a partir dos resultados oficiais
  //    (antes dependia de results.standings que nunca é populado → bug de até -144pts/user)
  if (results.matches && Object.keys(results.matches).length > 0) {
    const officialStandings = {};
    const userStandings = {};
    Object.keys(GROUPS).forEach(g => {
      officialStandings[g] = calcStandings(results.matches, g).map(r => r.team);
      userStandings[g] = calcStandings(user.predictions, g).map(r => r.team);
    });
    Object.keys(GROUPS).forEach(g => {
      const real = officialStandings[g];
      const pred = userStandings[g];
      if (!real || real.length === 0) return;
      real.forEach((team, idx) => {
        if (pred?.[idx] === team) points += 3;
      });
    });
  }

  // 3. Knockout matches — acertou o confronto + bônus de placar/vencedor
  // SÓ pontua se houver pelo menos algum dado real de mata-mata oficial registrado
  const hasOfficialKnockout = results.knockout && Object.keys(results.knockout).some(k => {
    const m = results.knockout[k];
    return m && (m.scoreA !== '' && m.scoreA !== undefined && m.scoreA !== null);
  });
  if (hasOfficialKnockout) {
    const userKO = resolveAllKnockout(user.predictions, user.knockout || {});
    const realKO = resolveAllKnockout(
      results.matches ? Object.fromEntries(Object.entries(results.matches).map(([k,v])=>[k,{home:v.home,away:v.away}])) : {},
      results.knockout
    );
    stats.koExact = 0;
    stats.koWinner = 0;
    stats.koHalfMatches = 0;     // Acertou 1 dos 2 times
    stats.koSlotWinner = 0;
    stats.koSlotExact = 0;
    KO_PHASE_ORDER.forEach(phase => {
      const phaseInfo = KO_PHASE_INFO[phase];
      const phasePts = phaseInfo.points;
      const halfPoints = phaseInfo.halfPoints || 0;
      const winnerBonus = phaseInfo.winnerBonus || 0;
      const exactBonus = phaseInfo.exactBonus || 0;
      // Bônus de SLOT (errou times mas acertou padrão no mesmo slot do bracket)
      const slotWinnerBonus = phaseInfo.slotWinnerBonus || 0;
      const slotExactBonus = phaseInfo.slotExactBonus || 0;
      const userMatches = userKO[phase] || [];
      const realMatches = realKO[phase] || [];

      realMatches.forEach((rm, idx) => {
        const um = userMatches[idx];
        // Ambos os times do confronto real precisam estar definidos
        if (!um || !rm.teamA || !rm.teamB) return;
        if (!um.teamA || !um.teamB) return;

        // Só pontua se houver resultado oficial real para este jogo específico
        const realHasScore = rm.scoreA !== '' && rm.scoreA !== undefined && rm.scoreA !== null
                          && rm.scoreB !== '' && rm.scoreB !== undefined && rm.scoreB !== null;
        if (!realHasScore) return;

        // Quantos times o usuário acertou do confronto?
        const realPair = new Set([rm.teamA, rm.teamB]);
        const userPair = new Set([um.teamA, um.teamB]);
        const intersection = [...userPair].filter(t => realPair.has(t));
        const hitsCount = intersection.length; // 0, 1 ou 2

        const userHasScore = um.scoreA !== '' && um.scoreA !== undefined && um.scoreA !== null
                          && um.scoreB !== '' && um.scoreB !== undefined && um.scoreB !== null;

        if (hitsCount === 2) {
          // === NÍVEL 1: ACERTOU OS 2 TIMES ===
          points += phasePts;
          stats.koMatches++;

          if (!userHasScore) return;

          // Normaliza placares ao lado dos times
          const rTeamA = rm.teamA, rTeamB = rm.teamB;
          const rScoreA = parseInt(rm.scoreA), rScoreB = parseInt(rm.scoreB);
          let uScoreForRealA, uScoreForRealB;
          if (um.teamA === rTeamA && um.teamB === rTeamB) {
            uScoreForRealA = parseInt(um.scoreA);
            uScoreForRealB = parseInt(um.scoreB);
          } else if (um.teamA === rTeamB && um.teamB === rTeamA) {
            uScoreForRealA = parseInt(um.scoreB);
            uScoreForRealB = parseInt(um.scoreA);
          } else {
            return;
          }

          if (isNaN(uScoreForRealA) || isNaN(uScoreForRealB) || isNaN(rScoreA) || isNaN(rScoreB)) return;

          const uResult = uScoreForRealA > uScoreForRealB ? 'A' : uScoreForRealA < uScoreForRealB ? 'B' : (um.penaltyWinner || null);
          const rResult = rScoreA > rScoreB ? 'A' : rScoreA < rScoreB ? 'B' : (rm.penaltyWinner || null);

          if (rResult && uResult && uResult === rResult) {
            points += winnerBonus;
            stats.koWinner++;
          }
          if (uScoreForRealA === rScoreA && uScoreForRealB === rScoreB) {
            points += exactBonus;
            stats.koExact++;
          }
        } else if (hitsCount === 1) {
          // === NÍVEL 2: ACERTOU 1 DOS 2 TIMES (MEIO CONFRONTO) ===
          points += halfPoints;
          stats.koHalfMatches++;

          if (!userHasScore) return;

          const uA = parseInt(um.scoreA), uB = parseInt(um.scoreB);
          const rA = parseInt(rm.scoreA), rB = parseInt(rm.scoreB);
          if (isNaN(uA) || isNaN(uB) || isNaN(rA) || isNaN(rB)) return;

          // Determina o vencedor real (placar ou pênaltis)
          const rWinner = rA > rB ? 'A' : rA < rB ? 'B' : (rm.penaltyWinner || null);
          // Determina o vencedor palpitado (placar ou pênaltis)
          const uWinner = uA > uB ? 'A' : uA < uB ? 'B' : (um.penaltyWinner || null);

          // Bônus de vencedor (slot)
          if (rWinner && uWinner && rWinner === uWinner) {
            points += slotWinnerBonus;
            stats.koSlotWinner++;
          }
          // Bônus de placar exato (slot) — cumulativo com vencedor
          if (uA === rA && uB === rB) {
            points += slotExactBonus;
            stats.koSlotExact++;
          }
        } else {
          // === NÍVEL 3: ERROU OS 2 TIMES — só pode ganhar BÔNUS DE SLOT ===
          if (!userHasScore) return;

          const uA = parseInt(um.scoreA), uB = parseInt(um.scoreB);
          const rA = parseInt(rm.scoreA), rB = parseInt(rm.scoreB);
          if (isNaN(uA) || isNaN(uB) || isNaN(rA) || isNaN(rB)) return;

          const rWinner = rA > rB ? 'A' : rA < rB ? 'B' : (rm.penaltyWinner || null);
          const uWinner = uA > uB ? 'A' : uA < uB ? 'B' : (um.penaltyWinner || null);

          if (rWinner && uWinner && rWinner === uWinner) {
            points += slotWinnerBonus;
            stats.koSlotWinner++;
          }
          if (uA === rA && uB === rB) {
            points += slotExactBonus;
            stats.koSlotExact++;
          }
        }
      });
    });
  }

  // 3.5 — BÔNUS POR SOBREVIVÊNCIA: pontos por times que você palpitou em cada fase
  // independente da chave estar certa (só ativa se houver KO oficial lançado)
  // Bônus de sobrevivência só faz sentido quando há resultados das oitavas (R16) em diante
  // Se só há resultados dos 16-avos, o sistema propagaria vencedores artificialmente
  const hasR16Results = results.knockout && Object.keys(results.knockout).some(k => {
    const m = results.knockout[k];
    return k.startsWith('R16') && m && m.scoreA !== '' && m.scoreA !== undefined && m.scoreA !== null;
  });
  if (hasOfficialKnockout && hasR16Results) {
    const userAllKO = resolveAllKnockout(user.predictions, user.knockout || {});
    const realAllKO = resolveAllKnockout(
      results.matches ? Object.fromEntries(Object.entries(results.matches).map(([k,v])=>[k,{home:v.home,away:v.away}])) : {},
      results.knockout || {}
    );
    const survBonus = computeSurvivalBonus(userAllKO, realAllKO);
    points += survBonus.totalPoints;
    stats.survivalBonus = survBonus.totalPoints;
    stats.survivalBreakdown = survBonus.breakdown;
  }

  // 4. Final positions (só pontua se o admin já definiu o resultado oficial)
  const extras = user.extras || {};
  if (results.champion && extras.champion === results.champion) points += 25;
  if (results.vice && extras.vice === results.vice) points += 18;
  if (results.third && extras.third === results.third) points += 12;
  if (results.fourth && extras.fourth === results.fourth) points += 10;
  if (results.topScorer && extras.topScorer &&
      extras.topScorer.trim().toLowerCase() === results.topScorer.trim().toLowerCase()) points += 15;

  return { points, stats };
}

const fmtDateBR = (iso) => {
  const d = new Date(iso);
  const day = d.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit' });
  const time = d.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
  const weekday = d.toLocaleDateString('pt-BR', { weekday: 'short' });
  return { day, time, weekday: weekday.replace('.', '').toUpperCase() };
};

const isMatchLocked = (fixDate, globalDeadline = DEADLINE) => {
  // Como o prazo geral (10/06) acontece ANTES do início da Copa (11/06),
  // o bloqueio geral é suficiente — todos os jogos travam ao mesmo tempo.
  return Date.now() >= globalDeadline;
};

const slugify = (s) => s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').replace(/[^a-z0-9]+/g, '_').replace(/(^_|_$)/g, '');

const getInitials = (name) => name.trim().split(/\s+/).slice(0, 2).map(w => w[0]?.toUpperCase() || '').join('');

const getAvatarColor = (name) => {
  let hash = 0;
  for (let i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
  const hue = Math.abs(hash) % 360;
  return `linear-gradient(135deg, hsl(${hue},65%,55%), hsl(${(hue+60)%360},65%,55%))`;
};

// =====================================================================
// COUNTDOWN COMPONENT
// =====================================================================
function Countdown({ target }) {
  const [now, setNow] = useState(Date.now());
  useEffect(() => {
    const id = setInterval(() => setNow(Date.now()), 1000);
    return () => clearInterval(id);
  }, []);
  const diff = Math.max(0, target - now);
  const d = Math.floor(diff / (1000 * 60 * 60 * 24));
  const h = Math.floor((diff / (1000 * 60 * 60)) % 24);
  const m = Math.floor((diff / (1000 * 60)) % 60);
  const s = Math.floor((diff / 1000) % 60);
  if (diff <= 0) return <div style={{ color: 'var(--red)', textAlign: 'center', fontWeight: 700 }}>PRAZO ENCERRADO</div>;
  return (
    <div className="countdown">
      <div className="countdown-box"><div className="countdown-value">{String(d).padStart(2, '0')}</div><div className="countdown-label">Dias</div></div>
      <div className="countdown-box"><div className="countdown-value">{String(h).padStart(2, '0')}</div><div className="countdown-label">Hrs</div></div>
      <div className="countdown-box"><div className="countdown-value">{String(m).padStart(2, '0')}</div><div className="countdown-label">Min</div></div>
      <div className="countdown-box"><div className="countdown-value">{String(s).padStart(2, '0')}</div><div className="countdown-label">Seg</div></div>
    </div>
  );
}

function App() {
  const [store, setStore] = useState(defaultStore);
  const [loading, setLoading] = useState(true);
  const [page, setPage] = useState('palpites');
  const [toast, setToast] = useState(null);
  const [showSaveIndicator, setShowSaveIndicator] = useState(false);
  const saveTimeoutRef = useRef(null);

  // Carregamento inicial + Realtime
  useEffect(() => {
    let mounted = true;
    (async () => {
      const data = await loadAllFromSupabase();
      if (mounted) {
        setStore(data);
        setLoading(false);
      }
    })();

    // Subscriptions em tempo real — qualquer mudança no banco reflete na tela
    const channel = sb
      .channel('bolao_changes')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'bolao_users' }, async () => {
        const { data } = await sb.from('bolao_users').select('*');
        if (!mounted) return;
        const usersMap = {};
        (data || []).forEach(u => { usersMap[u.username] = userFromRow(u); });
        setStore(prev => ({ ...prev, users: usersMap }));
      })
      .on('postgres_changes', { event: '*', schema: 'public', table: 'bolao_results' }, async () => {
        const { data } = await sb.from('bolao_results').select('*').eq('id', 1).maybeSingle();
        if (!mounted) return;
        setStore(prev => ({ ...prev, results: resultsFromRow(data) }));
      })
      .subscribe();

    return () => {
      mounted = false;
      sb.removeChannel(channel);
    };
  }, []);

  const showToast = (msg, type = 'success') => {
    setToast({ msg, type });
    setTimeout(() => setToast(null), 2500);
  };

  const triggerSaveIndicator = () => {
    setShowSaveIndicator(true);
    if (saveTimeoutRef.current) clearTimeout(saveTimeoutRef.current);
    saveTimeoutRef.current = setTimeout(() => setShowSaveIndicator(false), 1500);
  };

  const currentUser = store.currentUser ? store.users[store.currentUser] : null;
  const isLoggedIn = !!currentUser;
  const isAdmin = currentUser?.isAdmin === true;

  // Login / Register
  const handleLogin = async (username, password) => {
    const u = username.trim().toLowerCase();
    if (u === 'admin' && password === ADMIN_PASSWORD) {
      let adminUser = store.users['admin'];
      if (!adminUser) {
        const newAdmin = {
          username: 'admin', name: 'Administrador', whatsapp: '',
          password: ADMIN_PASSWORD, paid: true, isAdmin: true,
          predictions: {}, extras: {},
        };
        await upsertUser(newAdmin);
        adminUser = newAdmin;
      } else if (!adminUser.isAdmin) {
        await upsertUser({ ...adminUser, isAdmin: true });
      }
      localStorage.setItem(SESSION_KEY, 'admin');
      setStore(prev => ({
        ...prev,
        users: { ...prev.users, admin: { ...(prev.users.admin || adminUser), isAdmin: true } },
        currentUser: 'admin',
      }));
      showToast('Bem-vindo, Admin');
      return true;
    }
    const user = store.users[u];
    if (!user) { showToast('Usuário não encontrado', 'error'); return false; }
    if (user.password !== password) { showToast('Senha incorreta', 'error'); return false; }
    localStorage.setItem(SESSION_KEY, u);
    setStore(prev => ({ ...prev, currentUser: u }));
    showToast(`Bem-vindo, ${user.name.split(' ')[0]}!`);
    return true;
  };

  const handleRegister = async ({ username, name, whatsapp, password }) => {
    const u = username.trim().toLowerCase();
    if (!u || !name || !password) { showToast('Preencha todos os campos', 'error'); return false; }
    if (u === 'admin') { showToast('Usuário reservado', 'error'); return false; }

    // Buscar versão fresca direto do banco pra evitar duplicidade
    const { data: existing } = await sb.from('bolao_users').select('username').eq('username', u).maybeSingle();
    if (existing) { showToast('Esse nome de usuário já existe', 'error'); return false; }

    const newUser = {
      username: u, name: name.trim(), whatsapp: whatsapp.trim(),
      password, paid: false, isAdmin: false,
      predictions: {}, extras: {},
      createdAt: Date.now(),
    };
    const ok = await upsertUser(newUser);
    if (!ok) { showToast('Erro ao criar conta. Tente novamente.', 'error'); return false; }
    localStorage.setItem(SESSION_KEY, u);
    setStore(prev => ({
      ...prev,
      users: { ...prev.users, [u]: newUser },
      currentUser: u,
    }));
    showToast(`Conta criada! Bem-vindo, ${name.split(' ')[0]}.`);
    return true;
  };

  const handleLogout = () => {
    localStorage.removeItem(SESSION_KEY);
    setStore(prev => ({ ...prev, currentUser: null }));
    setPage('palpites');
  };

  // Update predictions for current user
  const updatePrediction = async (matchId, side, value) => {
    if (!currentUser) return;
    const fix = FIXTURES.find(f => f.id === matchId);
    if (fix && !isAdmin && isMatchLocked(fix.date)) {
      showToast('Este jogo está bloqueado para edição', 'error');
      return;
    }
    const u = store.currentUser;
    const user = { ...store.users[u] };
    user.predictions = { ...user.predictions };
    user.predictions[matchId] = { ...(user.predictions[matchId] || { home: '', away: '' }) };
    user.predictions[matchId][side] = value;

    // Atualiza estado local imediatamente (UI responsiva)
    setStore(prev => ({ ...prev, users: { ...prev.users, [u]: user } }));
    triggerSaveIndicator();

    // Salva no banco em background (debounced via Promise)
    await upsertUser(user);
  };

  const updateExtra = async (field, value) => {
    if (!currentUser) return;
    if (Date.now() >= DEADLINE && !isAdmin) {
      showToast('Prazo encerrado', 'error');
      return;
    }
    const u = store.currentUser;
    const user = { ...store.users[u], extras: { ...(store.users[u].extras || {}), [field]: value } };
    setStore(prev => ({ ...prev, users: { ...prev.users, [u]: user } }));
    triggerSaveIndicator();
    await upsertUser(user);
  };

  // Atualiza palpite do mata-mata (placar ou pênalti) — campo: 'scoreA' | 'scoreB' | 'penaltyWinner'
  const updateKnockout = async (matchId, field, value) => {
    if (!currentUser) return;
    if (Date.now() >= DEADLINE && !isAdmin) {
      showToast('Prazo encerrado para palpites', 'error');
      return;
    }
    const u = store.currentUser;
    const user = { ...store.users[u] };
    user.knockout = { ...(user.knockout || {}) };
    user.knockout[matchId] = { ...(user.knockout[matchId] || {}), [field]: value };
    // Se ainda não houve empate, limpa o penaltyWinner
    if (field === 'scoreA' || field === 'scoreB') {
      const a = parseInt(field === 'scoreA' ? value : user.knockout[matchId].scoreA);
      const b = parseInt(field === 'scoreB' ? value : user.knockout[matchId].scoreB);
      if (!isNaN(a) && !isNaN(b) && a !== b) {
        user.knockout[matchId].penaltyWinner = null;
      }
    }
    setStore(prev => ({ ...prev, users: { ...prev.users, [u]: user } }));
    triggerSaveIndicator();
    await upsertUser(user);
  };

  // Admin actions
  const updateOfficialResult = async (matchId, side, value) => {
    const newResults = { ...store.results, matches: { ...store.results.matches } };
    newResults.matches[matchId] = { ...(newResults.matches[matchId] || { home: '', away: '' }) };
    newResults.matches[matchId][side] = value;
    setStore(prev => ({ ...prev, results: newResults }));
    triggerSaveIndicator();
    await updateResultsDb(newResults);
  };

  const updateOfficialExtra = async (field, value) => {
    const newResults = { ...store.results, [field]: value };
    setStore(prev => ({ ...prev, results: newResults }));
    triggerSaveIndicator();
    await updateResultsDb(newResults);
  };

  // Admin: atualizar resultado oficial de um jogo do mata-mata
  const updateOfficialKnockout = async (matchId, field, value) => {
    const newResults = { ...store.results };
    newResults.knockout = { ...(newResults.knockout || {}) };
    newResults.knockout[matchId] = { ...(newResults.knockout[matchId] || {}), [field]: value };
    if (field === 'scoreA' || field === 'scoreB') {
      const a = parseInt(field === 'scoreA' ? value : newResults.knockout[matchId].scoreA);
      const b = parseInt(field === 'scoreB' ? value : newResults.knockout[matchId].scoreB);
      if (!isNaN(a) && !isNaN(b) && a !== b) {
        newResults.knockout[matchId].penaltyWinner = null;
      }
    }
    setStore(prev => ({ ...prev, results: newResults }));
    triggerSaveIndicator();
    await updateResultsDb(newResults);
  };

  const toggleUserPaid = async (username) => {
    const user = { ...store.users[username], paid: !store.users[username].paid };
    setStore(prev => ({ ...prev, users: { ...prev.users, [username]: user } }));
    await upsertUser(user);
    showToast(user.paid ? '✓ Pagamento confirmado' : 'Pagamento removido');
  };

  const deleteUser = async (username) => {
    if (username === 'admin') return;
    if (!confirm(`Remover ${store.users[username].name}?`)) return;
    await deleteUserDb(username);
    setStore(prev => {
      const next = { ...prev, users: { ...prev.users } };
      delete next.users[username];
      return next;
    });
    showToast('Participante removido');
  };

  // ----- RENDER -----
  if (loading) {
    return (
      <div className="welcome">
        <div style={{ textAlign: 'center', padding: 40 }}>
          <div className="welcome-trophy">🏆</div>
          <div style={{ marginTop: 20, color: 'var(--gold)', letterSpacing: 3, fontSize: 12, textTransform: 'uppercase' }}>
            Carregando bolão...
          </div>
        </div>
      </div>
    );
  }

  if (!isLoggedIn) {
    return (
      <>
        <LoginScreen onLogin={handleLogin} onRegister={handleRegister} />
        {toast && <div className={`toast ${toast.type}`}>{toast.msg}</div>}
      </>
    );
  }

  return (
    <div className="app">
      <Header
        currentUser={currentUser}
        page={page}
        onChangePage={setPage}
        onLogout={handleLogout}
      />

      <main className="main">
        {page === 'palpites' && <PalpitesPage store={store} user={currentUser} updatePrediction={updatePrediction} updateExtra={updateExtra} />}
        {page === 'mata-mata' && <MataMataPage store={store} user={currentUser} updateKnockout={updateKnockout} />}
        {page === 'ranking' && <RankingPage store={store} />}
        {page === 'compare' && <ErrorBoundary><ComparePage store={store} currentUser={currentUser} /></ErrorBoundary>}
        {page === 'regras' && <RegrasPage />}
        {page === 'admin' && isAdmin && <AdminPage store={store} updateOfficialResult={updateOfficialResult} updateOfficialExtra={updateOfficialExtra} updateOfficialKnockout={updateOfficialKnockout} toggleUserPaid={toggleUserPaid} deleteUser={deleteUser} showToast={showToast} />}
      </main>

      <MobileNav page={page} onChange={setPage} isAdmin={isAdmin} />
      {toast && <div className={`toast ${toast.type}`}>{toast.msg}</div>}
      {showSaveIndicator && <div className="save-indicator">✓ Salvo automaticamente</div>}
    </div>
  );
}

// =====================================================================
// LOGIN / REGISTER SCREEN
// =====================================================================
function LoginScreen({ onLogin, onRegister }) {
  const [mode, setMode] = useState('login');
  const [form, setForm] = useState({ username: '', password: '', name: '', whatsapp: '' });
  const [busy, setBusy] = useState(false);

  const submit = async (e) => {
    e?.preventDefault?.();
    if (busy) return;
    setBusy(true);
    try {
      if (mode === 'login') await onLogin(form.username, form.password);
      else await onRegister(form);
    } finally {
      setBusy(false);
    }
  };

  return (
    <div className="welcome">
      <div className="welcome-card">
        <div className="welcome-trophy">🏆</div>
        <h1 className="welcome-title">BOLÃO FIFA 2026</h1>
        <div className="welcome-sub">Copa do Mundo • Americas</div>

        <Countdown target={DEADLINE} />

        <p className="welcome-desc">
          {mode === 'login'
            ? 'Entre com seu usuário para acessar seus palpites.'
            : 'Crie sua conta e participe do bolão. Confirmação só após pagamento via PIX.'}
        </p>

        <form className="welcome-form" onSubmit={submit}>
          {mode === 'register' && (
            <>
              <div>
                <div className="field-label">Nome completo</div>
                <input className="field-input" placeholder="Ex: João da Silva" value={form.name}
                  onChange={(e) => setForm({ ...form, name: e.target.value })} />
              </div>
              <div>
                <div className="field-label">WhatsApp</div>
                <input className="field-input" placeholder="(11) 99999-9999" value={form.whatsapp}
                  onChange={(e) => setForm({ ...form, whatsapp: e.target.value })} />
              </div>
            </>
          )}
          <div>
            <div className="field-label">Usuário</div>
            <input className="field-input" placeholder="ex: joao_silva" value={form.username}
              onChange={(e) => setForm({ ...form, username: e.target.value.toLowerCase().replace(/[^a-z0-9_]/g, '') })} />
          </div>
          <div>
            <div className="field-label">Senha</div>
            <input className="field-input" type="password" placeholder="••••••••" value={form.password}
              onChange={(e) => setForm({ ...form, password: e.target.value })} />
          </div>
          <button type="submit" className="btn-primary" disabled={busy}>
            {busy ? 'AGUARDE...' : (mode === 'login' ? 'ENTRAR' : 'CRIAR CONTA')}
          </button>
        </form>

        <div className="auth-toggle">
          {mode === 'login' ? (
            <>Não tem conta? <button onClick={() => setMode('register')}>Criar uma</button></>
          ) : (
            <>Já tem conta? <button onClick={() => setMode('login')}>Entrar</button></>
          )}
        </div>

        <div className="welcome-rules">
          <div className="welcome-rules-title">Resumo do Bolão</div>
          <div className="welcome-rules-row"><span>Início</span><strong>11/06/2026</strong></div>
          <div className="welcome-rules-row"><span>Prazo dos palpites</span><strong>10/06/2026</strong></div>
          <div className="welcome-rules-row"><span>Final</span><strong>19/07/2026 — MetLife</strong></div>
          <div className="welcome-rules-row"><span>Acertou placar exato</span><strong>5 pts</strong></div>
          <div className="welcome-rules-row"><span>Campeão</span><strong>25 pts</strong></div>
        </div>
      </div>
    </div>
  );
}

  return (
    <header className="header">
      <div className="header-inner">
        <div className="brand">
