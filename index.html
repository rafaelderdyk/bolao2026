          <div className="brand-text">
            <div className="brand-title">BOLÃO FIFA 2026</div>
            <div className="brand-sub">Copa Mundo • USA·MEX·CAN</div>
          </div>
        </div>

        <nav className="header-nav">
          {items.map(it => (

      </div>

  );
}

    { id: 'mata-mata', label: 'Bracket', icon: '🏆' },
    { id: 'ranking', label: 'Ranking', icon: '🥇' },

}

  const [activeTab, setActiveTab] = useState('grupos');
  const isAdmin = user.isAdmin;
  const deadlinePassed = Date.now() >= DEADLINE;
  const totalFilled = Object.values(user.predictions || {}).filter(p => p.home !== '' && p.away !== '').length;
  const progress = (totalFilled / FIXTURES.length) * 100;

  if (false && !user.paid && !isAdmin) {
    return (
      <div>
        <div className="page-header">
          <div className="page-eyebrow">Seus Palpites</div>
          <h1 className="page-title">Aguardando Confirmação</h1>
        </div>
        <div className="welcome-card" style={{ maxWidth: 600, margin: '40px auto' }}>
          <div style={{ textAlign: 'center', fontSize: 48 }}>💳</div>
          <h2 style={{ textAlign: 'center', fontFamily: 'Bebas Neue', fontSize: 32, marginTop: 12, letterSpacing: 1 }}>PAGAMENTO PENDENTE</h2>
          <p style={{ textAlign: 'center', color: 'var(--text-dim)', marginTop: 12, lineHeight: 1.6 }}>
            Sua conta foi criada com sucesso! Para liberar o acesso aos palpites, envie o comprovante do PIX para o administrador do bolão.
            <br /><br />
            Após a confirmação, você terá acesso completo ao sistema até <strong style={{color: 'var(--gold)'}}>10/06/2026</strong>.
          </p>
          <div className="welcome-rules" style={{marginTop: 20}}>
            <div className="welcome-rules-title">Seus Dados</div>
            <div className="welcome-rules-row"><span>Nome</span><strong>{user.name}</strong></div>
            <div className="welcome-rules-row"><span>WhatsApp</span><strong>{user.whatsapp || '—'}</strong></div>
            <div className="welcome-rules-row"><span>Status</span><strong style={{color: 'var(--orange)'}}>⏳ Aguardando PIX</strong></div>

        </div>

  return (
    <div>
      <div className="page-header">
        <div className="page-eyebrow">Faça seus palpites</div>
        <h1 className="page-title">Seus Palpites</h1>
        <p className="page-sub">Preencha todos os jogos. Salvamento automático.
          Após <strong style={{color: 'var(--gold)'}}>10/06/2026 às 23:59</strong>, todos os palpites serão bloqueados.</p>
      </div>

      {deadlinePassed ? (
        <div className="deadline-banner expired">

          <div className="deadline-text">

            <div className="deadline-sub">Todos os palpites estão bloqueados. Boa sorte!</div>

        <div className="deadline-banner">
          <div className="deadline-icon">⏰</div>
          <div className="deadline-text">
            <div className="deadline-title">Você tem até 10/06/2026 para finalizar seus palpites</div>
            <div className="deadline-sub">Depois desse prazo, ninguém mais consegue editar</div>
          </div>
          <Countdown target={DEADLINE} />
        </div>
      )}

      <div className="stats-grid">
        <div className="stat-card">
          <div className="stat-label">Progresso</div>
          <div className="stat-value">{totalFilled}/{FIXTURES.length}</div>

        <div className="stat-card">
          <div className="stat-label">Palpite Campeão</div>
          <div className="stat-value" style={{ fontSize: 26 }}>
            {user.extras?.champion ? `${FLAGS[user.extras.champion] || ''} ${user.extras.champion}` : '—'}
          </div>
          <div className="stat-meta">25 pts se acertar</div>
        </div>
        <div className="stat-card">
          <div className="stat-label">Artilheiro</div>
          <div className="stat-value" style={{ fontSize: 22 }}>{user.extras?.topScorer || '—'}</div>
          <div className="stat-meta">15 pts se acertar</div>

      <div className="tabs">
        <button className={`tab ${activeTab === 'grupos' ? 'active' : ''}`} onClick={() => setActiveTab('grupos')}>Fase de Grupos</button>
        <button className={`tab ${activeTab === 'finais' ? 'active' : ''}`} onClick={() => setActiveTab('finais')}>Palpites Finais</button>
        <button className={`tab ${activeTab === 'classificacao' ? 'active' : ''}`} onClick={() => setActiveTab('classificacao')}>Minha Classificação</button>

      {activeTab === 'grupos' && (
        <div>
          {Object.keys(GROUPS).map(g => (
            <GroupSection key={g} group={g} predictions={user.predictions} updatePrediction={updatePrediction} isAdmin={isAdmin} />
          ))}
        </div>
      )}

      {activeTab === 'finais' && (
        <ExtraPicks user={user} updateExtra={updateExtra} />
      )}

      {activeTab === 'classificacao' && (
        <UserStandings predictions={user.predictions} />
      )}

  );
}

// =====================================================================
// GROUP SECTION (fixtures + standings)
// =====================================================================
function GroupSection({ group, predictions, updatePrediction, isAdmin }) {
  const fixtures = FIXTURES.filter(f => f.group === group);
  const standings = useMemo(() => calcStandings(predictions, group), [predictions, group]);

  return (
    <div className="group-section">
      <div className="group-header">
        <div className="group-badge">{group}</div>
        <div className="group-title">Grupo {group}</div>
        <div className="group-meta">{GROUPS[group].map(t => FLAGS[t]).join(' ')}</div>
      </div>

      <div className="match-list">
        {fixtures.map(fix => (
          <MatchCard key={fix.id} fix={fix} pred={predictions?.[fix.id]} update={updatePrediction} isAdmin={isAdmin} />
        ))}
      </div>

      <div className="standings">
        <div className="standings-row head">
          <div className="pos">#</div>
          <div>Time</div>
          <div className="num">P</div>
          <div className="num">V</div>
          <div className="num">E</div>
          <div className="num">D</div>
          <div className="num">SG</div>
          <div className="num">PTS</div>
        </div>
        {standings.map((r, idx) => (
          <div key={r.team} className={`standings-row ${idx < 2 ? 'qualified' : idx === 2 ? 'third' : ''}`}>
            <div className="pos">{idx + 1}</div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
              <span style={{ fontSize: 16 }}>{FLAGS[r.team]}</span>
              <span style={{ fontSize: 12 }}>{r.team}</span>
            </div>
            <div className="num">{r.p}</div>
            <div className="num">{r.w}</div>
            <div className="num">{r.d}</div>
            <div className="num">{r.l}</div>
            <div className="num">{r.gd > 0 ? '+' : ''}{r.gd}</div>

        ))}

  );
}

// =====================================================================
// EXTRA PICKS (campeão, vice, etc.)
// =====================================================================
function ExtraPicks({ user, updateExtra }) {
  const e = user.extras || {};
  const deadlinePassed = Date.now() >= DEADLINE;

  // Calcula o Top 4 derivado do bracket do mata-mata do usuário
  const derivedTop4 = useMemo(() => {
    const ko = resolveAllKnockout(user.predictions || {}, user.knockout || {});
    const finalMatch = (ko.F && ko.F[0]) || null;
    const thirdMatch = (ko.TP && ko.TP[0]) || null;

    let champion = '', vice = '', third = '', fourth = '';

    if (finalMatch && finalMatch.winner) {
      const winnerTeam = finalMatch.winner === 'A' ? finalMatch.teamA : finalMatch.teamB;
      const loserTeam  = finalMatch.winner === 'A' ? finalMatch.teamB : finalMatch.teamA;
      champion = winnerTeam || '';
      vice = loserTeam || '';
    } else if (finalMatch) {
      // Final sem vencedor decidido, mas tem os dois finalistas
      // Não dá pra saber quem é campeão/vice ainda
    }
    if (thirdMatch && thirdMatch.winner) {
      const winnerTeam = thirdMatch.winner === 'A' ? thirdMatch.teamA : thirdMatch.teamB;
      const loserTeam  = thirdMatch.winner === 'A' ? thirdMatch.teamB : thirdMatch.teamA;
      third = winnerTeam || '';
      fourth = loserTeam || '';
    }
    return { champion, vice, third, fourth };
  }, [user.predictions, user.knockout]);

  // Sincroniza automaticamente os extras quando o bracket muda
  // (apenas se ainda não está bloqueado e se houve mudança real)
  useEffect(() => {
    if (deadlinePassed && !user.isAdmin) return;
    const updates = {};
    if (derivedTop4.champion && e.champion !== derivedTop4.champion) updates.champion = derivedTop4.champion;
    if (derivedTop4.vice && e.vice !== derivedTop4.vice) updates.vice = derivedTop4.vice;
    if (derivedTop4.third && e.third !== derivedTop4.third) updates.third = derivedTop4.third;
    if (derivedTop4.fourth && e.fourth !== derivedTop4.fourth) updates.fourth = derivedTop4.fourth;
    Object.entries(updates).forEach(([k, v]) => updateExtra(k, v));
  }, [derivedTop4.champion, derivedTop4.vice, derivedTop4.third, derivedTop4.fourth]);

  // Status do bracket
  const bracketComplete = derivedTop4.champion && derivedTop4.vice && derivedTop4.third && derivedTop4.fourth;
  const bracketPartial = derivedTop4.champion || derivedTop4.vice || derivedTop4.third || derivedTop4.fourth;

  const renderTrophy = (label, points, team, color) => (
    <div className="pick-card" style={{
      background: team ? `linear-gradient(135deg, rgba(${color}, 0.15), rgba(${color}, 0.05))` : 'rgba(255,255,255,0.02)',
      border: `1.5px solid rgba(${color}, ${team ? 0.4 : 0.15})`,
    }}>
      <div className="pick-label">{label} (+{points} pts)</div>
      {team ? (
        <div style={{
          display: 'flex',
          alignItems: 'center',
          gap: 10,
          padding: '14px 12px',
          background: 'rgba(0,0,0,0.25)',
          borderRadius: 8,
          fontSize: 16,
          fontWeight: 600,
          color: 'var(--text)',
        }}>
          <span style={{ fontSize: 24 }}>{FLAGS[team] || '🏳️'}</span>
          <span>{team}</span>
          <span style={{ marginLeft: 'auto', fontSize: 11, color: 'var(--text-muted)', fontStyle: 'italic' }}>
            do seu chaveamento
          </span>
        </div>
      ) : (
        <div style={{
          padding: '14px 12px',
          background: 'rgba(0,0,0,0.15)',
          borderRadius: 8,
          fontSize: 13,
          color: 'var(--text-muted)',
          fontStyle: 'italic',
          textAlign: 'center',
        }}>
          ⏳ Complete o chaveamento do mata-mata
        </div>
      )}
    </div>
  );

  return (
    <div>
      <div className="section-title">🏆 Top 4 da Copa</div>

      <div className="rule-card" style={{
        marginBottom: 16,
        background: bracketComplete ? 'rgba(0,214,138,0.06)' : 'rgba(0,240,255,0.04)',
        borderColor: bracketComplete ? 'rgba(0,214,138,0.25)' : 'rgba(0,240,255,0.2)',
      }}>
        <p style={{ fontSize: 13, lineHeight: 1.7, color: 'var(--text-dim)', margin: 0 }}>
          {bracketComplete ? (
            <>
              <strong style={{ color: 'var(--green)' }}>✅ Top 4 sincronizado com seu chaveamento!</strong> Os campos abaixo refletem automaticamente os times que avançam no seu mata-mata. Pra alterar, vá em <strong style={{ color: 'var(--gold)' }}>Mata-mata</strong> e ajuste o bracket.
            </>
          ) : (
            <>
              💡 <strong style={{ color: 'var(--neon)' }}>O Top 4 é preenchido automaticamente</strong> com base no seu chaveamento do mata-mata. Termine os palpites de <strong style={{ color: 'var(--gold)' }}>Final</strong> e <strong style={{ color: 'var(--gold)' }}>disputa de 3º lugar</strong> na aba <strong style={{ color: 'var(--gold)' }}>Mata-mata</strong> para preencher esta seção.
            </>
          )}
        </p>
      </div>

      <div className="extra-picks">
        {renderTrophy('🥇 Campeão', 25, derivedTop4.champion, '244, 211, 94')}
        {renderTrophy('🥈 Vice', 18, derivedTop4.vice, '192, 192, 192')}
        {renderTrophy('🥉 3º colocado', 12, derivedTop4.third, '205, 127, 50')}
        {renderTrophy('4️⃣ 4º colocado', 10, derivedTop4.fourth, '139, 149, 168')}
      </div>

      <div className="section-title">⚽ Artilheiro da Copa</div>
      <div className="pick-card" style={{ maxWidth: 480 }}>
        <div className="pick-label">Quem será o artilheiro? (+15 pts)</div>
        <input
          className="pick-input"
          value={e.topScorer || ''}
          onChange={(ev) => updateExtra('topScorer', ev.target.value)}
          placeholder="Ex: Mbappé, Vinicius Jr., Haaland..."
          disabled={deadlinePassed && !user.isAdmin}
        />
        <div style={{ fontSize: 11, color: 'var(--text-muted)', marginTop: 8, fontStyle: 'italic' }}>
          Esse campo é livre — escolha qualquer jogador da Copa.
        </div>
      </div>
    </div>
  );
}

// =====================================================================
// MATA-MATA PAGE — Bracket totalmente editável (todas as fases)
// =====================================================================
function MataMataPage({ store, user, updateKnockout }) {
  const [activePhase, setActivePhase] = useState('R32');
  const [viewMode, setViewMode] = useState('visual'); // 'visual' | 'list'
  const [editingMatchId, setEditingMatchId] = useState(null);
  const isAdmin = user.isAdmin;

  // Resolve todos os confrontos do mata-mata a partir dos palpites do usuário
  const allKO = useMemo(
    () => resolveAllKnockout(user.predictions, user.knockout || {}),
    [user.predictions, user.knockout]
  );

  const extras = user.extras || {};

  // Estatísticas por fase
  const phaseStats = useMemo(() => {
    const out = {};
    KO_PHASE_ORDER.forEach(phase => {
      const matches = allKO[phase] || [];
      const total = matches.length;
      const filled = matches.filter(m => m.winnerTeam).length;
      out[phase] = { total, filled, ready: matches.filter(m => m.teamA && m.teamB).length };
    });
    return out;
  }, [allKO]);

  // Calcula campeão e vice (a partir da final)
  const finalMatch = allKO.F?.[0];
  const champion = finalMatch?.winnerTeam || '';
  const vice = finalMatch && finalMatch.winnerTeam
    ? (finalMatch.winnerTeam === finalMatch.teamA ? finalMatch.teamB : finalMatch.teamA)
    : '';

  // Calcula 3º e 4º (a partir do TP)
  const tpMatch = allKO.TP?.[0];
  const third = tpMatch?.winnerTeam || '';
  const fourth = tpMatch && tpMatch.winnerTeam
    ? (tpMatch.winnerTeam === tpMatch.teamA ? tpMatch.teamB : tpMatch.teamA)
    : '';

  // Encontra match por ID em qualquer fase (para o modal)
  const findMatchById = (id) => {
    for (const phase of KO_PHASE_ORDER) {
      const m = (allKO[phase] || []).find(mm => mm.id === id);
      if (m) return { ...m, phase };
    }
    return null;
  };
  const editingMatch = editingMatchId ? findMatchById(editingMatchId) : null;

  // Navegar para próximo/anterior jogo no modal
  const allMatchesFlat = useMemo(() => {
    const flat = [];
    KO_PHASE_ORDER.forEach(phase => {
      (allKO[phase] || []).forEach(m => flat.push({ ...m, phase }));
    });
    return flat;
  }, [allKO]);
  const currentIdx = editingMatchId ? allMatchesFlat.findIndex(m => m.id === editingMatchId) : -1;
  const prevMatch = currentIdx > 0 ? allMatchesFlat[currentIdx - 1] : null;
  const nextMatch = currentIdx >= 0 && currentIdx < allMatchesFlat.length - 1 ? allMatchesFlat[currentIdx + 1] : null;

  // Status geral: grupos preenchidos?
  const groupsComplete = FIXTURES.every(f => {
    const p = user.predictions?.[f.id];
    return p && p.home !== '' && p.away !== '';
  });

  return (
    <div>
      <div className="page-header">
        <div className="page-eyebrow">Mata-Mata</div>
        <h1 className="page-title">Chaveamento Eliminatório</h1>
        <p className="page-sub">
          Preencha os placares de cada fase. <strong style={{color: 'var(--gold)'}}>Os vencedores avançam automaticamente</strong> para a próxima fase.
          Em caso de empate, escolha quem passa nos pênaltis.
        </p>
      </div>

      {!groupsComplete && (
        <div className="deadline-banner" style={{ background: 'rgba(0,240,255,0.06)', borderColor: 'rgba(0,240,255,0.3)' }}>
          <div className="deadline-icon">💡</div>
          <div className="deadline-text">
            <div className="deadline-title">Dica: preencha primeiro toda a fase de grupos</div>
            <div className="deadline-sub">Os classificados aparecem aqui automaticamente conforme você define os grupos.</div>
          </div>
        </div>
      )}

      {/* Toggle Visual/Lista */}
      <div className="bracket-toggle">
        <button
          className={`bracket-toggle-btn ${viewMode === 'visual' ? 'active' : ''}`}
          onClick={() => setViewMode('visual')}
        >
          🏆 Chaveamento
        </button>
        <button
          className={`bracket-toggle-btn ${viewMode === 'list' ? 'active' : ''}`}
          onClick={() => setViewMode('list')}
        >
          📋 Por Fase
        </button>
      </div>

      {viewMode === 'visual' && (
        <>
          {/* Trophy display */}
          <div className="trophy-display">
            <div className="trophy-label">Seu palpite</div>
            <div className="trophy-icon">🏆</div>
            {champion ? (
              <>
                <div className="trophy-flag">{FLAGS[champion] || '🏳️'}</div>
                <div className="trophy-name">{champion}</div>
                <div style={{ fontSize: 11, color: 'var(--text-dim)', letterSpacing: 2, marginTop: 6 }}>CAMPEÃO DA COPA 2026</div>
              </>
            ) : (
              <div className="trophy-pending" style={{ fontSize: 14, marginTop: 12 }}>
                Defina sua final para revelar o campeão
              </div>
            )}
          </div>

          {/* Bracket visual completo */}
          <BracketVisual allKO={allKO} onMatchClick={setEditingMatchId} />

          {/* Card: Times do meu palpite por fase (mostra quem o usuário acha que vai longe) */}
          <SurvivalPreviewCard allKO={allKO} store={store} />

          {/* Resumo */}
          {(champion || vice || third || fourth) && (
            <>
              <div className="section-title">📊 Resumo dos Palpites</div>
              <div className="stats-grid">
                <div className="stat-card">
                  <div className="stat-label">🥇 Campeão</div>
                  <div className="stat-value" style={{ fontSize: 22 }}>
                    {champion ? `${FLAGS[champion] || ''} ${champion}` : '—'}
                  </div>
                </div>
                <div className="stat-card">
                  <div className="stat-label">🥈 Vice</div>
                  <div className="stat-value" style={{ fontSize: 22 }}>
                    {vice ? `${FLAGS[vice] || ''} ${vice}` : '—'}
                  </div>
                </div>
                <div className="stat-card">
                  <div className="stat-label">🥉 Terceiro</div>
                  <div className="stat-value" style={{ fontSize: 22 }}>
                    {third ? `${FLAGS[third] || ''} ${third}` : '—'}
                  </div>
                </div>
                <div className="stat-card">
                  <div className="stat-label">4º colocado</div>
                  <div className="stat-value" style={{ fontSize: 22 }}>
                    {fourth ? `${FLAGS[fourth] || ''} ${fourth}` : '—'}
                  </div>
                </div>
              </div>
            </>
          )}
        </>
      )}

      {viewMode === 'list' && (
        <>
          {/* Navegação entre fases */}
          <div className="ko-phases-nav">
            {KO_PHASE_ORDER.map(phase => {
              const info = KO_PHASE_INFO[phase];
              const stats = phaseStats[phase];
              const done = stats.filled === stats.total && stats.total > 0;
              return (
                <button
                  key={phase}
                  className={`ko-phase-btn ${activePhase === phase ? 'active' : ''} ${done ? 'done' : ''}`}
                  onClick={() => setActivePhase(phase)}
                >
                  <span>{info.icon} {info.shortLabel}</span>
                  <span className="badge-mini">{stats.filled}/{stats.total}</span>
                </button>
              );
            })}
          </div>

          <KoPhaseSection
            phase={activePhase}
            matches={allKO[activePhase] || []}
            updateKnockout={updateKnockout}
            isAdmin={isAdmin}
          />
        </>
      )}

      {/* Modal de edição */}
      {editingMatch && (
        <BracketEditModal
          match={editingMatch}
          updateKnockout={updateKnockout}
          isAdmin={isAdmin}
          onClose={() => setEditingMatchId(null)}
          onPrev={prevMatch ? () => setEditingMatchId(prevMatch.id) : null}
          onNext={nextMatch ? () => setEditingMatchId(nextMatch.id) : null}
        />
      )}
    </div>
  );
}

// =====================================================================
// BRACKET VISUAL — chaveamento estilo Champions League
// =====================================================================
function BracketVisual({ allKO, onMatchClick }) {
  // Layout: 7 colunas (R32 esq | R16 esq | QF esq | F | QF dir | R16 dir | R32 dir)
  // Divide os 16 jogos de R32 em duas metades: 8 esquerda, 8 direita
  // O bracket é cruzado: superior esquerdo -> R16-1, R16-1 vs R16-2 -> QF-1, QF-1 vs QF-2 -> SF-1
  const r32 = allKO.R32 || [];
  const r16 = allKO.R16 || [];
  const qf = allKO.QF || [];
  const sf = allKO.SF || [];
  const f = allKO.F || [];
  const tp = allKO.TP || [];

  // Lado esquerdo: R32 1-8, R16 1-4, QF 1-2, SF 1
  // Lado direito: R32 9-16, R16 5-8, QF 3-4, SF 2
  const leftR32 = r32.slice(0, 8);
  const rightR32 = r32.slice(8, 16);
  const leftR16 = r16.slice(0, 4);
  const rightR16 = r16.slice(4, 8);
  const leftQF = qf.slice(0, 2);
  const rightQF = qf.slice(2, 4);
  const leftSF = sf[0];
  const rightSF = sf[1];
  const finalMatch = f[0];
  const thirdMatch = tp[0];

  return (
    <>
      <div className="bracket-canvas">
        <div className="bracket-tree">
          {/* Coluna 1: R32 Esquerda */}
          <div className="bracket-col">
            <div className="bracket-col-title">
              16-AVOS
              <span className="col-points">ATÉ 9 PTS</span>
            </div>
            {leftR32.map(m => <BracketMatch key={m.id} match={m} onClick={onMatchClick} />)}
          </div>

          {/* Coluna 2: R16 Esquerda */}
          <div className="bracket-col">
            <div className="bracket-col-title">
              OITAVAS
              <span className="col-points">ATÉ 12 PTS</span>
            </div>
            {leftR16.map(m => <BracketMatch key={m.id} match={m} onClick={onMatchClick} />)}
          </div>

          {/* Coluna 3: QF Esquerda */}
          <div className="bracket-col">
            <div className="bracket-col-title">
              QUARTAS
              <span className="col-points">ATÉ 16 PTS</span>
            </div>
            {leftQF.map(m => <BracketMatch key={m.id} match={m} onClick={onMatchClick} />)}
            <div style={{ marginTop: 'auto', paddingTop: 20 }}>
              <div className="bracket-col-title" style={{ fontSize: 11, color: 'var(--text-muted)', marginTop: 16, borderColor: 'rgba(255,255,255,0.05)' }}>SEMI ESQ.</div>
              {leftSF && <BracketMatch match={leftSF} onClick={onMatchClick} />}
            </div>
          </div>

          {/* Coluna 4: FINAL (centro) */}
          <div className="bracket-col final-col">
            <div className="bracket-col-title">
              FINAL 🏆
              <span className="col-points">ATÉ 27 PTS</span>
            </div>
            {finalMatch && <BracketMatch match={finalMatch} onClick={onMatchClick} />}
            <div style={{ marginTop: 14 }}>
              <div className="bracket-col-title" style={{ fontSize: 11, color: '#cd7f32', marginTop: 10, borderColor: 'rgba(205,127,50,0.2)' }}>3º LUGAR 🥉</div>
              {thirdMatch && <BracketMatch match={thirdMatch} onClick={onMatchClick} />}
            </div>
          </div>

          {/* Coluna 5: QF Direita */}
          <div className="bracket-col">
            <div className="bracket-col-title">
              QUARTAS
              <span className="col-points">ATÉ 16 PTS</span>
            </div>
            {rightQF.map(m => <BracketMatch key={m.id} match={m} onClick={onMatchClick} />)}
            <div style={{ marginTop: 'auto', paddingTop: 20 }}>
              <div className="bracket-col-title" style={{ fontSize: 11, color: 'var(--text-muted)', marginTop: 16, borderColor: 'rgba(255,255,255,0.05)' }}>SEMI DIR.</div>
              {rightSF && <BracketMatch match={rightSF} onClick={onMatchClick} />}
            </div>
          </div>

          {/* Coluna 6: R16 Direita */}
          <div className="bracket-col">
            <div className="bracket-col-title">
              OITAVAS
              <span className="col-points">ATÉ 12 PTS</span>
            </div>
            {rightR16.map(m => <BracketMatch key={m.id} match={m} onClick={onMatchClick} />)}
          </div>

          {/* Coluna 7: R32 Direita */}
          <div className="bracket-col">
            <div className="bracket-col-title">
              16-AVOS
              <span className="col-points">ATÉ 9 PTS</span>
            </div>
            {rightR32.map(m => <BracketMatch key={m.id} match={m} onClick={onMatchClick} />)}
          </div>
        </div>
      </div>

      <div style={{ textAlign: 'center', marginTop: 12, color: 'var(--text-muted)', fontSize: 11, letterSpacing: 1 }}>

function BracketMatch({ match, onClick }) {
  const ready = match.teamA && match.teamB;

  const userSurvivors = useMemo(() => getSurvivorsByPhase(allKO), [allKO]);

    if (!store?.results) return null;

      const m = store.results.knockout[k];
      return m && (m.scoreA !== '' && m.scoreA !== undefined && m.scoreA !== null);
    });
    if (!hasOfficial) return null;
    return resolveAllKnockout(
      store.results.matches ? Object.fromEntries(Object.entries(store.results.matches).map(([k,v])=>[k,{home:v.home,away:v.away}])) : {},
      store.results.knockout || {}

  const realSurvivors = realAllKO ? getSurvivorsByPhase(realAllKO) : null;

  const phases = [
    { key: 'R16', label: 'Oitavas', icon: '🛡️', target: 16, pts: 1 },

        </p>

        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(220px, 1fr))', gap: 10 }}>
          {phases.map(p => {
            const myTeams = [...userSurvivors[p.key]];
            const realTeams = realSurvivors ? [...realSurvivors[p.key]] : null;
            const matched = realTeams ? myTeams.filter(t => realSurvivors[p.key].has(t)) : [];
            return (
              <div key={p.key} style={{

                    <>Seu palpite: <strong>{myTeams.length}/{p.target}</strong> times</>
                  )}

                <div style={{ display: 'flex', flexWrap: 'wrap', gap: 4 }}>

// =====================================================================
// RANKING PAGE
// =====================================================================
function RankingPage({ store }) {
  const ranking = useMemo(() => {
    const participants = Object.values(store.users).filter(u => !u.isAdmin);
    const withPoints = participants.map(u => {
      const { points, stats } = computeUserPoints(u, store.results);
      return { ...u, points, stats };
    });
    // Tie-breakers: exact > champion > matamata
    withPoints.sort((a, b) => {
      if (b.points !== a.points) return b.points - a.points;
      if (b.stats.exact !== a.stats.exact) return b.stats.exact - a.stats.exact;
      const champA = a.extras?.champion === store.results.champion ? 1 : 0;
      const champB = b.extras?.champion === store.results.champion ? 1 : 0;
      if (champB !== champA) return champB - champA;
      return a.name.localeCompare(b.name);
    });
    return withPoints;
  }, [store]);

  const leader = ranking[0];
  const totalParticipants = ranking.length;
  const totalPaid = Object.values(store.users).filter(u => u.paid && !u.isAdmin).length;
  const mostExact = ranking.length > 0 ? ranking.reduce((a, b) => (a.stats.exact > b.stats.exact ? a : b)) : null;

  return (
    <div>
      <div className="page-header">
        <div className="page-eyebrow">Classificação Geral</div>
        <h1 className="page-title">Ranking</h1>
        <p className="page-sub">Pontuação atualizada em tempo real conforme o admin lança os resultados oficiais.</p>
      </div>

      <div className="stats-grid">
        <div className="stat-card">
          <div className="stat-label">🥇 Líder</div>

// Error boundary - evita tela preta se algo crashar
class ErrorBoundaryCompare extends React.Component {
  constructor(props) {
    super(props);
    this.state = { hasError: false, msg: '' };
  }
  static getDerivedStateFromError(error) {
    return { hasError: true, msg: (error && error.message) || String(error) };
  }
  componentDidCatch(error, info) {
    console.error('ComparePage error:', error, info);
  }
  render() {
    if (this.state.hasError) {
      return (
        <div className="rule-card" style={{ background: 'rgba(239,68,68,0.1)', borderColor: 'rgba(239,68,68,0.4)', padding: 20, textAlign: 'center' }}>
          <div style={{ fontSize: 30, marginBottom: 10 }}>⚠️</div>
          <strong style={{ color: '#fca5a5' }}>Ops, algo deu errado nesta aba</strong>
          <p style={{ fontSize: 11, marginTop: 8, color: 'var(--text-muted)', fontFamily: 'monospace' }}>{this.state.msg}</p>
          <p style={{ fontSize: 12, marginTop: 12, color: 'var(--text-dim)' }}>Tente recarregar a página (Ctrl+Shift+R).</p>
        </div>
      );
    }
    return this.props.children;
  }
}

function safeStr(v) { return v === undefined || v === null ? '' : String(v); }
function isFilled(p) {
  if (!p) return false;
  return safeStr(p.home) !== '' && safeStr(p.away) !== '';
}

function scoreColor(palpite, official) {
  if (!isFilled(official) || !isFilled(palpite)) return null;
  try {
    const ph = parseInt(palpite.home), pa = parseInt(palpite.away);
    const oh = parseInt(official.home), oa = parseInt(official.away);
    if (isNaN(ph) || isNaN(pa) || isNaN(oh) || isNaN(oa)) return null;
    if (ph === oh && pa === oa) return 'exact';
    const pr = ph > pa ? 'h' : (ph < pa ? 'a' : 'd');
    const or = oh > oa ? 'h' : (oh < oa ? 'a' : 'd');
    if (pr === or) return 'winner';
    return 'wrong';
  } catch (e) { return null; }
}

function scoreCellStyle(color) {
  if (color === 'exact')  return { background: 'rgba(34,197,94,0.30)',  borderColor: 'rgba(34,197,94,0.7)',  color: '#86efac' };
  if (color === 'winner') return { background: 'rgba(234,179,8,0.22)',  borderColor: 'rgba(234,179,8,0.5)',  color: '#fde047' };
  if (color === 'wrong')  return { background: 'rgba(239,68,68,0.20)',  borderColor: 'rgba(239,68,68,0.5)',  color: '#fca5a5' };
  return { background: 'rgba(255,255,255,0.04)', borderColor: 'rgba(255,255,255,0.1)', color: 'inherit' };
}

function flagFor(team) {
  if (!team) return '🏳️';
  return (typeof FLAGS !== 'undefined' && FLAGS[team]) ? FLAGS[team] : '🏳️';
}

// =====================================================================
// BREAKDOWN DE PONTUAÇÃO — Fase de Grupos
// =====================================================================
function calcGroupPtsBreakdown(palpite, official) {
  if (!isFilled(palpite) || !isFilled(official)) return null;
  const ph = parseInt(palpite.home), pa = parseInt(palpite.away);
  const rh = parseInt(official.home), ra = parseInt(official.away);
  if (isNaN(ph) || isNaN(pa) || isNaN(rh) || isNaN(ra)) return null;
  const lines = [];
  let total = 0;
  if (ph === rh && pa === ra) {
    lines.push({ label: '✅ Placar exato', pts: 5, color: '#86efac' });
    total += 5;
  } else {
    const pR = ph > pa ? 'H' : ph < pa ? 'A' : 'D';
    const rR = rh > ra ? 'H' : rh < ra ? 'A' : 'D';
    if (pR === rR) {
      lines.push({ label: '🟡 Acertou vencedor/empate', pts: 2, color: '#fde047' });
      total += 2;
    } else {
      lines.push({ label: '❌ Errou o resultado', pts: 0, color: '#fca5a5' });
    }
  }
  return { lines, total };
}

// Breakdown de pontuação — Mata-Mata
function calcKOPtsBreakdown(um, rm, phaseInfo) {
  if (!um || !um.teamA || !um.teamB) return null;

  const realHasScore = rm && rm.scoreA !== '' && rm.scoreA !== undefined && rm.scoreA !== null
                    && rm.scoreB !== '' && rm.scoreB !== undefined && rm.scoreB !== null;
  if (!realHasScore) return null;

  const userHasScore = um.scoreA !== '' && um.scoreA !== undefined && um.scoreA !== null
                    && um.scoreB !== '' && um.scoreB !== undefined && um.scoreB !== null;

  // Times reais do confronto — vêm do official (que tem teamA/teamB salvos pelo admin)
  const realTeamA = rm.teamA;
  const realTeamB = rm.teamB;
  if (!realTeamA || !realTeamB) return null;

  const realPair = new Set([realTeamA, realTeamB]);
  const userPair = new Set([um.teamA, um.teamB]);
  const hitsCount = [...userPair].filter(t => realPair.has(t)).length;

  const lines = [];
  let total = 0;

  if (hitsCount === 2) {
    lines.push({ label: `🎯 Confronto completo (${um.teamA} × ${um.teamB})`, pts: phaseInfo.points, color: '#00d68a' });
    total += phaseInfo.points;

    if (userHasScore) {
      const rA = parseInt(rm.scoreA), rB = parseInt(rm.scoreB);
      let uA, uB;
      if (um.teamA === realTeamA) { uA = parseInt(um.scoreA); uB = parseInt(um.scoreB); }
      else { uA = parseInt(um.scoreB); uB = parseInt(um.scoreA); }

      const rWinner = rA > rB ? 'A' : rA < rB ? 'B' : (rm.penaltyWinner || null);
      const uWinner = uA > uB ? 'A' : uA < uB ? 'B' : (um.penaltyWinner || null);

      if (rWinner && uWinner && uWinner === rWinner) {
        lines.push({ label: '✅ Acertou o classificado', pts: phaseInfo.winnerBonus, color: '#86efac' });
        total += phaseInfo.winnerBonus;
      } else {
        lines.push({ label: '❌ Errou o classificado', pts: 0, color: '#fca5a5' });
      }
      if (!isNaN(uA) && !isNaN(uB) && uA === rA && uB === rB) {
        lines.push({ label: `✅ Placar exato (${rA}×${rB})`, pts: phaseInfo.exactBonus, color: '#86efac' });
        total += phaseInfo.exactBonus;
      } else {
        lines.push({ label: `❌ Placar errado (palpitou ${um.scoreA}×${um.scoreB}, foi ${rm.scoreA}×${rm.scoreB})`, pts: 0, color: '#fca5a5' });
      }
    }

  } else if (hitsCount === 1) {
    const acertou = [...userPair].find(t => realPair.has(t));
    const errou = [...userPair].find(t => !realPair.has(t));
    lines.push({ label: `½ Meio confronto (acertou ${acertou}, errou ${errou})`, pts: phaseInfo.halfPoints, color: '#d4af37' });
    total += phaseInfo.halfPoints;

    if (userHasScore) {
      const rA = parseInt(rm.scoreA), rB = parseInt(rm.scoreB);
      const uA = parseInt(um.scoreA), uB = parseInt(um.scoreB);

      const rWinner = rA > rB ? 'A' : rA < rB ? 'B' : (rm.penaltyWinner || null);
      const uWinner = uA > uB ? 'A' : uA < uB ? 'B' : (um.penaltyWinner || null);

      if (rWinner && uWinner && uWinner === rWinner) {
        lines.push({ label: '✅ Acertou o classificado (slot)', pts: phaseInfo.slotWinnerBonus, color: '#86efac' });
        total += phaseInfo.slotWinnerBonus;
      } else {
        lines.push({ label: '❌ Errou o classificado', pts: 0, color: '#fca5a5' });
      }
      if (!isNaN(uA) && !isNaN(uB) && uA === rA && uB === rB) {
        lines.push({ label: `✅ Placar exato no slot (${rA}×${rB})`, pts: phaseInfo.slotExactBonus, color: '#86efac' });
        total += phaseInfo.slotExactBonus;
      } else {
        lines.push({ label: `❌ Placar errado (palpitou ${um.scoreA}×${um.scoreB}, foi ${rm.scoreA}×${rm.scoreB})`, pts: 0, color: '#fca5a5' });
      }
    }

  } else {
    lines.push({ label: `❌ Errou os 2 times (${um.teamA} × ${um.teamB})`, pts: 0, color: '#fca5a5' });

    if (userHasScore) {
      const rA = parseInt(rm.scoreA), rB = parseInt(rm.scoreB);
      const uA = parseInt(um.scoreA), uB = parseInt(um.scoreB);

      const rWinner = rA > rB ? 'A' : rA < rB ? 'B' : (rm.penaltyWinner || null);
      const uWinner = uA > uB ? 'A' : uA < uB ? 'B' : (um.penaltyWinner || null);

      if (rWinner && uWinner && uWinner === rWinner) {
        lines.push({ label: '⚡ Acertou o classificado (slot)', pts: phaseInfo.slotWinnerBonus, color: '#a855f7' });
        total += phaseInfo.slotWinnerBonus;
      }
      if (!isNaN(uA) && !isNaN(uB) && uA === rA && uB === rB) {
        lines.push({ label: `⚡ Placar exato no slot (${rA}×${rB})`, pts: phaseInfo.slotExactBonus, color: '#a855f7' });
        total += phaseInfo.slotExactBonus;
      }
    }
  }

  return { lines, total, hitsCount };
}

function CompareGameCard({ matchId, home, away, official, allUsers, currentUsername }) {
  const officialDone = isFilled(official);

  const palpitesList = useMemo(() => {
    return (allUsers || []).map(u => {
      const p = (u && u.predictions) ? u.predictions[matchId] : null;
      let color = null;
      if (officialDone && isFilled(p)) color = scoreColor(p, official);
      return { user: u, palpite: p, color };
    });
  }, [allUsers, matchId, officialDone, official]);

  const stats = useMemo(() => {
    const s = { exact: 0, winner: 0, wrong: 0, empty: 0 };
    palpitesList.forEach(({ palpite, color }) => {
      if (!isFilled(palpite)) s.empty++;
      else if (color === 'exact') s.exact++;
      else if (color === 'winner') s.winner++;
      else if (color === 'wrong') s.wrong++;
    });
    return s;
  }, [palpitesList]);

  const topPlacares = useMemo(() => {
    const c = {};
    palpitesList.forEach(({ palpite }) => {
      if (isFilled(palpite)) {
        const k = safeStr(palpite.home) + '×' + safeStr(palpite.away);
        c[k] = (c[k] || 0) + 1;
      }
    });
    return Object.entries(c).sort((a,b) => b[1]-a[1]).slice(0, 3);
  }, [palpitesList]);

  return (
    <div className="rule-card" style={{ marginBottom: 12, padding: 14 }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 10, flexWrap: 'wrap', gap: 8 }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 8, flexWrap: 'wrap' }}>
          <span style={{ fontSize: 10, color: 'var(--text-muted)', fontWeight: 700, letterSpacing: 0.5, padding: '2px 6px', background: 'rgba(255,255,255,0.05)', borderRadius: 4 }}>{matchId}</span>
          <strong style={{ fontSize: 15 }}>{flagFor(home)} {home || '?'} <span style={{ color: 'var(--text-muted)' }}>×</span> {away || '?'} {flagFor(away)}</strong>
        </div>
        {officialDone && (
          <div style={{ padding: '4px 10px', background: 'rgba(244,211,94,0.15)', border: '1px solid rgba(244,211,94,0.4)', borderRadius: 6, fontSize: 13, fontWeight: 700, color: 'var(--gold)' }}>
            OFICIAL: {safeStr(official.home)} × {safeStr(official.away)}
          </div>
        )}
      </div>

      {officialDone && (
        <div style={{ display: 'flex', gap: 14, marginBottom: 10, padding: '8px 12px', background: 'rgba(0,0,0,0.2)', borderRadius: 6, fontSize: 11, flexWrap: 'wrap' }}>
          <span style={{ color: '#86efac' }}>✅ {stats.exact} placar exato</span>
          <span style={{ color: '#fde047' }}>🟡 {stats.winner} só vencedor</span>

          const [expanded, setExpanded] = React.useState(false);
          return (
            <div key={user.username || i}
              onClick={() => breakdown && setExpanded(e => !e)}

                <span style={{ fontSize: 11, color: isMe ? '#d8b4fe' : 'var(--text-dim)', fontWeight: isMe ? 700 : 500, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap', flex: 1 }}>
                  {isMe ? '👤 ' : ''}{user.username}
                </span>
                <span style={{ padding: '3px 8px', borderRadius: 4, fontSize: 12, fontWeight: 700, border: '1px solid', minWidth: 42, textAlign: 'center', ...scoreCellStyle(color), ...(filled ? {} : { color: 'var(--text-muted)', fontStyle: 'italic', fontWeight: 400 }) }}>
                  {filled ? (safeStr(palpite.home) + '×' + safeStr(palpite.away)) : '—'}
                </span>
                {breakdown && (
                  <span style={{ fontSize: 10, color: 'var(--gold)', fontWeight: 700, whiteSpace: 'nowrap' }}>
                    +{breakdown.total}pts {expanded ? '▲' : '▼'}

                )}
              </div>
              {expanded && breakdown && (
                <div style={{ marginTop: 8, paddingTop: 8, borderTop: '1px dashed rgba(255,255,255,0.1)' }}>
                  {breakdown.lines.map((line, j) => (
                    <div key={j} style={{ display: 'flex', justifyContent: 'space-between', fontSize: 11, marginBottom: 3, color: line.color }}>
                      <span>{line.label}</span>
                      <strong>{line.pts > 0 ? `+${line.pts}` : '—'}</strong>
                    </div>
                  ))}
                  <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 12, marginTop: 6, paddingTop: 6, borderTop: '1px solid rgba(255,255,255,0.1)', fontWeight: 700, color: 'var(--gold)' }}>
                    <span>Total</span>
                    <span>+{breakdown.total} pts</span>
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

function CompareKnockoutAll({ allUsers, currentUsername, officialKO }) {
  const [phaseFilter, setPhaseFilter] = useState('ALL');

  const allBrackets = useMemo(() => {
    const out = {};
    (allUsers || []).forEach(u => {
      if (!u || !u.username) return;
      try {
        out[u.username] = resolveAllKnockout(u.predictions || {}, u.knockout || {});
      } catch (e) {
        console.error('Erro resolvendo bracket de', u.username, e);
        out[u.username] = {};
      }
    });
    return out;
  }, [allUsers]);

  // Resolve os times reais do bracket oficial
  const realKO = useMemo(() => {
    try {
      return resolveAllKnockout({}, officialKO || {});
    } catch (e) {
      return {};
    }
  }, [officialKO]);

  const phases = [
    { key: 'R32', label: '🎯 16-avos de Final', short: 'R32' },
    { key: 'R16', label: '🎯 Oitavas de Final', short: 'R16' },
    { key: 'QF',  label: '🎯 Quartas de Final', short: 'QF' },
    { key: 'SF',  label: '🎯 Semifinais',      short: 'SF' },
    { key: 'TP',  label: '🥉 Disputa 3º lugar', short: 'TP' },
    { key: 'F',   label: '🏆 Final',            short: 'F' },
  ];

  return (
    <div>
      <div style={{ display: 'flex', gap: 6, marginBottom: 14, flexWrap: 'wrap' }}>
        <button onClick={() => setPhaseFilter('ALL')} style={{ padding: '6px 14px', borderRadius: 6, border: '1px solid rgba(255,255,255,0.15)', background: phaseFilter === 'ALL' ? 'var(--gold)' : 'transparent', color: phaseFilter === 'ALL' ? '#1A1100' : 'var(--text)', fontWeight: 600, fontSize: 12, cursor: 'pointer' }}>TODAS</button>
        {phases.map(ph => (
          <button key={ph.key} onClick={() => setPhaseFilter(ph.key)} style={{ padding: '6px 14px', borderRadius: 6, border: '1px solid rgba(255,255,255,0.15)', background: phaseFilter === ph.key ? 'var(--gold)' : 'transparent', color: phaseFilter === ph.key ? '#1A1100' : 'var(--text)', fontWeight: 600, fontSize: 12, cursor: 'pointer' }}>{ph.short}</button>
        ))}
      </div>

      {phases.filter(ph => phaseFilter === 'ALL' || phaseFilter === ph.key).map(phase => {
        let matchIds = [];
        for (const u of (allUsers || [])) {
          if (!u || !u.username) continue;
          const pm = (allBrackets[u.username] && allBrackets[u.username][phase.key]) || [];
          if (pm.length > 0) {
            matchIds = pm.map(m => m && m.id).filter(Boolean);
            break;
          }
        }
        if (matchIds.length === 0) {
          return (
            <div key={phase.key} style={{ marginBottom: 16 }}>
              <h3 style={{ color: 'var(--gold)', marginBottom: 8, fontSize: 17 }}>{phase.label}</h3>
              <div className="rule-card" style={{ padding: 14, color: 'var(--text-muted)', fontSize: 12, fontStyle: 'italic' }}>
                Nenhum palpite registrado para esta fase ainda.
              </div>
            </div>
          );
        }
        return (
          <div key={phase.key} style={{ marginBottom: 22 }}>
            <h3 style={{ color: 'var(--gold)', marginBottom: 10, fontSize: 17 }}>{phase.label}</h3>
            {matchIds.map(matchId => (
              <CompareKOMatchCard key={matchId} matchId={matchId} phase={phase.key} allUsers={allUsers} currentUsername={currentUsername} allBrackets={allBrackets} official={officialKO[matchId]} realKO={realKO} />
            ))}
          </div>
        );
      })}
    </div>
  );
}

function CompareKOMatchCard({ matchId, phase, allUsers, currentUsername, allBrackets, official, realKO }) {
  const officialDone = official && safeStr(official.scoreA) !== '' && safeStr(official.scoreB) !== '';

  // Times reais do confronto — do realKO resolvido ou do KO_STRUCTURE
  const realMatch = useMemo(() => {
    if (realKO && realKO[phase]) {
      const m = realKO[phase].find(x => x && x.id === matchId);
      if (m && m.teamA && m.teamB) return m;
    }
    // Fallback: KO_STRUCTURE direto
    const s = (KO_STRUCTURE[phase] || []).find(x => x.id === matchId);
    return s ? { teamA: s.a, teamB: s.b, scoreA: official?.scoreA, scoreB: official?.scoreB, penaltyWinner: official?.penaltyWinner } : null;
  }, [realKO, phase, matchId, official]);

  const officialWithTeams = useMemo(() => {
    if (!official) return null;
    return {
      ...official,
      teamA: realMatch?.teamA || official.teamA,
      teamB: realMatch?.teamB || official.teamB,
    };
  }, [official, realMatch]);

  const palpitesList = useMemo(() => {
    return (allUsers || []).map(u => {
      if (!u || !u.username) return null;
      const matches = (allBrackets[u.username] && allBrackets[u.username][phase]) || [];
      const m = matches.find(x => x && x.id === matchId);
      return { user: u, match: m || {} };
    }).filter(Boolean);
  }, [allUsers, allBrackets, phase, matchId]);

  return (
    <div className="rule-card" style={{ marginBottom: 12, padding: 14 }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 10, gap: 8, flexWrap: 'wrap' }}>
        <span style={{ fontSize: 11, color: 'var(--text-muted)', fontWeight: 700, padding: '2px 6px', background: 'rgba(255,255,255,0.05)', borderRadius: 4 }}>{matchId}</span>
        {officialDone && (
          <div style={{ padding: '4px 10px', background: 'rgba(244,211,94,0.15)', border: '1px solid rgba(244,211,94,0.4)', borderRadius: 6, fontSize: 13, fontWeight: 700, color: 'var(--gold)' }}>
            OFICIAL: {safeStr(official.scoreA)} × {safeStr(official.scoreB)}
            {official.penaltyWinner ? <span style={{ fontSize: 11, marginLeft: 6 }}>(P: {official.penaltyWinner})</span> : null}
          </div>
        )}
      </div>

      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(220px, 1fr))', gap: 6 }}>
        {palpitesList.map(({ user, match }) => {
          const isMe = user.username === currentUsername;
          const hasTeams = match.teamA || match.teamB;
          const hasScore = safeStr(match.scoreA) !== '' && safeStr(match.scoreB) !== '';
          const color = officialDone && hasScore ? scoreColor({ home: match.scoreA, away: match.scoreB }, { home: official.scoreA, away: official.scoreB }) : null;
          const phaseInfo = KO_PHASE_INFO[phase];
          const breakdown = officialDone && hasTeams ? calcKOPtsBreakdown(match, officialWithTeams, phaseInfo) : null;
          const [expanded, setExpanded] = React.useState(false);
          return (
            <div key={user.username}
              onClick={() => breakdown && setExpanded(e => !e)}
              style={{ padding: '6px 10px', background: isMe ? 'rgba(168,85,247,0.18)' : 'rgba(0,0,0,0.15)', border: '1px solid', borderColor: isMe ? 'rgba(168,85,247,0.5)' : 'rgba(255,255,255,0.06)', borderRadius: 6, cursor: breakdown ? 'pointer' : 'default' }}
              title={breakdown ? 'Clique para ver detalhes' : (user.name || user.username)}
            >
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: hasTeams ? 4 : 0 }}>
                <span style={{ fontSize: 10, color: isMe ? '#d8b4fe' : 'var(--text-muted)', fontWeight: 700, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap', flex: 1 }}>
                  {isMe ? '👤 ' : ''}{user.username}
                </span>
                {breakdown && (
                  <span style={{ fontSize: 10, color: 'var(--gold)', fontWeight: 700, whiteSpace: 'nowrap', marginLeft: 6 }}>
                    +{breakdown.total}pts {expanded ? '▲' : '▼'}
                  </span>
                )}
              </div>
              {!hasTeams ? (
                <div style={{ fontSize: 11, color: 'var(--text-muted)', fontStyle: 'italic' }}>—</div>
              ) : (
                <div style={{ fontSize: 11, display: 'flex', alignItems: 'center', gap: 4, padding: '4px 6px', borderRadius: 4, border: '1px solid', ...scoreCellStyle(color) }}>
                  <span style={{ flex: 1, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{flagFor(match.teamA)} {match.teamA || '?'}</span>
                  <strong style={{ minWidth: 38, textAlign: 'center' }}>{hasScore ? (safeStr(match.scoreA) + '×' + safeStr(match.scoreB)) : 'vs'}</strong>
                  <span style={{ flex: 1, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap', textAlign: 'right' }}>{match.teamB || '?'} {flagFor(match.teamB)}</span>
                  {match.penaltyWinner ? <span style={{ fontSize: 9, color: '#fb923c', marginLeft: 2 }}>(P)</span> : null}
                </div>
              )}
              {expanded && breakdown && (
                <div style={{ marginTop: 8, paddingTop: 8, borderTop: '1px dashed rgba(255,255,255,0.1)' }}>
                  {breakdown.lines.map((line, j) => (
                    <div key={j} style={{ display: 'flex', justifyContent: 'space-between', fontSize: 11, marginBottom: 3, color: line.color }}>
                      <span>{line.label}</span>
                      <strong>{line.pts > 0 ? `+${line.pts}` : '—'}</strong>
                    </div>
                  ))}
                  <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 12, marginTop: 6, paddingTop: 6, borderTop: '1px solid rgba(255,255,255,0.1)', fontWeight: 700, color: 'var(--gold)' }}>
                    <span>Total</span>
                    <span>+{breakdown.total} pts</span>
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

function CompareTop4All({ allUsers, currentUsername, results }) {
  const items = [
    { key: 'champion', label: '🥇 Campeão', pts: 25, isTeam: true },
    { key: 'vice', label: '🥈 Vice', pts: 18, isTeam: true },
    { key: 'third', label: '🥉 3º Lugar', pts: 12, isTeam: true },
    { key: 'fourth', label: '4️⃣ 4º Lugar', pts: 10, isTeam: true },
    { key: 'topScorer', label: '⚽ Artilheiro', pts: 15, isTeam: false },
  ];

  return (
    <div>
      {items.map(item => {
        const official = safeStr((results || {})[item.key]);
        const buckets = {};
        (allUsers || []).forEach(u => {
          if (!u || !u.username) return;
          const val = safeStr((u.extras || {})[item.key]).trim();
          const key = val || '__empty__';
          if (!buckets[key]) buckets[key] = { value: val, users: [] };
          buckets[key].users.push(u);
        });
        const sorted = Object.values(buckets).sort((a,b) => b.users.length - a.users.length);

        return (
          <div key={item.key} className="rule-card" style={{ marginBottom: 14, padding: 14 }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 10, flexWrap: 'wrap', gap: 8 }}>
              <h3 style={{ color: 'var(--gold)', fontSize: 17 }}>{item.label}</h3>
              <span style={{ fontSize: 11, color: 'var(--text-muted)' }}>+{item.pts} pts</span>
            </div>

            {official ? (
              <div style={{ padding: '6px 12px', background: 'rgba(244,211,94,0.15)', border: '1px solid rgba(244,211,94,0.4)', borderRadius: 6, marginBottom: 12, fontSize: 13, fontWeight: 700, color: 'var(--gold)', textAlign: 'center' }}>
                OFICIAL: {item.isTeam ? (flagFor(official) + ' ' + official) : official}
              </div>
            ) : null}

            <div style={{ display: 'grid', gap: 8 }}>
              {sorted.map((bucket, i) => {
                const isEmpty = !bucket.value;
                const hit = !isEmpty && official && bucket.value.toLowerCase() === official.toLowerCase();
                const bg = isEmpty ? 'rgba(239,68,68,0.10)' : (official ? (hit ? 'rgba(34,197,94,0.15)' : 'rgba(239,68,68,0.10)') : 'rgba(255,255,255,0.04)');
                const bd = isEmpty ? 'rgba(239,68,68,0.30)' : (official ? (hit ? 'rgba(34,197,94,0.5)' : 'rgba(239,68,68,0.3)') : 'rgba(255,255,255,0.10)');
                return (
                  <div key={i} style={{ padding: 10, background: bg, border: '1px solid', borderColor: bd, borderRadius: 6 }}>
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 6, flexWrap: 'wrap', gap: 6 }}>
                      <strong style={{ fontSize: 14 }}>
                        {isEmpty ? <span style={{ color: 'var(--text-muted)', fontStyle: 'italic' }}>— Não declarado</span> : (item.isTeam ? (flagFor(bucket.value) + ' ' + bucket.value) : bucket.value)}
                        {hit ? <span style={{ marginLeft: 8, fontSize: 12, color: '#86efac' }}>✅ ACERTOU</span> : null}
                      </strong>
                      <span style={{ fontSize: 11, color: 'var(--text-muted)', fontWeight: 700 }}>
                        {bucket.users.length} {bucket.users.length === 1 ? 'palpite' : 'palpites'}
                      </span>
                    </div>
                    <div style={{ display: 'flex', flexWrap: 'wrap', gap: 4 }}>
                      {bucket.users.map(u => {
                        const isMe = u.username === currentUsername;
                        return (
                          <span key={u.username} style={{ fontSize: 11, padding: '2px 8px', background: isMe ? 'rgba(168,85,247,0.25)' : 'rgba(255,255,255,0.06)', color: isMe ? '#d8b4fe' : 'var(--text-dim)', border: isMe ? '1px solid rgba(168,85,247,0.4)' : '1px solid transparent', borderRadius: 4, fontWeight: isMe ? 700 : 500 }} title={u.name || u.username}>
                            {isMe ? '👤 ' : ''}{u.username}
                          </span>
                        );
                      })}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        );
      })}
    </div>
  );
}

        </ol>
      </div>
    </div>
  );
}

function AdminPage({ store, updateOfficialResult, updateOfficialExtra, updateOfficialKnockout, toggleUserPaid, deleteUser, showToast }) {
  const [section, setSection] = useState('participantes');

  const participants = Object.values(store.users).filter(u => !u.isAdmin);
  const paidCount = participants.filter(u => u.paid).length;

  // Calcula standings oficiais a partir dos resultados oficiais
  const officialStandings = useMemo(() => {
    const std = {};
    Object.keys(GROUPS).forEach(g => {
      std[g] = calcStandings(store.results.matches, g).map(r => r.team);
    });
    return std;
  }, [store.results.matches]);

  const exportRanking = () => {
    const ranking = participants.filter(u => u.paid).map(u => {
      const { points, stats } = computeUserPoints(u, store.results);
      return { name: u.name, username: u.username, whatsapp: u.whatsapp || '', points, exact: stats.exact, winner: stats.winner };
    }).sort((a, b) => b.points - a.points);
    const csv = ['Pos,Nome,Usuário,WhatsApp,Pontos,Exatos,Vencedor', ...ranking.map((r, i) =>
      `${i+1},"${r.name}",${r.username},${r.whatsapp},${r.points},${r.exact},${r.winner}`)].join('\n');
    const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `bolao-fifa-2026-ranking-${new Date().toISOString().slice(0,10)}.csv`;
    a.click();

    const rows = [['Usuário', 'Nome', 'JogoID', 'Casa', 'Placar Casa', 'Visitante', 'Placar Visit.']];

    const csv = rows.map(r => r.map(c => `"${c}"`).join(',')).join('\n');

    const a = document.createElement('a');

        <div className="stat-card"><div className="stat-label">Aguardando</div><div className="stat-value" style={{color: 'var(--orange)'}}>{participants.length - paidCount}</div></div>
        <div className="stat-card"><div className="stat-label">Resultados Lançados</div><div className="stat-value">{Object.values(store.results.matches).filter(m => m.home !== '' && m.away !== '').length}</div></div>

      <div className="tabs">
        <button className={`tab ${section === 'participantes' ? 'active' : ''}`} onClick={() => setSection('participantes')}>Participantes</button>
        <button className={`tab ${section === 'resultados' ? 'active' : ''}`} onClick={() => setSection('resultados')}>Resultados Grupos</button>

            <button className="btn-primary" style={{ width: 'auto' }} onClick={exportRanking}>📊 Exportar Ranking</button>
            <button className="btn-secondary" onClick={exportAllPredictions}>📋 Exportar Todos os Palpites</button>

            <p style={{ fontSize: 12, color: 'var(--text-dim)', marginBottom: 10 }}>
              Seus dados estão salvos com segurança no banco de dados online (Supabase). Todos os usuários e palpites ficam sincronizados em tempo real entre todos os dispositivos.

            <button className="btn-secondary" onClick={() => {

function AdminResultsSection({ store, updateOfficialResult }) {
  const [filter, setFilter] = useState('all'); // all | pending | done
  const [groupFilter, setGroupFilter] = useState('ALL');
  const [searchTerm, setSearchTerm] = useState('');

  // Calcular stats
  const total = FIXTURES.length;
  const lancados = FIXTURES.filter(f => {
    const r = store.results.matches[f.id];
    return r && r.home !== '' && r.home !== undefined && r.away !== '' && r.away !== undefined;
  }).length;
  const pendentes = total - lancados;

  // Aplica filtros
  let filteredFixtures = FIXTURES;
  if (groupFilter !== 'ALL') {
    filteredFixtures = filteredFixtures.filter(f => f.group === groupFilter);
  }
  if (filter === 'pending') {
    filteredFixtures = filteredFixtures.filter(f => {
      const r = store.results.matches[f.id];
      return !r || r.home === '' || r.home === undefined || r.away === '' || r.away === undefined;
    });
  } else if (filter === 'done') {
    filteredFixtures = filteredFixtures.filter(f => {
      const r = store.results.matches[f.id];
      return r && r.home !== '' && r.home !== undefined && r.away !== '' && r.away !== undefined;
    });
  }
  if (searchTerm.trim()) {
    const term = searchTerm.toLowerCase().trim();
    filteredFixtures = filteredFixtures.filter(f =>
      f.id.toLowerCase().includes(term) ||
      f.home.toLowerCase().includes(term) ||
      f.away.toLowerCase().includes(term)
    );
  }

  // Agrupar por grupo
  const filteredByGroup = {};
  filteredFixtures.forEach(f => {
    if (!filteredByGroup[f.group]) filteredByGroup[f.group] = [];
    filteredByGroup[f.group].push(f);
  });

  return (
    <div className="admin-section">
      <h3>Lançar Resultados Oficiais dos Jogos</h3>

      {/* Stats no topo */}
      <div style={{
        display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(120px, 1fr))', gap: 10, marginBottom: 14
      }}>
        <div style={{ padding: 12, background: 'rgba(255,255,255,0.04)', borderRadius: 8, textAlign: 'center', border: '1px solid rgba(255,255,255,0.08)' }}>
          <div style={{ fontSize: 22, fontWeight: 700, color: 'var(--gold)' }}>{lancados}</div>
          <div style={{ fontSize: 10, color: 'var(--text-muted)', fontWeight: 700, letterSpacing: 0.5 }}>LANÇADOS</div>
        </div>
        <div style={{ padding: 12, background: 'rgba(255,255,255,0.04)', borderRadius: 8, textAlign: 'center', border: '1px solid rgba(255,255,255,0.08)' }}>
          <div style={{ fontSize: 22, fontWeight: 700, color: '#fb923c' }}>{pendentes}</div>
          <div style={{ fontSize: 10, color: 'var(--text-muted)', fontWeight: 700, letterSpacing: 0.5 }}>PENDENTES</div>
        </div>
        <div style={{ padding: 12, background: 'rgba(255,255,255,0.04)', borderRadius: 8, textAlign: 'center', border: '1px solid rgba(255,255,255,0.08)' }}>
          <div style={{ fontSize: 22, fontWeight: 700, color: 'var(--text)' }}>{total}</div>
          <div style={{ fontSize: 10, color: 'var(--text-muted)', fontWeight: 700, letterSpacing: 0.5 }}>TOTAL</div>
        </div>
        <div style={{ padding: 12, background: 'rgba(255,255,255,0.04)', borderRadius: 8, textAlign: 'center', border: '1px solid rgba(255,255,255,0.08)' }}>
          <div style={{ fontSize: 22, fontWeight: 700, color: '#22c55e' }}>{Math.round(lancados/total*100)}%</div>
          <div style={{ fontSize: 10, color: 'var(--text-muted)', fontWeight: 700, letterSpacing: 0.5 }}>COMPLETO</div>
        </div>
      </div>

      {/* Busca + filtros */}
      <div style={{ marginBottom: 12 }}>
        <input
          type="text"
          placeholder="🔍 Buscar por time ou ID do jogo (ex: 'brasil', 'A1', 'méxico')"
          value={searchTerm}
          onChange={(e) => setSearchTerm(e.target.value)}
          style={{
            width: '100%', padding: '10px 14px', borderRadius: 8,
            border: '1px solid rgba(255,255,255,0.15)',
            background: 'rgba(255,255,255,0.04)', color: 'var(--text)',
            fontSize: 14, marginBottom: 10,
          }}
        />

        <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap', marginBottom: 8 }}>
          <span style={{ fontSize: 11, color: 'var(--text-muted)', alignSelf: 'center', fontWeight: 700, marginRight: 4 }}>STATUS:</span>
          <button onClick={() => setFilter('all')} style={{ padding: '6px 12px', borderRadius: 6, border: '1px solid rgba(255,255,255,0.15)', background: filter === 'all' ? 'var(--gold)' : 'transparent', color: filter === 'all' ? '#1A1100' : 'var(--text)', fontWeight: 600, fontSize: 12, cursor: 'pointer' }}>Todos ({total})</button>
          <button onClick={() => setFilter('pending')} style={{ padding: '6px 12px', borderRadius: 6, border: '1px solid rgba(255,255,255,0.15)', background: filter === 'pending' ? '#fb923c' : 'transparent', color: filter === 'pending' ? '#1A1100' : '#fb923c', fontWeight: 600, fontSize: 12, cursor: 'pointer' }}>⏳ Pendentes ({pendentes})</button>
          <button onClick={() => setFilter('done')} style={{ padding: '6px 12px', borderRadius: 6, border: '1px solid rgba(255,255,255,0.15)', background: filter === 'done' ? '#22c55e' : 'transparent', color: filter === 'done' ? '#1A1100' : '#22c55e', fontWeight: 600, fontSize: 12, cursor: 'pointer' }}>✅ Lançados ({lancados})</button>
        </div>

        <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
          <span style={{ fontSize: 11, color: 'var(--text-muted)', alignSelf: 'center', fontWeight: 700, marginRight: 4 }}>GRUPO:</span>
          <button onClick={() => setGroupFilter('ALL')} style={{ padding: '4px 10px', borderRadius: 6, border: '1px solid rgba(255,255,255,0.15)', background: groupFilter === 'ALL' ? 'var(--gold)' : 'transparent', color: groupFilter === 'ALL' ? '#1A1100' : 'var(--text)', fontWeight: 600, fontSize: 11, cursor: 'pointer' }}>TODOS</button>
          {Object.keys(GROUPS).map(g => (
            <button key={g} onClick={() => setGroupFilter(g)} style={{ padding: '4px 10px', borderRadius: 6, border: '1px solid rgba(255,255,255,0.15)', background: groupFilter === g ? 'var(--gold)' : 'transparent', color: groupFilter === g ? '#1A1100' : 'var(--text)', fontWeight: 600, fontSize: 11, cursor: 'pointer' }}>{g}</button>
          ))}
        </div>
      </div>

      {/* Resultados */}
      {filteredFixtures.length === 0 ? (
        <div className="rule-card" style={{ padding: 20, textAlign: 'center', color: 'var(--text-muted)' }}>
          Nenhum jogo encontrado com esses filtros.
        </div>
      ) : (
        Object.keys(filteredByGroup).map(g => (
          <div key={g} className="group-section">
            <div className="group-header">
              <div className="group-badge">{g}</div>
              <div className="group-title">Grupo {g}</div>
              <span style={{ marginLeft: 'auto', fontSize: 11, color: 'var(--text-muted)' }}>
                {filteredByGroup[g].filter(f => {
                  const r = store.results.matches[f.id];
                  return r && r.home !== '' && r.home !== undefined && r.away !== '' && r.away !== undefined;
                }).length}/{filteredByGroup[g].length}
              </span>
            </div>
            <div className="match-list">
              {filteredByGroup[g].map(fix => {
                const result = store.results.matches[fix.id];
                const isDone = result && result.home !== '' && result.home !== undefined && result.away !== '' && result.away !== undefined;
                return (
                  <div key={fix.id} style={{ position: 'relative' }}>
                    {isDone && (
                      <div style={{
                        position: 'absolute', top: 8, right: 8, zIndex: 1,
                        background: '#22c55e', color: '#fff', borderRadius: 4,
                        padding: '2px 6px', fontSize: 9, fontWeight: 700, letterSpacing: 0.5
                      }}>
                        ✅ LANÇADO
                      </div>
                    )}
                    <div style={isDone ? { borderLeft: '3px solid #22c55e', paddingLeft: 4 } : {}}>
                      <MatchCard fix={fix} pred={result} update={updateOfficialResult} isAdmin={true} />
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        ))
      )}
    </div>
  );
}

function AdminKnockoutSection({ store, updateOfficialKnockout }) {
  const [activePhase, setActivePhase] = useState('R32');
  const [viewMode, setViewMode] = useState('visual');
  const [editingMatchId, setEditingMatchId] = useState(null);

  // Resolve os confrontos OFICIAIS a partir dos resultados oficiais dos grupos + resultados oficiais do KO
  const allKO = useMemo(() => {
    return resolveAllKnockout(store.results.matches || {}, store.results.knockout || {});
  }, [store.results.matches, store.results.knockout]);

  const phaseStats = useMemo(() => {
    const out = {};
    KO_PHASE_ORDER.forEach(phase => {
      const matches = allKO[phase] || [];
      out[phase] = {
        total: matches.length,
        filled: matches.filter(m => m.winnerTeam).length,
      };
    });
    return out;
  }, [allKO]);

  const findMatchById = (id) => {
    for (const phase of KO_PHASE_ORDER) {
      const m = (allKO[phase] || []).find(mm => mm.id === id);
      if (m) return { ...m, phase };
    }
    return null;
  };
  const editingMatch = editingMatchId ? findMatchById(editingMatchId) : null;

  const allMatchesFlat = useMemo(() => {
    const flat = [];
    KO_PHASE_ORDER.forEach(phase => {
      (allKO[phase] || []).forEach(m => flat.push({ ...m, phase }));
    });
    return flat;
  }, [allKO]);
  const currentIdx = editingMatchId ? allMatchesFlat.findIndex(m => m.id === editingMatchId) : -1;
  const prevMatch = currentIdx > 0 ? allMatchesFlat[currentIdx - 1] : null;
  const nextMatch = currentIdx >= 0 && currentIdx < allMatchesFlat.length - 1 ? allMatchesFlat[currentIdx + 1] : null;

  return (
    <div className="admin-section">
      <h3>Resultados Oficiais — Mata-Mata</h3>
      <p style={{ color: 'var(--text-dim)', fontSize: 13, marginBottom: 16 }}>
        Lance aqui os placares oficiais dos jogos eliminatórios. Em caso de empate, escolha quem avança nos pênaltis. Os vencedores aparecem automaticamente na próxima fase.
      </p>

      <div className="bracket-toggle">
        <button
          className={`bracket-toggle-btn ${viewMode === 'visual' ? 'active' : ''}`}
          onClick={() => setViewMode('visual')}
        >
          🏆 Chaveamento
        </button>
        <button
          className={`bracket-toggle-btn ${viewMode === 'list' ? 'active' : ''}`}
          onClick={() => setViewMode('list')}
        >
          📋 Por Fase
        </button>
      </div>

      {viewMode === 'visual' && (
        <BracketVisual allKO={allKO} onMatchClick={setEditingMatchId} />
      )}

      {viewMode === 'list' && (
        <>
          <div className="ko-phases-nav">
            {KO_PHASE_ORDER.map(phase => {
              const info = KO_PHASE_INFO[phase];
              const stats = phaseStats[phase];
              const done = stats.filled === stats.total && stats.total > 0;
              return (
                <button
                  key={phase}
                  className={`ko-phase-btn ${activePhase === phase ? 'active' : ''} ${done ? 'done' : ''}`}
                  onClick={() => setActivePhase(phase)}
                >
                  <span>{info.icon} {info.shortLabel}</span>
                  <span className="badge-mini">{stats.filled}/{stats.total}</span>
                </button>
              );
            })}
          </div>

          <KoPhaseSection
            phase={activePhase}
            matches={allKO[activePhase] || []}
            updateKnockout={updateOfficialKnockout}
            isAdmin={true}
          />
        </>
      )}

      {editingMatch && (
        <BracketEditModal
          match={editingMatch}
          updateKnockout={updateOfficialKnockout}
          isAdmin={true}
          onClose={() => setEditingMatchId(null)}
          onPrev={prevMatch ? () => setEditingMatchId(prevMatch.id) : null}
          onNext={nextMatch ? () => setEditingMatchId(nextMatch.id) : null}
        />
      )}
    </div>
  );
}
