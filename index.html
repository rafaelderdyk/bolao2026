<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="color-scheme" content="dark" />
<meta name="theme-color" content="#050810" />
<title>Bolão FIFA 2026 — Premium</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@300;400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

<!-- ===== SCRIPTS NA ORDEM CORRETA ===== -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.js"></script>
<script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.23.6/babel.min.js"></script>

<style>
  :root {
    color-scheme: dark;
    --bg-0: #050810;
    --bg-1: #0a0f1c;
    --bg-2: #111828;
    --bg-3: #1a2238;
    --line: rgba(255,255,255,0.08);
    --line-strong: rgba(255,255,255,0.18);
    --text: #ecf0f8;
    --text-dim: #8a93a8;
    --text-muted: #5b6478;
    --gold: #d4af37;
    --gold-bright: #f4d35e;
    --gold-dim: #8b7320;
    --neon: #00f0ff;
    --neon-dim: #0099aa;
    --green: #00d68a;
    --red: #ff4d6d;
    --orange: #ff9f43;
    --purple: #a855f7;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  /* FORÇA COR DOS INPUTS DE PLACAR */
  input.score-input,
  input.ko-score-input,
  input.bk-edit-score,
  input[type="number"].score-input,
  input[type="number"].ko-score-input,
  input[type="number"].bk-edit-score {
    color: #f4d35e !important;
    -webkit-text-fill-color: #f4d35e !important;
    background-color: rgba(0, 0, 0, 0.5) !important;
    background-image: none !important;
    -webkit-appearance: none !important;
    appearance: none !important;
    opacity: 1 !important;
    caret-color: #f4d35e !important;
    forced-color-adjust: none !important;
  }
  input.score-input:focus,
  input.ko-score-input:focus,
  input.bk-edit-score:focus {
    color: #f4d35e !important;
    -webkit-text-fill-color: #f4d35e !important;
    background-color: rgba(0, 0, 0, 0.7) !important;
  }
  @media (forced-colors: active) {
    input.score-input,
    input.ko-score-input,
    input.bk-edit-score {
      color: #f4d35e !important;
      -webkit-text-fill-color: #f4d35e !important;
      forced-color-adjust: none !important;
    }
  }
  input[type="number"] {
    color-scheme: dark;
  }

  html, body { background: var(--bg-0); color: var(--text); font-family: 'Manrope', sans-serif; min-height: 100vh; -webkit-font-smoothing: antialiased; }
  body {
    background:
      radial-gradient(ellipse 80% 50% at 50% -20%, rgba(212,175,55,0.12), transparent 60%),
      radial-gradient(ellipse 60% 50% at 100% 100%, rgba(0,240,255,0.06), transparent 60%),
      var(--bg-0);
    background-attachment: fixed;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence baseFrequency='0.9' numOctaves='2'/></filter><rect width='100%' height='100%' filter='url(%23n)' opacity='0.4'/></svg>");
    opacity: 0.025;
    pointer-events: none;
    z-index: 1000;
    mix-blend-mode: overlay;
  }

  button { font-family: inherit; cursor: pointer; border: 0; background: none; color: inherit; }
  input, select { font-family: inherit; color: inherit; }
  a { color: inherit; text-decoration: none; }

  .app { min-height: 100vh; }

  .header {
    position: sticky; top: 0; z-index: 100;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    background: rgba(5,8,16,0.7);
    border-bottom: 1px solid var(--line);
  }
  .header-inner {
    max-width: 1400px; margin: 0 auto;
    padding: 14px 24px;
    display: flex; align-items: center; justify-content: space-between;
    gap: 16px;
  }
  .brand {
    display: flex; align-items: center; gap: 12px;
  }
  .brand-logo {
    width: 42px; height: 42px;
    background: linear-gradient(135deg, var(--gold) 0%, var(--gold-bright) 50%, var(--gold) 100%);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 24px rgba(212,175,55,0.4), inset 0 0 12px rgba(255,255,255,0.2);
    font-size: 22px;
  }
  .brand-text { display: flex; flex-direction: column; line-height: 1; }
  .brand-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px; letter-spacing: 1px;
    background: linear-gradient(180deg, #fff 0%, #aab1c5 100%);
    -webkit-background-clip: text; background-clip: text;
    color: transparent;
  }
  .brand-sub { font-size: 10px; letter-spacing: 3px; color: var(--gold); margin-top: 2px; text-transform: uppercase; }

  .header-nav { display: flex; gap: 4px; align-items: center; }
  .nav-btn {
    padding: 8px 14px; border-radius: 8px;
    font-size: 12px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase;
    color: var(--text-dim);
    transition: all 0.15s;
  }
  .nav-btn:hover { color: var(--text); background: rgba(255,255,255,0.04); }
  .nav-btn.active {
    color: var(--gold-bright);
    background: rgba(212,175,55,0.1);
    box-shadow: inset 0 0 0 1px rgba(212,175,55,0.3);
  }

  .header-user {
    display: flex; align-items: center; gap: 10px;
    padding: 6px 12px 6px 6px;
    background: rgba(255,255,255,0.04);
    border-radius: 24px;
    border: 1px solid var(--line);
  }
  .user-avatar {
    width: 30px; height: 30px; border-radius: 50%;
    background: linear-gradient(135deg, var(--neon), var(--purple));
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700;
  }
  .user-name { font-size: 13px; font-weight: 600; }
  .user-logout { font-size: 11px; color: var(--text-muted); padding: 0 4px; }
  .user-logout:hover { color: var(--red); }

  .main { max-width: 1400px; margin: 0 auto; padding: 32px 24px 80px; }

  .page-header { margin-bottom: 28px; }
  .page-eyebrow {
    font-size: 11px; letter-spacing: 4px; text-transform: uppercase;
    color: var(--gold); font-weight: 700; margin-bottom: 8px;
  }
  .page-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(34px, 5vw, 56px);
    letter-spacing: 1px; line-height: 1;
  }
  .page-sub { color: var(--text-dim); margin-top: 8px; max-width: 600px; font-size: 14px; }

  .welcome {
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 32px 20px;
    position: relative;
  }
  .welcome::before {
    content: '';
    position: absolute; inset: 0;
    background:
      radial-gradient(circle at 30% 20%, rgba(212,175,55,0.15), transparent 50%),
      radial-gradient(circle at 70% 80%, rgba(0,240,255,0.08), transparent 50%);
    pointer-events: none;
  }
  .welcome-card {
    max-width: 460px; width: 100%;
    background: linear-gradient(180deg, rgba(26,34,56,0.7), rgba(10,15,28,0.9));
    border: 1px solid var(--line-strong);
    border-radius: 24px;
    padding: 40px 32px;
    box-shadow: 0 30px 80px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.08);
    position: relative; z-index: 1;
    backdrop-filter: blur(20px);
  }
  .welcome-trophy {
    width: 80px; height: 80px; margin: 0 auto 20px;
    background: linear-gradient(135deg, var(--gold) 0%, var(--gold-bright) 50%, var(--gold) 100%);
    border-radius: 20px;
    display: flex; align-items: center; justify-content: center;
    font-size: 42px;
    box-shadow: 0 20px 40px rgba(212,175,55,0.3), inset 0 0 20px rgba(255,255,255,0.2);
    animation: pulse-glow 3s ease-in-out infinite;
  }
  @keyframes pulse-glow {
    0%, 100% { box-shadow: 0 20px 40px rgba(212,175,55,0.3), inset 0 0 20px rgba(255,255,255,0.2); }
    50% { box-shadow: 0 20px 60px rgba(212,175,55,0.5), inset 0 0 30px rgba(255,255,255,0.3); }
  }
  .welcome-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 48px; letter-spacing: 1px; text-align: center; line-height: 0.95;
    background: linear-gradient(180deg, #fff, #c0c8dc);
    -webkit-background-clip: text; background-clip: text;
    color: transparent;
  }
  .welcome-sub {
    text-align: center; color: var(--gold); font-size: 11px; letter-spacing: 4px;
    margin-top: 8px; text-transform: uppercase; font-weight: 700;
  }
  .welcome-desc {
    text-align: center; color: var(--text-dim);
    font-size: 13px; margin-top: 16px; line-height: 1.6;
  }
  .welcome-form { margin-top: 32px; display: flex; flex-direction: column; gap: 14px; }

  .field-label {
    font-size: 11px; text-transform: uppercase; letter-spacing: 2px;
    color: var(--text-dim); font-weight: 700; margin-bottom: 6px;
  }
  .field-input {
    width: 100%;
    background: rgba(0,0,0,0.3);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 14px 16px;
    font-size: 15px;
    transition: all 0.15s;
  }
  .field-input:focus {
    outline: none;
    border-color: var(--gold);
    background: rgba(0,0,0,0.5);
    box-shadow: 0 0 0 3px rgba(212,175,55,0.1);
  }
  .field-input::placeholder { color: var(--text-muted); }

  .btn-primary {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, var(--gold) 0%, var(--gold-bright) 100%);
    color: #1a1100;
    font-weight: 800; font-size: 14px; letter-spacing: 2px;
    text-transform: uppercase;
    border-radius: 12px;
    transition: all 0.15s;
    box-shadow: 0 8px 20px rgba(212,175,55,0.2);
  }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 12px 28px rgba(212,175,55,0.4); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .btn-ghost {
    padding: 10px 18px;
    border-radius: 10px;
    color: var(--text-dim);
    font-weight: 600; font-size: 13px;
    transition: all 0.15s;
    border: 1px solid var(--line);
  }
  .btn-ghost:hover { color: var(--text); border-color: var(--line-strong); background: rgba(255,255,255,0.04); }

  .btn-secondary {
    padding: 12px 20px;
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--line-strong);
    border-radius: 10px;
    font-size: 13px; font-weight: 600;
    transition: all 0.15s;
  }
  .btn-secondary:hover { background: rgba(255,255,255,0.1); }

  .auth-toggle {
    margin-top: 18px; text-align: center; font-size: 12px; color: var(--text-muted);
  }
  .auth-toggle button { color: var(--gold); font-weight: 700; }

  .welcome-rules {
    margin-top: 26px;
    padding: 16px;
    background: rgba(0,0,0,0.3);
    border-radius: 12px;
    border: 1px solid var(--line);
  }
  .welcome-rules-title {
    font-size: 10px; text-transform: uppercase; letter-spacing: 3px;
    color: var(--gold); font-weight: 700; margin-bottom: 10px;
  }
  .welcome-rules-row {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 12px; padding: 4px 0;
    color: var(--text-dim);
  }
  .welcome-rules-row strong { color: var(--text); }

  .countdown {
    display: flex; justify-content: center; gap: 8px;
    margin: 20px 0;
    flex-wrap: wrap;
  }
  .countdown-box {
    background: rgba(0,0,0,0.4);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 10px 14px;
    min-width: 60px;
    text-align: center;
  }
  .countdown-value {
    font-family: 'Space Mono', monospace;
    font-size: 22px; font-weight: 700;
    color: var(--gold-bright);
    line-height: 1;
  }
  .countdown-label {
    font-size: 9px; text-transform: uppercase; letter-spacing: 2px;
    color: var(--text-muted); margin-top: 4px;
  }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 14px;
    margin-bottom: 28px;
  }
  .stat-card {
    background: linear-gradient(180deg, rgba(26,34,56,0.5), rgba(10,15,28,0.5));
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 18px 20px;
    position: relative; overflow: hidden;
    transition: all 0.2s;
  }
  .stat-card:hover { border-color: var(--line-strong); transform: translateY(-2px); }
  .stat-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    opacity: 0.5;
  }
  .stat-label {
    font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
    color: var(--text-muted); font-weight: 700;
  }
  .stat-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 36px; line-height: 1; margin-top: 8px;
    color: var(--gold-bright);
  }
  .stat-meta { font-size: 11px; color: var(--text-dim); margin-top: 4px; }

  .group-section { margin-bottom: 36px; }
  .group-header {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 14px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--line);
  }
  .group-badge {
    width: 36px; height: 36px; border-radius: 10px;
    background: linear-gradient(135deg, var(--bg-3), var(--bg-2));
    border: 1px solid var(--gold);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px; color: var(--gold-bright);
    box-shadow: inset 0 0 12px rgba(212,175,55,0.1);
  }
  .group-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px; letter-spacing: 1px;
  }
  .group-meta { font-size: 11px; color: var(--text-muted); margin-left: auto; }

  .match-list { display: flex; flex-direction: column; gap: 8px; }

  .match-card {
    background: linear-gradient(180deg, rgba(26,34,56,0.4), rgba(10,15,28,0.4));
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 14px 16px;
    display: grid;
    grid-template-columns: 90px 1fr auto 1fr;
    align-items: center; gap: 12px;
    transition: all 0.15s;
    position: relative;
  }
  .match-card:hover { border-color: var(--line-strong); }
  .match-card.locked {
    opacity: 0.55;
    background: rgba(10,15,28,0.6);
  }
  .match-card.locked::after {
    content: '🔒';
    position: absolute; top: 6px; right: 8px;
    font-size: 11px;
  }
  .match-date {
    font-size: 10px; line-height: 1.4;
    color: var(--text-dim);
  }
  .match-date strong { color: var(--gold); display: block; font-size: 11px; }
  .match-team {
    display: flex; align-items: center; gap: 10px;
    font-weight: 600; font-size: 14px;
  }
  .match-team.right { justify-content: flex-end; text-align: right; }
  .team-flag {
    width: 32px; height: 22px; border-radius: 3px;
    background-size: cover; background-position: center;
    border: 1px solid rgba(255,255,255,0.1);
    flex-shrink: 0;
    font-size: 18px;
    display: flex; align-items: center; justify-content: center;
    line-height: 1;
  }
  .team-name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .match-score {
    display: flex; align-items: center; gap: 6px;
  }
  .score-input {
    width: 42px; height: 42px;
    text-align: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px !important;
    font-weight: 700;
    background: rgba(0,0,0,0.4) !important;
    border: 1px solid var(--line);
    border-radius: 8px;
    transition: all 0.15s;
    color: #f4d35e !important;
    -webkit-text-fill-color: #f4d35e !important;
    caret-color: #f4d35e;
    text-shadow: 0 0 6px rgba(212,175,55,0.2);
  }
  .score-input::placeholder {
    color: rgba(255,255,255,0.25);
    -webkit-text-fill-color: rgba(255,255,255,0.25);
    font-size: 18px;
  }
  .score-input:focus {
    outline: none;
    border-color: var(--gold);
    background: rgba(0,0,0,0.6) !important;
    box-shadow: 0 0 0 3px rgba(212,175,55,0.1);
  }
  .score-input.filled {
    background: rgba(212,175,55,0.08) !important;
    border-color: rgba(212,175,55,0.4);
  }
  .score-input::-webkit-outer-spin-button,
  .score-input::-webkit-inner-spin-button {
    -webkit-appearance: none;
    margin: 0;
  }
  .score-input[type=number] {
    -moz-appearance: textfield;
  }
  .score-sep { color: var(--text-muted); font-weight: 700; }

  .standings {
    background: linear-gradient(180deg, rgba(26,34,56,0.5), rgba(10,15,28,0.5));
    border: 1px solid var(--line);
    border-radius: 14px;
    overflow: hidden;
    margin-top: 12px;
  }
  .standings-row {
    display: grid;
    grid-template-columns: 30px 2fr repeat(6, 30px);
    gap: 8px;
    padding: 10px 14px;
    align-items: center;
    font-size: 12px;
    border-bottom: 1px solid var(--line);
  }
  .standings-row:last-child { border-bottom: none; }
  .standings-row.head {
    font-size: 9px; letter-spacing: 2px; text-transform: uppercase;
    color: var(--text-muted); font-weight: 700;
    background: rgba(0,0,0,0.3);
  }
  .standings-row .pos {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px; color: var(--gold);
  }
  .standings-row.qualified { background: rgba(212,175,55,0.06); }
  .standings-row.qualified .pos { color: var(--gold-bright); }
  .standings-row.third { background: rgba(0,240,255,0.04); }
  .standings-row .num { text-align: center; font-family: 'Space Mono', monospace; }

  .bracket-wrap {
    overflow-x: auto;
    padding-bottom: 20px;
    -webkit-overflow-scrolling: touch;
  }
  .bracket {
    display: flex;
    gap: 24px;
    min-width: 1400px;
    padding: 20px 0;
  }
  .bracket-round {
    display: flex; flex-direction: column;
    justify-content: space-around;
    gap: 16px;
    flex: 1;
    min-width: 200px;
  }
  .bracket-round-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px; letter-spacing: 2px;
    color: var(--gold); text-align: center;
    margin-bottom: 8px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--line);
  }
  .bracket-match {
    background: rgba(26,34,56,0.6);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 10px;
    font-size: 12px;
    transition: all 0.15s;
  }
  .bracket-match:hover { border-color: var(--gold-dim); }
  .bracket-match.final-match {
    border-color: var(--gold);
    background: linear-gradient(180deg, rgba(212,175,55,0.1), rgba(26,34,56,0.6));
    box-shadow: 0 0 20px rgba(212,175,55,0.2);
  }
  .bracket-team {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 4px;
    border-radius: 6px;
  }
  .bracket-team.winner { background: rgba(212,175,55,0.1); color: var(--gold-bright); font-weight: 700; }
  .bracket-team .flag-mini { font-size: 14px; }
  .bracket-team .name { flex: 1; font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .bracket-team .score {
    font-family: 'Space Mono', monospace;
    font-weight: 700; min-width: 20px; text-align: center;
  }
  .bracket-team .score-edit {
    width: 28px; height: 24px; padding: 0;
    font-size: 13px;
  }
  .bracket-sep { height: 1px; background: var(--line); margin: 2px 0; }
  .bracket-label {
    font-size: 9px; text-transform: uppercase; letter-spacing: 1px;
    color: var(--text-muted); text-align: center; margin-top: 4px;
  }

  .ranking-card {
    background: linear-gradient(180deg, rgba(26,34,56,0.6), rgba(10,15,28,0.6));
    border: 1px solid var(--line);
    border-radius: 16px;
    overflow: hidden;
  }
  .ranking-row {
    display: grid;
    grid-template-columns: 60px 1fr 100px 80px 80px;
    align-items: center;
    padding: 14px 20px;
    border-bottom: 1px solid var(--line);
    gap: 12px;
    transition: all 0.15s;
  }
  .ranking-row:last-child { border-bottom: none; }
  .ranking-row:hover { background: rgba(255,255,255,0.02); }
  .ranking-row.head {
    background: rgba(0,0,0,0.3);
    font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
    color: var(--text-muted); font-weight: 700;
  }
  .ranking-pos {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px; color: var(--text-dim);
    text-align: center;
  }

async function loadAllFromSupabase() {
  try {
    if (!supabase) {
      console.error('Supabase não disponível');
      return defaultStore();
    }
    
    const [{ data: users, error: e1 }, { data: results, error: e2 }] = await Promise.all([
      supabase.from('bolao_users').select('*'),
      supabase.from('bolao_results').select('*').eq('id', 1).maybeSingle(),
    ]);
    if (e1) console.error('Erro ao carregar usuários:', e1);
    if (e2) console.error('Erro ao carregar resultados:', e2);

    const usersMap = {};
    (users || []).forEach(u => { usersMap[u.username] = userFromRow(u); });
    return {
      users: usersMap,
      results: resultsFromRow(results),
      currentUser: localStorage.getItem(SESSION_KEY) || null,
    };
  } catch (err) {
    console.error('Erro Supabase:', err);
    return defaultStore();
  }
}

async function upsertUser(user) {
  if (!supabase) return false;
  const row = {
    username: user.username,
    name: user.name,
    whatsapp: user.whatsapp || '',
    password: user.password,
    is_admin: !!user.isAdmin,
    predictions: user.predictions || {},
    extras: user.extras || {},
    knockout: user.knockout || {},
    updated_at: new Date().toISOString(),
  };
  const { error } = await supabase.from('bolao_users').upsert(row, { onConflict: 'username' });
  if (error) console.error('Erro ao salvar usuário:', error);
  return !error;
}

async function deleteUserDb(username) {
  if (!supabase) return false;
  const { error } = await supabase.from('bolao_users').delete().eq('username', username);
  if (error) console.error('Erro ao deletar usuário:', error);
  return !error;
}

async function updateResultsDb(results) {
  if (!supabase) return false;
  const row = {
    id: 1,
    matches: results.matches || {},
    knockout: results.knockout || {},
    champion: results.champion || '',

  return !error;
}

// CALCULATIONS
// =====================================================================

function calcStandings(predictions, group) {
  const teams = GROUPS[group];
  const table = teams.map(t => ({ team: t, p: 0, w: 0, d: 0, l: 0, gf: 0, ga: 0, gd: 0, pts: 0 }));
  const groupFixtures = FIXTURES.filter(f => f.group === group);

  groupFixtures.forEach(fix => {
    const pred = predictions?.[fix.id];
    if (!pred || pred.home === '' || pred.away === '') return;
    const h = parseInt(pred.home), a = parseInt(pred.away);
    if (isNaN(h) || isNaN(a)) return;
    const rowH = table.find(r => r.team === fix.home);
    const rowA = table.find(r => r.team === fix.away);
    if (!rowH || !rowA) return;
    rowH.p++; rowA.p++;
    rowH.gf += h; rowH.ga += a;
    rowA.gf += a; rowA.ga += h;
    if (h > a) { rowH.w++; rowH.pts += 3; rowA.l++; }
    else if (h < a) { rowA.w++; rowA.pts += 3; rowH.l++; }
    else { rowH.d++; rowA.d++; rowH.pts++; rowA.pts++; }
  });

  table.forEach(r => r.gd = r.gf - r.ga);
  table.sort((x, y) => y.pts - x.pts || y.gd - x.gd || y.gf - x.gf || x.team.localeCompare(y.team));
  return table;
}

function getQualifiedTeams(predictions) {
  const firstPlaces = {}, secondPlaces = {}, thirdPlacesArr = [];
  Object.keys(GROUPS).forEach(g => {
    const t = calcStandings(predictions, g);
    firstPlaces[g] = t[0]?.team || '';
    secondPlaces[g] = t[1]?.team || '';
    if (t[2]) thirdPlacesArr.push({ group: g, ...t[2] });
  });
  thirdPlacesArr.sort((x, y) => y.pts - x.pts || y.gd - x.gd || y.gf - x.gf);
  return { firstPlaces, secondPlaces, thirdPlaces: thirdPlacesArr.slice(0, 8) };
}

function getKnockoutWinner(matchData) {
  if (!matchData) return null;
  const a = parseInt(matchData.scoreA);
  const b = parseInt(matchData.scoreB);
  if (isNaN(a) || isNaN(b)) return null;
  if (a > b) return 'A';
  if (b > a) return 'B';
  if (matchData.penaltyWinner === 'A' || matchData.penaltyWinner === 'B') {
    return matchData.penaltyWinner;
  }
  return null;
}

function resolveSlot(slot, qualified, knockout) {
  if (!slot) return null;
  if (/^1[A-L]$/.test(slot)) return qualified.firstPlaces[slot[1]] || null;
  if (/^2[A-L]$/.test(slot)) return qualified.secondPlaces[slot[1]] || null;
  if (slot.startsWith('3')) {
    const allowed = slot.substring(1).split('/');
    for (const t of qualified.thirdPlaces) {
      if (allowed.includes(t.group)) return t.team;
    }
    return null;
  }
  if (slot.startsWith('W:')) {
    const matchId = slot.slice(2);
    const data = knockout[matchId];
    if (!data) return null;
    const w = getKnockoutWinner(data);
    if (!w) return null;
    return w === 'A' ? data.teamA : data.teamB;
  }
  if (slot.startsWith('L:')) {
    const matchId = slot.slice(2);
    const data = knockout[matchId];
    if (!data) return null;
    const w = getKnockoutWinner(data);
    if (!w) return null;
    return w === 'A' ? data.teamB : data.teamA;
  }
  return null;
}

function resolveAllKnockout(predictions, knockoutPicks) {
  const qualified = getQualifiedTeams(predictions);
  const knockout = { ...(knockoutPicks || {}) };

  const thirdSlots = [];
  KO_STRUCTURE.R32.forEach((m, idx) => {
    if (m.a.startsWith('3')) thirdSlots.push({ matchIdx: idx, side: 'a', allowed: m.a.substring(1).split('/') });
    if (m.b.startsWith('3')) thirdSlots.push({ matchIdx: idx, side: 'b', allowed: m.b.substring(1).split('/') });
  });

  const thirdsByGroup = {};
  qualified.thirdPlaces.forEach(t => { thirdsByGroup[t.group] = t.team; });
  const availableGroups = Object.keys(thirdsByGroup);

  const slotOptionsCount = thirdSlots.map(s => s.allowed.filter(g => availableGroups.includes(g)).length);
  const slotOrder = thirdSlots.map((_, i) => i).sort((a, b) => slotOptionsCount[a] - slotOptionsCount[b]);

  const assignment = {};
  function tryAssign(orderIdx, usedGroups) {
    if (orderIdx === slotOrder.length) return true;
    const slotIdx = slotOrder[orderIdx];
    const slot = thirdSlots[slotIdx];
    for (const g of slot.allowed) {
      if (!availableGroups.includes(g)) continue;
      if (usedGroups.has(g)) continue;
      const key = `${slot.matchIdx}_${slot.side}`;
      assignment[key] = g;
      usedGroups.add(g);
      if (tryAssign(orderIdx + 1, usedGroups)) return true;
      usedGroups.delete(g);
      delete assignment[key];
    }
    return false;
  }
  if (availableGroups.length >= 8) {
    tryAssign(0, new Set());
  }

  const getThirdForSlot = (matchIdx, side) => {
    const key = `${matchIdx}_${side}`;
    const group = assignment[key];
    return group ? thirdsByGroup[group] : null;
  };

  const out = {};
  KO_PHASE_ORDER.forEach(phase => {
    out[phase] = KO_STRUCTURE[phase].map((m, idx) => {
      let teamA, teamB;

      if (phase === 'R32') {
        if (m.a.startsWith('3')) teamA = getThirdForSlot(idx, 'a');
        else teamA = resolveSlot(m.a, qualified, knockout);

        if (m.b.startsWith('3')) teamB = getThirdForSlot(idx, 'b');
        else teamB = resolveSlot(m.b, qualified, knockout);
      } else {
        teamA = resolveSlot(m.a, qualified, knockout);
        teamB = resolveSlot(m.b, qualified, knockout);
      }

      const userData = knockout[m.id] || {};
      knockout[m.id] = {
        teamA: teamA || userData.teamA || null,
        teamB: teamB || userData.teamB || null,
        scoreA: userData.scoreA ?? '',
        scoreB: userData.scoreB ?? '',
        penaltyWinner: userData.penaltyWinner || null,
        tiebreakMode: userData.tiebreakMode || null,
      };
      return {
        id: m.id,
        date: m.date,
        slotA: m.a,
        slotB: m.b,
        teamA: knockout[m.id].teamA,
        teamB: knockout[m.id].teamB,
        scoreA: knockout[m.id].scoreA,
        scoreB: knockout[m.id].scoreB,
        penaltyWinner: knockout[m.id].penaltyWinner,
        tiebreakMode: knockout[m.id].tiebreakMode,
        winner: getKnockoutWinner(knockout[m.id]),
        winnerTeam: (() => {
          const w = getKnockoutWinner(knockout[m.id]);
          if (!w) return null;
          return w === 'A' ? knockout[m.id].teamA : knockout[m.id].teamB;
        })(),
      };
    });
  });
  return out;
}

const SURVIVAL_POINTS = {
  R16: 1,
  QF:  2,
  SF:  3,
  F:   5,
};

function getSurvivorsByPhase(allKO) {
  const out = { R16: new Set(), QF: new Set(), SF: new Set(), F: new Set() };
  ['R16', 'QF', 'SF', 'F'].forEach(phase => {
    (allKO[phase] || []).forEach(m => {
      if (m.teamA) out[phase].add(m.teamA);
      if (m.teamB) out[phase].add(m.teamB);
    });
  });
  return out;
}

function computeSurvivalBonus(userAllKO, realAllKO) {
  const userSurv = getSurvivorsByPhase(userAllKO);
  const realSurv = getSurvivorsByPhase(realAllKO);
  let totalPoints = 0;
  const breakdown = {};
  ['R16', 'QF', 'SF', 'F'].forEach(phase => {
    const matches = [...userSurv[phase]].filter(t => realSurv[phase].has(t));
    breakdown[phase] = {
      matched: matches.length,
      total: realSurv[phase].size,
      points: matches.length * SURVIVAL_POINTS[phase],
      pointsPerTeam: SURVIVAL_POINTS[phase],
      teams: matches,
    };
    totalPoints += breakdown[phase].points;
  });
  return { totalPoints, breakdown };
}

function computeUserPoints(user, results) {
  let points = 0;
  let stats = { exact: 0, winner: 0, totalGames: 0, koMatches: 0 };
  if (!user || !user.predictions) return { points, stats };

  FIXTURES.forEach(fix => {
    const pred = user.predictions[fix.id];
    const real = results.matches[fix.id];
    if (!pred || !real || pred.home === '' || pred.away === '' || real.home === '' || real.away === '') return;
    if (real.home === undefined || real.away === undefined) return;
    stats.totalGames++;
    const ph = parseInt(pred.home), pa = parseInt(pred.away);
    const rh = parseInt(real.home), ra = parseInt(real.away);
    if (isNaN(ph) || isNaN(pa) || isNaN(rh) || isNaN(ra)) return;
    if (ph === rh && pa === ra) { points += 5; stats.exact++; }
    else {
      const pResult = ph > pa ? 'H' : ph < pa ? 'A' : 'D';
      const rResult = rh > ra ? 'H' : rh < ra ? 'A' : 'D';
      if (pResult === rResult) { points += 2; stats.winner++; }
    }
  });

  if (results.standings) {
    const userStandings = {};
    Object.keys(GROUPS).forEach(g => {
      userStandings[g] = calcStandings(user.predictions, g).map(r => r.team);
    });
    Object.keys(results.standings).forEach(g => {
      const real = results.standings[g];
      const pred = userStandings[g];
      if (!real || real.length === 0) return;
      real.forEach((team, idx) => {
        if (pred?.[idx] === team) points += 3;
      });
    });
  }

  const hasOfficialKnockout = results.knockout && Object.keys(results.knockout).some(k => {
    const m = results.knockout[k];
    return m && (m.scoreA !== '' && m.scoreA !== undefined && m.scoreA !== null);
  });
  if (hasOfficialKnockout) {
    const userKO = resolveAllKnockout(user.predictions, user.knockout || {});
    const realKO = resolveAllKnockout(
      results.matches ? Object.fromEntries(Object.entries(results.matches).map(([k,v])=>[k,{home:v.home,away:v.away}])) : {},
      results.knockout
    );
    stats.koExact = 0;
    stats.koWinner = 0;
    stats.koHalf = 0;
    stats.koSlot = 0;

    KO_PHASE_ORDER.forEach(phase => {
      const phaseInfo = KO_PHASE_INFO[phase];
      const userMatches = userKO[phase] || [];
      const realMatches = realKO[phase] || [];

      realMatches.forEach((rm, idx) => {
        const um = userMatches[idx];
        if (!um || !rm.teamA || !rm.teamB) return;
        if (!um.teamA || !um.teamB) return;

        // --- Identificar categoria: Confronto Completo / Meio Confronto / Slot ---
        const realPair = new Set([rm.teamA, rm.teamB]);
        const userPair = new Set([um.teamA, um.teamB]);
        const teamsCorrect = [...realPair].filter(t => userPair.has(t)).length;
        const isConfronto = teamsCorrect === 2;
        const isMeio = teamsCorrect === 1;
        // teamsCorrect === 0 → Slot

        // Scores do resultado real
        const realHasScore = rm.scoreA !== '' && rm.scoreA !== undefined && rm.scoreA !== null
                          && rm.scoreB !== '' && rm.scoreB !== undefined && rm.scoreB !== null;
        const userHasScore = um.scoreA !== '' && um.scoreA !== undefined && um.scoreA !== null
                          && um.scoreB !== '' && um.scoreB !== undefined && um.scoreB !== null;

        // ---- NÍVEL 1: Confronto Completo ----
        if (isConfronto) {
          points += phaseInfo.points;
          stats.koMatches++;

          if (!realHasScore || !userHasScore) return;

          const rScoreA = parseInt(rm.scoreA), rScoreB = parseInt(rm.scoreB);
          let uScoreForRealA, uScoreForRealB;
          if (um.teamA === rm.teamA) {
            uScoreForRealA = parseInt(um.scoreA);
            uScoreForRealB = parseInt(um.scoreB);
          } else {
            uScoreForRealA = parseInt(um.scoreB);
            uScoreForRealB = parseInt(um.scoreA);
          }
          if (isNaN(uScoreForRealA) || isNaN(uScoreForRealB) || isNaN(rScoreA) || isNaN(rScoreB)) return;

          if (uScoreForRealA === rScoreA && uScoreForRealB === rScoreB) {
            points += phaseInfo.exactBonus;
            stats.koExact++;
          } else {
            const uResult = uScoreForRealA > uScoreForRealB ? 'A' : uScoreForRealA < uScoreForRealB ? 'B' : 'D';
            const rResult = rScoreA > rScoreB ? 'A' : rScoreA < rScoreB ? 'B' : 'D';
            if (uResult === rResult) {
              points += phaseInfo.winnerBonus;
              stats.koWinner++;
            }
          }
          return;
        }

        // ---- NÍVEL 2: Meio Confronto (1 time certo) ----
        if (isMeio) {
          points += phaseInfo.halfMatch;
          stats.koHalf++;
          return;
        }

        // ---- NÍVEL 3: Slot (0 times certos) ----
        if (!realHasScore || !userHasScore) return;
        const rSA = parseInt(rm.scoreA), rSB = parseInt(rm.scoreB);
        const uSA = parseInt(um.scoreA), uSB = parseInt(um.scoreB);
        if (isNaN(rSA) || isNaN(rSB) || isNaN(uSA) || isNaN(uSB)) return;

        if (uSA === rSA && uSB === rSB) {
          points += phaseInfo.slotExact;
          stats.koSlot++;
        } else {
          const uResult = uSA > uSB ? 'A' : uSA < uSB ? 'B' : 'D';
          const rResult = rSA > rSB ? 'A' : rSA < rSB ? 'B' : 'D';
          if (uResult === rResult) {
            points += phaseInfo.slotWinner;
            stats.koSlot++;
          }
        }
      });
    });
  }

  if (hasOfficialKnockout) {
    const userAllKO = resolveAllKnockout(user.predictions, user.knockout || {});
    const realAllKO = resolveAllKnockout(
      results.matches ? Object.fromEntries(Object.entries(results.matches).map(([k,v])=>[k,{home:v.home,away:v.away}])) : {},
      results.knockout || {}
    );
    const survBonus = computeSurvivalBonus(userAllKO, realAllKO);
    points += survBonus.totalPoints;
    stats.survivalBonus = survBonus.totalPoints;
    stats.survivalBreakdown = survBonus.breakdown;
  }

  const extras = user.extras || {};
  if (results.champion && extras.champion === results.champion) points += 25;
  if (results.vice && extras.vice === results.vice) points += 18;
  if (results.third && extras.third === results.third) points += 12;
  if (results.fourth && extras.fourth === results.fourth) points += 10;
  if (results.topScorer && extras.topScorer &&
      extras.topScorer.trim().toLowerCase() === results.topScorer.trim().toLowerCase()) points += 15;

  return { points, stats };
}

const fmtDateBR = (iso) => {
  const d = new Date(iso);
  const day = d.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit' });
  const time = d.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
  const weekday = d.toLocaleDateString('pt-BR', { weekday: 'short' });
  return { day, time, weekday: weekday.replace('.', '').toUpperCase() };
};

const isMatchLocked = (fixDate, globalDeadline = DEADLINE) => {
  return Date.now() >= globalDeadline;
};

const getInitials = (name) => name.trim().split(/\s+/).slice(0, 2).map(w => w[0]?.toUpperCase() || '').join('');

const getAvatarColor = (name) => {
  let hash = 0;
  for (let i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
  const hue = Math.abs(hash) % 360;
  return `linear-gradient(135deg, hsl(${hue},65%,55%), hsl(${(hue+60)%360},65%,55%))`;
};

function Countdown({ target }) {
  const [now, setNow] = useState(Date.now());
  useEffect(() => {
    const id = setInterval(() => setNow(Date.now()), 1000);
    return () => clearInterval(id);
  }, []);
  const diff = Math.max(0, target - now);
  const d = Math.floor(diff / (1000 * 60 * 60 * 24));
  const h = Math.floor((diff / (1000 * 60 * 60)) % 24);
  const m = Math.floor((diff / (1000 * 60)) % 60);
  const s = Math.floor((diff / 1000) % 60);
  if (diff <= 0) return <div style={{ color: 'var(--red)', textAlign: 'center', fontWeight: 700 }}>PRAZO ENCERRADO</div>;
  return (
    <div className="countdown">
      <div className="countdown-box"><div className="countdown-value">{String(d).padStart(2, '0')}</div><div className="countdown-label">Dias</div></div>
      <div className="countdown-box"><div className="countdown-value">{String(h).padStart(2, '0')}</div><div className="countdown-label">Hrs</div></div>
      <div className="countdown-box"><div className="countdown-value">{String(m).padStart(2, '0')}</div><div className="countdown-label">Min</div></div>
      <div className="countdown-box"><div className="countdown-value">{String(s).padStart(2, '0')}</div><div className="countdown-label">Seg</div></div>
    </div>
  );
}

function App() {
  const [store, setStore] = useState(defaultStore);
  const [loading, setLoading] = useState(true);
  const [page, setPage] = useState('palpites');
  const [toast, setToast] = useState(null);
  const [showSaveIndicator, setShowSaveIndicator] = useState(false);
  const [espnSyncing, setEspnSyncing] = useState(false);
  const [espnLastSync, setEspnLastSync] = useState(null);
  const saveTimeoutRef = useRef(null);

  useEffect(() => {
    let mounted = true;
    (async () => {
      const data = await loadAllFromSupabase();
      if (mounted) {
        setStore(data);
        setLoading(false);
      }
    })();

    if (supabase) {
      const channel = supabase
        .channel('bolao_changes')
        .on('postgres_changes', { event: '*', schema: 'public', table: 'bolao_users' }, async () => {
          const { data } = await supabase.from('bolao_users').select('*');
          if (!mounted) return;
          const usersMap = {};
          (data || []).forEach(u => { usersMap[u.username] = userFromRow(u); });
          setStore(prev => ({ ...prev, users: usersMap }));
        })
        .on('postgres_changes', { event: '*', schema: 'public', table: 'bolao_results' }, async () => {
          const { data } = await supabase.from('bolao_results').select('*').eq('id', 1).maybeSingle();
          if (!mounted) return;
          setStore(prev => ({ ...prev, results: resultsFromRow(data) }));
        })
        .subscribe();

      return () => {
        mounted = false;
        supabase.removeChannel(channel);
      };
    }
    
    return () => { mounted = false; };
  }, []);

  const showToast = (msg, type = 'success') => {
    setToast({ msg, type });
    setTimeout(() => setToast(null), 2500);
  };

  const triggerSaveIndicator = () => {
    setShowSaveIndicator(true);
    if (saveTimeoutRef.current) clearTimeout(saveTimeoutRef.current);
    saveTimeoutRef.current = setTimeout(() => setShowSaveIndicator(false), 1500);
  };

  const currentUser = store.currentUser ? store.users[store.currentUser] : null;
  const isLoggedIn = !!currentUser;
  const isAdmin = currentUser?.isAdmin === true;

  const handleLogin = async (username, password) => {
    const u = username.trim().toLowerCase();
    if (u === 'admin' && password === ADMIN_PASSWORD) {
      let adminUser = store.users['admin'];
      if (!adminUser) {
        const newAdmin = {
          username: 'admin', name: 'Administrador', whatsapp: '',
          password: ADMIN_PASSWORD, isAdmin: true,
          predictions: {}, extras: {},
        };
        await upsertUser(newAdmin);
        adminUser = newAdmin;
      } else if (!adminUser.isAdmin) {
        await upsertUser({ ...adminUser, isAdmin: true });
      }
      localStorage.setItem(SESSION_KEY, 'admin');
      setStore(prev => ({
        ...prev,
        users: { ...prev.users, admin: { ...(prev.users.admin || adminUser), isAdmin: true } },
        currentUser: 'admin',
      }));
      showToast('Bem-vindo, Admin');
      return true;
    }
    const user = store.users[u];
    if (!user) { showToast('Usuário não encontrado', 'error'); return false; }
    if (user.password !== password) { showToast('Senha incorreta', 'error'); return false; }
    localStorage.setItem(SESSION_KEY, u);
    setStore(prev => ({ ...prev, currentUser: u }));
    showToast(`Bem-vindo, ${user.name.split(' ')[0]}!`);
    return true;
  };

  const handleRegister = async ({ username, name, whatsapp, password }) => {
    const u = username.trim().toLowerCase();
    if (!u || !name || !password) { showToast('Preencha todos os campos', 'error'); return false; }
    if (u === 'admin') { showToast('Usuário reservado', 'error'); return false; }

    if (supabase) {
      const { data: existing } = await supabase.from('bolao_users').select('username').eq('username', u).maybeSingle();
      if (existing) { showToast('Esse nome de usuário já existe', 'error'); return false; }
    }

    const newUser = {
      username: u, name: name.trim(), whatsapp: whatsapp.trim(),
      password, isAdmin: false,
      predictions: {}, extras: {},
      createdAt: Date.now(),
    };
    const ok = await upsertUser(newUser);
    if (!ok) { showToast('Erro ao criar conta. Tente novamente.', 'error'); return false; }
    localStorage.setItem(SESSION_KEY, u);
    setStore(prev => ({
      ...prev,
      users: { ...prev.users, [u]: newUser },
      currentUser: u,
    }));
    showToast(`Conta criada! Bem-vindo, ${name.split(' ')[0]}.`);
    return true;
  };

  const handleLogout = () => {
    localStorage.removeItem(SESSION_KEY);
    setStore(prev => ({ ...prev, currentUser: null }));
    setPage('palpites');
  };

  const updatePrediction = async (matchId, side, value) => {
    if (!currentUser) return;
    const fix = FIXTURES.find(f => f.id === matchId);
    if (fix && !isAdmin && isMatchLocked(fix.date)) {
      showToast('Este jogo está bloqueado para edição', 'error');
      return;
    }
    const u = store.currentUser;
    const user = { ...store.users[u] };
    user.predictions = { ...user.predictions };
    user.predictions[matchId] = { ...(user.predictions[matchId] || { home: '', away: '' }) };
    user.predictions[matchId][side] = value;

    setStore(prev => ({ ...prev, users: { ...prev.users, [u]: user } }));
    triggerSaveIndicator();
    await upsertUser(user);
  };

  const updateExtra = async (field, value) => {
    if (!currentUser) return;
    if (Date.now() >= DEADLINE && !isAdmin) {
      showToast('Prazo encerrado', 'error');
      return;
    }
    const u = store.currentUser;
    const user = { ...store.users[u], extras: { ...(store.users[u].extras || {}), [field]: value } };
    setStore(prev => ({ ...prev, users: { ...prev.users, [u]: user } }));
    triggerSaveIndicator();
    await upsertUser(user);
  };

  const updateKnockout = async (matchId, field, value) => {
    if (!currentUser) return;
    if (Date.now() >= DEADLINE && !isAdmin) {
      showToast('Prazo encerrado para palpites', 'error');
      return;
    }
    const u = store.currentUser;
    const user = { ...store.users[u] };
    user.knockout = { ...(user.knockout || {}) };
    user.knockout[matchId] = { ...(user.knockout[matchId] || {}), [field]: value };
    if (field === 'scoreA' || field === 'scoreB') {
      const a = parseInt(field === 'scoreA' ? value : user.knockout[matchId].scoreA);
      const b = parseInt(field === 'scoreB' ? value : user.knockout[matchId].scoreB);
      if (!isNaN(a) && !isNaN(b) && a !== b) {
        user.knockout[matchId].penaltyWinner = null;
      }
    }
    setStore(prev => ({ ...prev, users: { ...prev.users, [u]: user } }));
    triggerSaveIndicator();
    await upsertUser(user);
  };

  const updateOfficialResult = async (matchId, side, value) => {
    const newResults = { ...store.results, matches: { ...store.results.matches } };
    newResults.matches[matchId] = { ...(newResults.matches[matchId] || { home: '', away: '' }) };
    newResults.matches[matchId][side] = value;
    setStore(prev => ({ ...prev, results: newResults }));
    triggerSaveIndicator();
    await updateResultsDb(newResults);
  };

  const syncWithEspn = async (silent = false) => {
    setEspnSyncing(true);
    try {
      const events = await fetchEspnScoreboard();
      const newMatches = { ...store.results.matches };
      let updated = 0, finished = 0;
      const unmatched = [];

      FIXTURES.forEach(fix => {
        const ev = findEspnEvent(fix, events);
        if (!ev) { unmatched.push(fix.id); return; }

        const comp = ev.competitions?.[0];
        const statusName = comp?.status?.type?.name || '';
        const isFinal = statusName === 'STATUS_FINAL' || !!comp?.status?.type?.completed;
        if (statusName === 'STATUS_SCHEDULED' || statusName === '') return;

        const competitors = comp?.competitors || [];
        const homeC = competitors.find(c => espnTeamMatches(fix.home, c?.team?.displayName || c?.team?.name || ''));
        const awayC = competitors.find(c => espnTeamMatches(fix.away, c?.team?.displayName || c?.team?.name || ''));
        if (!homeC || !awayC) return;
        if (homeC.score == null || awayC.score == null) return;

        const hs = String(homeC.score), as = String(awayC.score);
        const cur = newMatches[fix.id] || {};
        if (cur.home !== hs || cur.away !== as) {
          newMatches[fix.id] = { home: hs, away: as };
          updated++;
          if (isFinal) finished++;
        }
      });

      if (updated > 0) {
        const newResults = { ...store.results, matches: newMatches };
        setStore(prev => ({ ...prev, results: newResults }));
        triggerSaveIndicator();
        await updateResultsDb(newResults);
      }

      setEspnLastSync(new Date());
      if (!silent) {
        showToast(`ESPN: ${updated} jogo(s) atualizado(s)${finished ? `, ${finished} finalizado(s)` : ''}. ${unmatched.length} sem correspondência.`);
      }
      return { updated, finished, unmatched };
    } catch (err) {
      console.error('Erro ao sincronizar com ESPN:', err);
      if (!silent) showToast('Erro ao sincronizar com a ESPN. Veja o console.', 'error');
      return null;
    } finally {
      setEspnSyncing(false);
    }
  };

  useEffect(() => {
    if (!isAdmin || loading) return;
    syncWithEspn(true);
    const interval = setInterval(() => syncWithEspn(true), 3 * 60 * 1000);
    return () => clearInterval(interval);
  }, [isAdmin, loading]);

  const updateOfficialExtra = async (field, value) => {
    const newResults = { ...store.results, [field]: value };
    setStore(prev => ({ ...prev, results: newResults }));
    triggerSaveIndicator();
    await updateResultsDb(newResults);
  };

  const updateOfficialKnockout = async (matchId, field, value) => {
    const newResults = { ...store.results };
    newResults.knockout = { ...(newResults.knockout || {}) };
    newResults.knockout[matchId] = { ...(newResults.knockout[matchId] || {}), [field]: value };
    if (field === 'scoreA' || field === 'scoreB') {
      const a = parseInt(field === 'scoreA' ? value : newResults.knockout[matchId].scoreA);
      const b = parseInt(field === 'scoreB' ? value : newResults.knockout[matchId].scoreB);
      if (!isNaN(a) && !isNaN(b) && a !== b) {
        newResults.knockout[matchId].penaltyWinner = null;
      }
    }
    setStore(prev => ({ ...prev, results: newResults }));
    triggerSaveIndicator();
    await updateResultsDb(newResults);
  };

  const deleteUser = async (username) => {
    if (username === 'admin') return;
    if (!confirm(`Remover ${store.users[username].name}?`)) return;
    await deleteUserDb(username);
    setStore(prev => {
      const next = { ...prev, users: { ...prev.users } };
      delete next.users[username];
      return next;
    });
    showToast('Participante removido');
  };

  if (loading) {
    return (
      <div className="welcome">
        <div style={{ textAlign: 'center', padding: 40 }}>
          <div className="welcome-trophy">🏆</div>
          <div style={{ marginTop: 20, color: 'var(--gold)', letterSpacing: 3, fontSize: 12, textTransform: 'uppercase' }}>
            Carregando bolão...
          </div>
        </div>
      </div>
    );
  }

  if (!isLoggedIn) {
    return (
      <>
        <LoginScreen onLogin={handleLogin} onRegister={handleRegister} />
        {toast && <div className={`toast ${toast.type}`}>{toast.msg}</div>}
      </>
    );
  }

  return (
    <div className="app">
      <Header
        currentUser={currentUser}
        page={page}
        onChangePage={setPage}
        onLogout={handleLogout}
      />

      <main className="main">
        {page === 'palpites' && <PalpitesPage store={store} user={currentUser} updatePrediction={updatePrediction} updateExtra={updateExtra} />}
        {page === 'mata-mata' && <MataMataPage store={store} user={currentUser} updateKnockout={updateKnockout} />}
        {page === 'ranking' && <RankingPage store={store} />}
        {page === 'comparar' && <CompararPage store={store} />}
        {page === 'regras' && <RegrasPage />}
        {page === 'admin' && isAdmin && <AdminPage store={store} updateOfficialResult={updateOfficialResult} updateOfficialExtra={updateOfficialExtra} updateOfficialKnockout={updateOfficialKnockout} deleteUser={deleteUser} showToast={showToast} syncWithEspn={syncWithEspn} espnSyncing={espnSyncing} espnLastSync={espnLastSync} />}
      </main>

      <MobileNav page={page} onChange={setPage} isAdmin={isAdmin} />
      {toast && <div className={`toast ${toast.type}`}>{toast.msg}</div>}
      {showSaveIndicator && <div className="save-indicator">✓ Salvo automaticamente</div>}
    </div>
  );
}

function MataMataPage({ store, user, updateKnockout }) {
  const [activePhase, setActivePhase] = useState('R32');
  const [viewMode, setViewMode] = useState('visual');
  const [editingMatchId, setEditingMatchId] = useState(null);
  const isAdmin = user.isAdmin;

  const allKO = useMemo(
    () => resolveAllKnockout(user.predictions, user.knockout || {}),
    [user.predictions, user.knockout]
  );

  const phaseStats = useMemo(() => {
    const out = {};
    KO_PHASE_ORDER.forEach(phase => {
      const matches = allKO[phase] || [];
      const total = matches.length;
      const filled = matches.filter(m => m.winnerTeam).length;
      out[phase] = { total, filled, ready: matches.filter(m => m.teamA && m.teamB).length };
    });
    return out;
  }, [allKO]);

  const finalMatch = allKO.F?.[0];
  const champion = finalMatch?.winnerTeam || '';
  const vice = finalMatch && finalMatch.winnerTeam
    ? (finalMatch.winnerTeam === finalMatch.teamA ? finalMatch.teamB : finalMatch.teamA)
    : '';

  const tpMatch = allKO.TP?.[0];
  const third = tpMatch?.winnerTeam || '';
  const fourth = tpMatch && tpMatch.winnerTeam
    ? (tpMatch.winnerTeam === tpMatch.teamA ? tpMatch.teamB : tpMatch.teamA)
    : '';

  const findMatchById = (id) => {
    for (const phase of KO_PHASE_ORDER) {
      const m = (allKO[phase] || []).find(mm => mm.id === id);
      if (m) return { ...m, phase };
    }
    return null;
  };
  const editingMatch = editingMatchId ? findMatchById(editingMatchId) : null;

  const allMatchesFlat = useMemo(() => {
    const flat = [];
    KO_PHASE_ORDER.forEach(phase => {
      (allKO[phase] || []).forEach(m => flat.push({ ...m, phase }));
    });
    return flat;
  }, [allKO]);
  const currentIdx = editingMatchId ? allMatchesFlat.findIndex(m => m.id === editingMatchId) : -1;
  const prevMatch = currentIdx > 0 ? allMatchesFlat[currentIdx - 1] : null;
  const nextMatch = currentIdx >= 0 && currentIdx < allMatchesFlat.length - 1 ? allMatchesFlat[currentIdx + 1] : null;

  const groupsComplete = FIXTURES.every(f => {
    const p = user.predictions?.[f.id];
    return p && p.home !== '' && p.away !== '';
  });

  return (
    <div>
      <div className="page-header">
        <div className="page-eyebrow">Mata-Mata</div>
        <h1 className="page-title">Chaveamento Eliminatório</h1>
        <p className="page-sub">
          Preencha os placares de cada fase. <strong style={{color: 'var(--gold)'}}>Os vencedores avançam automaticamente</strong> para a próxima fase.
          Em caso de empate, escolha quem passa nos pênaltis.
        </p>
      </div>

      {!groupsComplete && (
        <div className="deadline-banner" style={{ background: 'rgba(0,240,255,0.06)', borderColor: 'rgba(0,240,255,0.3)' }}>
          <div className="deadline-icon">💡</div>
          <div className="deadline-text">
            <div className="deadline-title">Dica: preencha primeiro toda a fase de grupos</div>
            <div className="deadline-sub">Os classificados aparecem aqui automaticamente conforme você define os grupos.</div>
          </div>
        </div>
      )}

      <div className="bracket-toggle">
        <button
          className={`bracket-toggle-btn ${viewMode === 'visual' ? 'active' : ''}`}
          onClick={() => setViewMode('visual')}
        >
          🏆 Chaveamento
        </button>
        <button
          className={`bracket-toggle-btn ${viewMode === 'list' ? 'active' : ''}`}
          onClick={() => setViewMode('list')}
        >
          📋 Por Fase
        </button>
      </div>

      {viewMode === 'visual' && (
        <>
          <div className="trophy-display">
            <div className="trophy-label">Seu palpite</div>
            <div className="trophy-icon">🏆</div>
            {champion ? (
              <>
                <div className="trophy-flag">{FLAGS[champion] || '🏳️'}</div>
                <div className="trophy-name">{champion}</div>
                <div style={{ fontSize: 11, color: 'var(--text-dim)', letterSpacing: 2, marginTop: 6 }}>CAMPEÃO DA COPA 2026</div>
              </>
            ) : (
              <div className="trophy-pending" style={{ fontSize: 14, marginTop: 12 }}>
                Defina sua final para revelar o campeão
              </div>
            )}
          </div>

          <BracketVisual allKO={allKO} onMatchClick={setEditingMatchId} />
          <SurvivalPreviewCard allKO={allKO} store={store} />

          {(champion || vice || third || fourth) && (
            <>
              <div className="section-title">📊 Resumo dos Palpites</div>
              <div className="stats-grid">
                <div className="stat-card">
                  <div className="stat-label">🥇 Campeão</div>
                  <div className="stat-value" style={{ fontSize: 22 }}>
                    {champion ? `${FLAGS[champion] || ''} ${champion}` : '—'}
                  </div>
                </div>
                <div className="stat-card">
                  <div className="stat-label">🥈 Vice</div>
                  <div className="stat-value" style={{ fontSize: 22 }}>
                    {vice ? `${FLAGS[vice] || ''} ${vice}` : '—'}
                  </div>
                </div>
                <div className="stat-card">
                  <div className="stat-label">🥉 Terceiro</div>
                  <div className="stat-value" style={{ fontSize: 22 }}>
                    {third ? `${FLAGS[third] || ''} ${third}` : '—'}
                  </div>
                </div>
                <div className="stat-card">
                  <div className="stat-label">4º colocado</div>
                  <div className="stat-value" style={{ fontSize: 22 }}>
                    {fourth ? `${FLAGS[fourth] || ''} ${fourth}` : '—'}
                  </div>
                </div>
              </div>
            </>
          )}
        </>
      )}

      {viewMode === 'list' && (
        <>
          <div className="ko-phases-nav">
            {KO_PHASE_ORDER.map(phase => {
              const info = KO_PHASE_INFO[phase];
              const stats = phaseStats[phase];
              const done = stats.filled === stats.total && stats.total > 0;
              return (
                <button
                  key={phase}
                  className={`ko-phase-btn ${activePhase === phase ? 'active' : ''} ${done ? 'done' : ''}`}
                  onClick={() => setActivePhase(phase)}
                >
                  <span>{info.icon} {info.shortLabel}</span>
                  <span className="badge-mini">{stats.filled}/{stats.total}</span>
                </button>
              );
            })}
          </div>

          <KoPhaseSection
            phase={activePhase}
            matches={allKO[activePhase] || []}
            updateKnockout={updateKnockout}
            isAdmin={isAdmin}
          />
        </>
      )}

      {editingMatch && (
        <BracketEditModal
          match={editingMatch}
          updateKnockout={updateKnockout}
          isAdmin={isAdmin}
          onClose={() => setEditingMatchId(null)}
          onPrev={prevMatch ? () => setEditingMatchId(prevMatch.id) : null}
          onNext={nextMatch ? () => setEditingMatchId(nextMatch.id) : null}
        />
      )}
    </div>
  );
}

// =====================================================================
// BRACKET MATCH
// =====================================================================
function BracketMatch({ match, onClick }) {
  const ready = match.teamA && match.teamB;
  const isComplete = !!match.winnerTeam;
  const a = parseInt(match.scoreA);
  const b = parseInt(match.scoreB);
  const isDraw = !isNaN(a) && !isNaN(b) && a === b && match.penaltyWinner;

  return (
    <div
      className={`bk-match ${isComplete ? 'complete' : ''} ${!ready ? 'pending' : ''}`}
      onClick={() => ready && onClick && onClick(match.id)}
      title={ready ? 'Clique para editar' : 'Aguardando definição dos times'}
    >
      <div className="bk-match-id">{match.id}</div>
      <div className={`bk-team ${match.winnerTeam === match.teamA ? 'winner' : ''}`}>
        <span className="flag-mini">{match.teamA ? FLAGS[match.teamA] || '🏳️' : '⏳'}</span>
        <span className={`nm ${!match.teamA ? 'pending' : ''}`}>
          {match.teamA || 'Aguardando...'}
        </span>
        <span className={`sc ${match.scoreA === '' || match.scoreA === undefined || match.scoreA === null ? 'empty' : ''}`}>
          {match.scoreA !== '' && match.scoreA !== undefined && match.scoreA !== null ? match.scoreA : '—'}
        </span>
      </div>
      <div className={`bk-team ${match.winnerTeam === match.teamB ? 'winner' : ''}`}>
        <span className="flag-mini">{match.teamB ? FLAGS[match.teamB] || '🏳️' : '⏳'}</span>
        <span className={`nm ${!match.teamB ? 'pending' : ''}`}>
          {match.teamB || 'Aguardando...'}
        </span>
        <span className={`sc ${match.scoreB === '' || match.scoreB === undefined || match.scoreB === null ? 'empty' : ''}`}>
          {match.scoreB !== '' && match.scoreB !== undefined && match.scoreB !== null ? match.scoreB : '—'}
        </span>
      </div>
      {isDraw && (
        <div className="bk-pen-indicator" style={{ position: 'static', marginTop: 4, padding: 0 }}>
          🥅 Pênaltis: {match.penaltyWinner === 'A' ? match.teamA : match.teamB}
        </div>
      )}
    </div>
  );
}

// =====================================================================
// BRACKET EDIT MODAL
// =====================================================================
function BracketEditModal({ match, updateKnockout, isAdmin, onClose, onPrev, onNext }) {
  const dt = fmtDateBR(match.date);
  const locked = !isAdmin && (Date.now() >= DEADLINE);
  const phaseInfo = KO_PHASE_INFO[match.phase] || { label: 'Jogo', icon: '⚽', points: 0 };

  const a = parseInt(match.scoreA);
  const b = parseInt(match.scoreB);
  const hasScores = !isNaN(a) && !isNaN(b);
  const isDraw = hasScores && a === b;

  useEffect(() => {
    const handler = (e) => {
      if (e.key === 'Escape') onClose();
      else if (e.key === 'ArrowLeft' && onPrev) onPrev();
      else if (e.key === 'ArrowRight' && onNext) onNext();
    };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, [onClose, onPrev, onNext]);

  return (
    <div className="bk-edit-overlay" onClick={onClose}>
      <div className="bk-edit-modal" onClick={(e) => e.stopPropagation()}>
        <button className="bk-edit-close" onClick={onClose} title="Fechar (ESC)">×</button>

        <div className="bk-edit-eyebrow">{phaseInfo.icon} {phaseInfo.label} • {phaseInfo.points} pts</div>
        <div className="bk-edit-title">{match.id}</div>
        <div className="bk-edit-date">{dt.weekday} {dt.day} • {dt.time}</div>

        <div className="bk-edit-versus">
          <div className="bk-edit-team">
            <span className="flag-big">{FLAGS[match.teamA] || '🏳️'}</span>
            <span className={`nm-big ${match.winnerTeam === match.teamA ? 'winner-text' : ''}`}>{match.teamA}</span>
            <input
              type="number"
              min="0" max="20"
              className="bk-edit-score"
              value={match.scoreA ?? ''}
              onChange={(e) => updateKnockout(match.id, 'scoreA', e.target.value)}
              disabled={locked}
              placeholder="0"
              autoFocus
              style={{ color: '#f4d35e', WebkitTextFillColor: '#f4d35e', backgroundColor: 'rgba(0,0,0,0.5)' }}
            />
          </div>
          <div className="bk-edit-vs">×</div>
          <div className="bk-edit-team">
            <span className="flag-big">{FLAGS[match.teamB] || '🏳️'}</span>
            <span className={`nm-big ${match.winnerTeam === match.teamB ? 'winner-text' : ''}`}>{match.teamB}</span>
            <input
              type="number"
              min="0" max="20"
              className="bk-edit-score"
              value={match.scoreB ?? ''}
              onChange={(e) => updateKnockout(match.id, 'scoreB', e.target.value)}
              disabled={locked}
              placeholder="0"
              style={{ color: '#f4d35e', WebkitTextFillColor: '#f4d35e', backgroundColor: 'rgba(0,0,0,0.5)' }}
            />
          </div>
        </div>

        {isDraw && (
          <div className="ko-penalty-section">
            <div className="ko-penalty-label">
              ⚠️ Jogo empatado — como foi decidido?
            </div>
            <div className="ko-tiebreak-mode">
              <button
                className={(match.tiebreakMode || 'penalty') === 'extratime' ? 'active' : ''}
                onClick={() => updateKnockout(match.id, 'tiebreakMode', 'extratime')}
                disabled={locked}
              >
                ⏱️ Prorrogação
              </button>
              <button
                className={(match.tiebreakMode || 'penalty') === 'penalty' ? 'active' : ''}
                onClick={() => updateKnockout(match.id, 'tiebreakMode', 'penalty')}
                disabled={locked}
              >
                🥅 Pênaltis
              </button>
            </div>
            <div className="ko-penalty-label" style={{ fontSize: 10, marginTop: 4 }}>
              Quem avançou?
            </div>
            <div className="ko-penalty-buttons">
              <button
                className={`ko-penalty-btn ${match.penaltyWinner === 'A' ? 'selected' : ''}`}
                onClick={() => updateKnockout(match.id, 'penaltyWinner', 'A')}
                disabled={locked}
              >
                <span>{FLAGS[match.teamA]}</span>
                <span>{match.teamA}</span>
              </button>
              <button
                className={`ko-penalty-btn ${match.penaltyWinner === 'B' ? 'selected' : ''}`}
                onClick={() => updateKnockout(match.id, 'penaltyWinner', 'B')}
                disabled={locked}
              >
                <span>{FLAGS[match.teamB]}</span>
                <span>{match.teamB}</span>
              </button>
            </div>
          </div>
        )}

        {match.winnerTeam && (
          <div style={{ textAlign: 'center', marginTop: 16 }}>
            <div className="ko-winner-tag">
              <span>✓ Avança:</span>
              <span>{FLAGS[match.winnerTeam]}</span>
              <strong>{match.winnerTeam}</strong>
              {isDraw && (
                <span style={{ fontSize: 9, opacity: 0.7, marginLeft: 4 }}>
                  ({(match.tiebreakMode || 'penalty') === 'extratime' ? 'PRORROG.' : 'PÊNALTIS'})
                </span>
              )}
            </div>
          </div>
        )}

        <div className="bk-edit-nav">
          <button onClick={onPrev} disabled={!onPrev}>← Anterior</button>
          <button onClick={onClose}>Fechar</button>
          <button onClick={onNext} disabled={!onNext}>Próximo →</button>
        </div>
      </div>
    </div>
  );
}

// =====================================================================
// SURVIVAL PREVIEW
// =====================================================================
function SurvivalPreviewCard({ allKO, store }) {
  const userSurvivors = useMemo(() => getSurvivorsByPhase(allKO), [allKO]);

  const realAllKO = useMemo(() => {
    if (!store?.results) return null;
    const hasOfficial = store.results.knockout && Object.keys(store.results.knockout).some(k => {
      const m = store.results.knockout[k];
      return m && (m.scoreA !== '' && m.scoreA !== undefined && m.scoreA !== null);
    });
    if (!hasOfficial) return null;
    return resolveAllKnockout(
      store.results.matches ? Object.fromEntries(Object.entries(store.results.matches).map(([k,v])=>[k,{home:v.home,away:v.away}])) : {},
      store.results.knockout || {}
    );
  }, [store?.results]);

  const realSurvivors = realAllKO ? getSurvivorsByPhase(realAllKO) : null;

  const phases = [
    { key: 'R16', label: 'Oitavas', icon: '🛡️', target: 16, pts: 1 },
    { key: 'QF',  label: 'Quartas', icon: '🔥', target: 8,  pts: 2 },
    { key: 'SF',  label: 'Semis',   icon: '⚡', target: 4,  pts: 3 },
    { key: 'F',   label: 'Final',   icon: '🏆', target: 2,  pts: 5 },
  ];

  return (
    <>
      <div className="section-title">🎯 Bônus por Sobrevivência</div>
      <div className="rule-card" style={{ background: 'rgba(168,85,247,0.05)', borderColor: 'rgba(168,85,247,0.25)', marginBottom: 16 }}>
        <p style={{ fontSize: 12, color: 'var(--text-dim)', lineHeight: 1.6, marginBottom: 14 }}>
          Mesmo que você erre a chave, ganha pontos por cada time do seu palpite que <strong style={{color: 'var(--purple)'}}>realmente chegar</strong> a cada fase. Recompensa o feeling! 🧠
        </p>

        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(220px, 1fr))', gap: 10 }}>
          {phases.map(p => {
            const myTeams = [...userSurvivors[p.key]];
            const realTeams = realSurvivors ? [...realSurvivors[p.key]] : null;
            const matched = realTeams ? myTeams.filter(t => realSurvivors[p.key].has(t)) : [];
            return (
              <div key={p.key} style={{
                background: 'rgba(0,0,0,0.3)',
                border: '1px solid rgba(168,85,247,0.2)',
                borderRadius: 10,
                padding: 12,
              }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 8 }}>
                  <div style={{ fontSize: 12, fontWeight: 700, letterSpacing: 1, textTransform: 'uppercase', color: 'var(--purple)' }}>
                    {p.icon} {p.label}
                  </div>
                  <div style={{ fontFamily: 'Space Mono', fontSize: 10, color: 'var(--text-muted)' }}>
                    +{p.pts} pt/time
                  </div>
                </div>
                <div style={{ fontSize: 11, color: 'var(--text-dim)', marginBottom: 8 }}>
                  {realTeams ? (
                    <>Acertos: <strong style={{color: 'var(--gold-bright)'}}>{matched.length}/{myTeams.length}</strong> = <strong style={{color: 'var(--gold-bright)'}}>+{matched.length * p.pts} pts</strong></>
                  ) : (
                    <>Seu palpite: <strong>{myTeams.length}/{p.target}</strong> times</>
                  )}
                </div>
                <div style={{ display: 'flex', flexWrap: 'wrap', gap: 4 }}>
                  {myTeams.length === 0 ? (
                    <span style={{ fontSize: 11, color: 'var(--text-muted)', fontStyle: 'italic' }}>Aguardando palpites...</span>
                  ) : (
                    myTeams.map(t => {
                      const isMatched = realSurvivors && realSurvivors[p.key].has(t);
                      return (
                        <span key={t} style={{
                          fontSize: 10,
                          padding: '3px 8px',
                          borderRadius: 100,
                          background: realSurvivors ? (isMatched ? 'rgba(0,214,138,0.15)' : 'rgba(255,77,109,0.1)') : 'rgba(255,255,255,0.06)',
                          color: realSurvivors ? (isMatched ? 'var(--green)' : 'var(--red)') : 'var(--text)',
                          border: `1px solid ${realSurvivors ? (isMatched ? 'rgba(0,214,138,0.3)' : 'rgba(255,77,109,0.2)') : 'rgba(255,255,255,0.1)'}`,
                          whiteSpace: 'nowrap',
                        }}>
                          {FLAGS[t]} {t}
                        </span>
                      );
                    })
                  )}
                </div>
              </div>
            );
          })}
        </div>

        {realSurvivors && (
          <div style={{
            marginTop: 14, padding: 12,
            background: 'linear-gradient(90deg, rgba(168,85,247,0.15), rgba(212,175,55,0.1))',
            borderRadius: 10,
            textAlign: 'center',
          }}>
            <span style={{ fontSize: 12, color: 'var(--text-dim)' }}>BÔNUS TOTAL POR SOBREVIVÊNCIA: </span>
            <strong style={{ fontSize: 18, color: 'var(--gold-bright)', fontFamily: 'Bebas Neue', letterSpacing: 1 }}>
              +{phases.reduce((acc, p) => {
                const myTeams = [...userSurvivors[p.key]];
                const matched = myTeams.filter(t => realSurvivors[p.key].has(t));
                return acc + matched.length * p.pts;
              }, 0)} PTS
            </strong>
          </div>
        )}
      </div>
    </>
  );
}

  const info = KO_PHASE_INFO[phase];
  const totalMax = info.points + (info.winnerBonus || 0) + (info.exactBonus || 0);

  return (
    <div>
      <div className="ko-progress">
        <div style={{ fontSize: 20 }}>{info.icon}</div>
        <div className="ko-progress-text">
          <strong>{info.label}</strong> • {matches.length} {matches.length === 1 ? 'jogo' : 'jogos'}
          <div style={{ fontSize: 11, marginTop: 4, color: 'var(--text-muted)' }}>
            Confronto: <strong style={{color: 'var(--gold)'}}>{info.points}</strong> pts &nbsp;•&nbsp;
            + Vencedor: <strong style={{color: 'var(--gold)'}}>{info.winnerBonus}</strong> pts &nbsp;•&nbsp;
            + Placar exato: <strong style={{color: 'var(--gold)'}}>{info.exactBonus}</strong> pts &nbsp;•&nbsp;
            <strong style={{color: 'var(--gold-bright)'}}>até {totalMax} pts/jogo</strong>

      </div>

      <div className="ko-grid">

  );
}

function KoMatchCard({ match, updateKnockout, isAdmin }) {
  const dt = fmtDateBR(match.date);
  const locked = !isAdmin && (Date.now() >= DEADLINE);
  const isReady = match.teamA && match.teamB;
  const hasScores = match.scoreA !== '' && match.scoreB !== '';
  const a = parseInt(match.scoreA);
  const b = parseInt(match.scoreB);
  const isDraw = hasScores && !isNaN(a) && !isNaN(b) && a === b;
  const isComplete = !!match.winnerTeam;

  return (
    <div className={`ko-match ${isComplete ? 'complete' : ''} ${locked ? 'locked' : ''}`}>
      <div className="ko-match-header">
        <span className="ko-match-id">{match.id}</span>
        <span>{dt.weekday} {dt.day} • {dt.time}</span>
      </div>

      {!isReady && (
        <div style={{ padding: '20px 10px', textAlign: 'center', color: 'var(--text-muted)', fontSize: 12, fontStyle: 'italic' }}>
          Aguardando definição dos times
        </div>
      )}

      {isReady && (
        <>
          <div className="ko-match-row">
            <div className="ko-team-flag">{FLAGS[match.teamA] || '🏳️'}</div>
            <div className={`ko-team-name ${match.winnerTeam === match.teamA ? 'winner' : ''}`}>
              {match.teamA}
            </div>
            <input
              type="number"
              min="0"
              max="20"
              className="ko-score-input"
              value={match.scoreA ?? ''}
              onChange={(e) => updateKnockout(match.id, 'scoreA', e.target.value)}
              disabled={locked}
              placeholder="—"
              style={{ color: '#f4d35e', WebkitTextFillColor: '#f4d35e', backgroundColor: 'rgba(0,0,0,0.5)' }}
            />
          </div>

          <div className="ko-match-row">
            <div className="ko-team-flag">{FLAGS[match.teamB] || '🏳️'}</div>
            <div className={`ko-team-name ${match.winnerTeam === match.teamB ? 'winner' : ''}`}>
              {match.teamB}
            </div>
            <input
              type="number"
              min="0"
              max="20"
              className="ko-score-input"
              value={match.scoreB ?? ''}
              onChange={(e) => updateKnockout(match.id, 'scoreB', e.target.value)}
              disabled={locked}
              placeholder="—"
              style={{ color: '#f4d35e', WebkitTextFillColor: '#f4d35e', backgroundColor: 'rgba(0,0,0,0.5)' }}
            />
          </div>

          {isDraw && (
            <div className="ko-penalty-section">
              <div className="ko-penalty-label">
                ⚠️ Jogo empatado — como foi decidido?
              </div>
              <div className="ko-tiebreak-mode">
                <button
                  className={(match.tiebreakMode || 'penalty') === 'extratime' ? 'active' : ''}
                  onClick={() => updateKnockout(match.id, 'tiebreakMode', 'extratime')}
                  disabled={locked}
                >
                  ⏱️ Prorrogação
                </button>
                <button
                  className={(match.tiebreakMode || 'penalty') === 'penalty' ? 'active' : ''}
                  onClick={() => updateKnockout(match.id, 'tiebreakMode', 'penalty')}
                  disabled={locked}
                >
                  🥅 Pênaltis
                </button>
              </div>
              <div className="ko-penalty-label" style={{ fontSize: 10, marginTop: 4 }}>
                Quem avançou?
              </div>
              <div className="ko-penalty-buttons">
                <button
                  className={`ko-penalty-btn ${match.penaltyWinner === 'A' ? 'selected' : ''}`}
                  onClick={() => updateKnockout(match.id, 'penaltyWinner', 'A')}
                  disabled={locked}
                >
                  <span>{FLAGS[match.teamA]}</span>
                  <span>{match.teamA}</span>
                </button>
                <button
                  className={`ko-penalty-btn ${match.penaltyWinner === 'B' ? 'selected' : ''}`}
                  onClick={() => updateKnockout(match.id, 'penaltyWinner', 'B')}

                  <span>{FLAGS[match.teamB]}</span>
                  <span>{match.teamB}</span>

              </div>
            </div>
          )}

          {match.winnerTeam && (
            <div className="ko-winner-tag">
              <span>✓ Avança:</span>
              <span>{FLAGS[match.winnerTeam]}</span>
              <strong>{match.winnerTeam}</strong>
              {isDraw && (
                <span style={{ fontSize: 9, opacity: 0.7, marginLeft: 4 }}>
                  ({(match.tiebreakMode || 'penalty') === 'extratime' ? 'PRORROG.' : 'PÊNALTIS'})
                </span>
              )}
            </div>
          )}
        </>
      )}
    </div>
  );
}

function RankingPage({ store }) {
  const ranking = useMemo(() => {
    const participants = Object.values(store.users).filter(u => !u.isAdmin);
    const withPoints = participants.map(u => {
      const { points, stats } = computeUserPoints(u, store.results);
      return { ...u, points, stats };
    });
    withPoints.sort((a, b) => {
      if (b.points !== a.points) return b.points - a.points;
      if (b.stats.exact !== a.stats.exact) return b.stats.exact - a.stats.exact;
      const champA = a.extras?.champion === store.results.champion ? 1 : 0;
      const champB = b.extras?.champion === store.results.champion ? 1 : 0;
      if (champB !== champA) return champB - champA;
      return a.name.localeCompare(b.name);
    });
    return withPoints;
  }, [store]);

  const leader = ranking[0];
  const totalParticipants = ranking.length;
  const mostExact = ranking.length > 0 ? ranking.reduce((a, b) => (a.stats.exact > b.stats.exact ? a : b)) : null;

          <div className="stat-value">{totalParticipants}</div>
          <div className="stat-meta">cadastrados</div>
        </div>
        <div className="stat-card">
          <div className="stat-label">⚽ Jogos finalizados</div>
          <div className="stat-value">{Object.values(store.results.matches).filter(m => m.home !== '' && m.away !== '').length}</div>

            <div>Participante</div>
            <div style={{ textAlign: 'right' }}>Pontos</div>

            <div className="ranking-stat-label" style={{ textAlign: 'center' }}>🎯 Sobrev.</div>
          </div>
          {ranking.map((u, idx) => (
            <div key={u.username} className={`ranking-row ${idx === 0 ? 'gold' : idx === 1 ? 'silver' : idx === 2 ? 'bronze' : ''}`}>
