function CompararPage({ store }) {
  const [fase, setFase] = useState('grupos');
  const [grupoFiltro, setGrupoFiltro] = useState('Todos');
  const [faseKO, setFaseKO] = useState('R32');

  const participants = useMemo(() =>
    Object.values(store.users).filter(u => !u.isAdmin),
    [store.users]
  );

  // ---- helpers de resultado ----
  function getGroupMatchResult(matchId) {
    const r = store.results?.matches?.[matchId];
    if (!r || r.home === '' || r.home === undefined || r.away === '' || r.away === undefined) return null;
    return { home: Number(r.home), away: Number(r.away) };
  }

  function getKOMatchResult(matchId) {
    const r = store.results?.knockout?.[matchId];
    if (!r || !r.home || !r.away) return null;
    return { homeTeam: r.homeTeam || '', awayTeam: r.awayTeam || '', home: Number(r.homeScore ?? r.home), away: Number(r.awayScore ?? r.away) };
  }

  function classifyPrediction(pred, result) {
    // result: { home, away }
    if (!pred || pred.home === '' || pred.home === undefined || pred.away === '' || pred.away === undefined) return 'sem-palpite';
    const pH = Number(pred.home), pA = Number(pred.away);
    const rH = result.home, rA = result.away;
    if (pH === rH && pA === rA) return 'exato';
    const rWinner = rH > rA ? 'H' : rA > rH ? 'A' : 'E';
    const pWinner = pH > pA ? 'H' : pA > pH ? 'A' : 'E';
    if (rWinner === pWinner) return 'vencedor';
    return 'errou';
  }

  function classifyKOPrediction(pred, result) {
    if (!pred || !pred.home || !pred.away) return 'sem-palpite';
    const pH = Number(pred.homeScore ?? pred.home), pA = Number(pred.awayScore ?? pred.away);
    const rH = result.home, rA = result.away;
    if (pH === rH && pA === rA) return 'exato';
    const rWinner = rH > rA ? 'H' : rA > rH ? 'A' : 'E';
    const pWinner = pH > pA ? 'H' : pA > pH ? 'A' : 'E';
    if (rWinner === pWinner) return 'vencedor';
    return 'errou';
  }

  const classColors = {
    exato:      { bg: 'rgba(0,214,138,0.12)', border: '#00d68a', text: '#00d68a' },
    vencedor:   { bg: 'rgba(212,175,55,0.12)', border: '#d4af37', text: '#d4af37' },
    errou:      { bg: 'rgba(255,77,109,0.12)', border: '#ff4d6d', text: '#ff4d6d' },
    'sem-palpite': { bg: 'transparent', border: 'rgba(255,255,255,0.08)', text: '#5b6478' },
  };

  function getTopPreds(preds) {
    const count = {};
    preds.forEach(p => {
      if (!p || p.home === '' || p.home === undefined) return;
      const key = `${p.home}×${p.away}`;
      count[key] = (count[key] || 0) + 1;
    });
    return Object.entries(count)
      .sort((a, b) => b[1] - a[1])
      .slice(0, 3)
      .map(([k, v]) => ({ score: k.replace('×', ' x '), qty: v }));
  }

  // ---- renderização de um card de jogo (grupos) ----
  function GroupMatchCard({ fixture }) {
    const result = getGroupMatchResult(fixture.id);
    const preds = participants.map(u => {
      const p = u.predictions?.[fixture.id];
      return { user: u, pred: p };
    });

    const stats = result ? (() => {
      let exato = 0, vencedor = 0, errou = 0, sem = 0;
      preds.forEach(({ pred }) => {
        const c = classifyPrediction(pred, result);
        if (c === 'exato') exato++;
        else if (c === 'vencedor') vencedor++;
        else if (c === 'errou') errou++;
        else sem++;
      });
      return { exato, vencedor, errou, sem };
    })() : null;

    const rawPreds = preds.map(({ pred }) => pred);
    const topPreds = !result ? getTopPreds(rawPreds) : [];

    return (
      <div style={{ background: 'var(--bg-2)', border: '1px solid var(--line-strong)', borderRadius: 14, padding: 18, marginBottom: 16 }}>
        {/* Header do card */}
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: result || !result ? 12 : 0 }}>
          <div style={{ fontWeight: 700, fontSize: 15, color: 'var(--text)' }}>
            {FLAGS[fixture.home] || ''} {fixture.home} <span style={{ color: 'var(--text-muted)' }}>×</span> {FLAGS[fixture.away] || ''} {fixture.away}
          </div>
          {result && (
            <div style={{ background: 'rgba(0,240,255,0.1)', border: '1px solid var(--neon-dim)', borderRadius: 8, padding: '4px 12px', fontSize: 13, color: 'var(--neon)', fontWeight: 700, whiteSpace: 'nowrap' }}>
              OFICIAL: {result.home} × {result.away}
            </div>
          )}
        </div>

        {/* Estatísticas (só se tiver resultado) */}
        {result && stats && (
          <div style={{ display: 'flex', gap: 10, marginBottom: 14, flexWrap: 'wrap' }}>
            {stats.exato > 0 && <span style={{ fontSize: 13, color: '#00d68a' }}>✅ {stats.exato} placar{stats.exato > 1 ? 'es' : ''} exato{stats.exato > 1 ? 's' : ''}</span>}
            {stats.vencedor > 0 && <span style={{ fontSize: 13, color: '#d4af37' }}>🟡 {stats.vencedor} acertou vencedor</span>}
            {stats.errou > 0 && <span style={{ fontSize: 13, color: '#ff4d6d' }}>❌ {stats.errou} errou</span>}
            {stats.sem > 0 && <span style={{ fontSize: 13, color: '#5b6478' }}>— {stats.sem} sem palpite</span>}
          </div>
        )}

        {/* Tendências (só se não tiver resultado) */}
        {!result && topPreds.length > 0 && (
          <div style={{ marginBottom: 12, padding: '8px 12px', background: 'var(--bg-1)', borderRadius: 8, border: '1px solid var(--line)' }}>
            <div style={{ fontSize: 12, color: 'var(--text-muted)', marginBottom: 6, fontWeight: 600 }}>📊 Mais previstos:</div>
            <div style={{ display: 'flex', gap: 10, flexWrap: 'wrap' }}>
              {topPreds.map((t, i) => (
                <span key={i} style={{ fontSize: 13, color: 'var(--gold)', fontWeight: 600 }}>{t.score} <span style={{ color: 'var(--text-muted)', fontWeight: 400 }}>({t.qty}×)</span></span>
              ))}
            </div>
          </div>
        )}

        {/* Lista de palpites — 2 colunas */}
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 6 }}>
          {preds.map(({ user, pred }) => {
            const cls = result ? classifyPrediction(pred, result) : (pred && pred.home !== '' && pred.home !== undefined ? 'futuro' : 'sem-palpite');
            const colors = result ? classColors[cls] : { bg: 'rgba(255,255,255,0.03)', border: 'var(--line)', text: 'var(--text)' };
            const placar = (pred && pred.home !== '' && pred.home !== undefined) ? `${pred.home}×${pred.away}` : '—';

            return (
              <div key={user.username} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '6px 10px', borderRadius: 8, background: colors.bg, border: `1px solid ${colors.border}`, gap: 6 }}>
                <span style={{ fontSize: 12, color: 'var(--text-dim)', fontWeight: 500, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap', minWidth: 0 }}>{user.username}</span>
                <span style={{ fontSize: 13, fontWeight: 700, color: colors.text, whiteSpace: 'nowrap', flexShrink: 0 }}>{placar}</span>
              </div>
            );
          })}
        </div>
      </div>
    );
  }

  // ---- renderização de um card KO ----
  function KOMatchCard({ match, phase }) {
    const result = getKOMatchResult(match.id);
    const preds = participants.map(u => {
      const p = u.knockout?.[match.id];
      return { user: u, pred: p };
    });

    const homeLabel = result ? result.homeTeam : match.a;
    const awayLabel = result ? result.awayTeam : match.b;

    const stats = result ? (() => {
      let exato = 0, vencedor = 0, errou = 0, sem = 0;
      preds.forEach(({ pred }) => {
        const c = classifyKOPrediction(pred, result);
        if (c === 'exato') exato++;
        else if (c === 'vencedor') vencedor++;
        else if (c === 'errou') errou++;
        else sem++;
      });
      return { exato, vencedor, errou, sem };
    })() : null;

    const rawPreds = preds.map(({ pred }) => pred ? { home: pred.homeScore ?? pred.home, away: pred.awayScore ?? pred.away } : undefined);
    const topPreds = !result ? getTopPreds(rawPreds.filter(Boolean)) : [];

    const phaseInfo = KO_PHASE_INFO[phase];

    return (
      <div style={{ background: 'var(--bg-2)', border: '1px solid var(--line-strong)', borderRadius: 14, padding: 18, marginBottom: 16 }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 12, flexWrap: 'wrap', gap: 8 }}>
          <div style={{ fontWeight: 700, fontSize: 15, color: 'var(--text)' }}>
            {homeLabel} <span style={{ color: 'var(--text-muted)' }}>×</span> {awayLabel}
          </div>
          {result && (
            <div style={{ background: 'rgba(0,240,255,0.1)', border: '1px solid var(--neon-dim)', borderRadius: 8, padding: '4px 12px', fontSize: 13, color: 'var(--neon)', fontWeight: 700 }}>
              OFICIAL: {result.home} × {result.away}
            </div>
          )}
          {!result && (
            <div style={{ fontSize: 12, color: 'var(--text-muted)', background: 'var(--bg-1)', borderRadius: 6, padding: '3px 10px' }}>
              Aguardando
            </div>
          )}
        </div>

        {result && stats && (
          <div style={{ display: 'flex', gap: 10, marginBottom: 14, flexWrap: 'wrap' }}>
            {stats.exato > 0 && <span style={{ fontSize: 13, color: '#00d68a' }}>✅ {stats.exato} placar{stats.exato > 1 ? 'es' : ''} exato{stats.exato > 1 ? 's' : ''}</span>}
            {stats.vencedor > 0 && <span style={{ fontSize: 13, color: '#d4af37' }}>🟡 {stats.vencedor} acertou vencedor</span>}
            {stats.errou > 0 && <span style={{ fontSize: 13, color: '#ff4d6d' }}>❌ {stats.errou} errou</span>}
            {stats.sem > 0 && <span style={{ fontSize: 13, color: '#5b6478' }}>— {stats.sem} sem palpite</span>}
          </div>
        )}

        {!result && topPreds.length > 0 && (

            <div style={{ fontSize: 12, color: 'var(--text-muted)', marginBottom: 6, fontWeight: 600 }}>📊 Mais previstos:</div>
            <div style={{ display: 'flex', gap: 10, flexWrap: 'wrap' }}>
              {topPreds.map((t, i) => (
                <span key={i} style={{ fontSize: 13, color: 'var(--gold)', fontWeight: 600 }}>{t.score} <span style={{ color: 'var(--text-muted)', fontWeight: 400 }}>({t.qty}×)</span></span>
              ))}
            </div>
          </div>
        )}

        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 6 }}>
          {preds.map(({ user, pred }) => {
            const cls = result ? classifyKOPrediction(pred, result) : ((pred && pred.home) ? 'futuro' : 'sem-palpite');
            const colors = result ? classColors[cls] : { bg: 'rgba(255,255,255,0.03)', border: 'var(--line)', text: 'var(--text)' };
            const hS = pred?.homeScore ?? pred?.home;
            const aS = pred?.awayScore ?? pred?.away;
            const hasScore = hS !== undefined && hS !== '' && aS !== undefined && aS !== '';
            const placar = hasScore ? `${hS}×${aS}` : '—';

            return (
              <div key={user.username} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '6px 10px', borderRadius: 8, background: colors.bg, border: `1px solid ${colors.border}`, gap: 6 }}>
                <span style={{ fontSize: 12, color: 'var(--text-dim)', fontWeight: 500, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap', minWidth: 0 }}>{user.username}</span>
                <span style={{ fontSize: 13, fontWeight: 700, color: colors.text, whiteSpace: 'nowrap', flexShrink: 0 }}>{placar}</span>
              </div>
            );
          })}
        </div>
      </div>
    );
  }

  // ---- fixtures filtrados ----
  const fixturesFiltrados = useMemo(() => {
    if (grupoFiltro === 'Todos') return FIXTURES;
    return FIXTURES.filter(f => f.group === grupoFiltro);
  }, [grupoFiltro]);

  const koMatches = useMemo(() => KO_STRUCTURE[faseKO] || [], [faseKO]);

  const gruposBtns = ['Todos', ...Object.keys(GROUPS).sort()];

    { id: 'R32', label: '16-avos' },

    { id: 'QF',  label: 'Quartas' },

  return (
    <div>
      <div className="page-header">
        <div className="page-eyebrow">Transparência</div>
        <h1 className="page-title">Comparar Palpites</h1>
        <p className="page-sub">Veja os palpites de todos os participantes em cada jogo.</p>

function AdminPage({ store, updateOfficialResult, updateOfficialExtra, updateOfficialKnockout, deleteUser, showToast, syncWithEspn, espnSyncing, espnLastSync }) {
  const [section, setSection] = useState('participantes');

  const participants = Object.values(store.users).filter(u => !u.isAdmin);

  const officialStandings = useMemo(() => {
    const std = {};
    Object.keys(GROUPS).forEach(g => {
      std[g] = calcStandings(store.results.matches, g).map(r => r.team);
    });
    return std;
  }, [store.results.matches]);

  const exportRanking = () => {
    const ranking = participants.map(u => {
      const { points, stats } = computeUserPoints(u, store.results);
      return { name: u.name, username: u.username, whatsapp: u.whatsapp || '', points, exact: stats.exact, winner: stats.winner };
    }).sort((a, b) => b.points - a.points);
    const csv = ['Pos,Nome,Usuário,WhatsApp,Pontos,Exatos,Vencedor', ...ranking.map((r, i) =>
      `${i+1},"${r.name}",${r.username},${r.whatsapp},${r.points},${r.exact},${r.winner}`)].join('\n');
    const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `bolao-fifa-2026-ranking-${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
    showToast('Ranking exportado');

              <input className="pick-input" value={store.results.topScorer || ''}
                onChange={(e) => updateOfficialExtra('topScorer', e.target.value)}
                placeholder="Nome oficial" />
            </div>
          </div>
        </div>
      )}

      {section === 'exportar' && (
        <div className="admin-section">
          <h3>Exportar Dados</h3>
          <p style={{ color: 'var(--text-dim)', fontSize: 13, marginBottom: 16 }}>
            Baixe arquivos CSV com as informações do bolão (abre no Excel/Google Sheets).
          </p>
          <div style={{ display: 'flex', gap: 12, flexWrap: 'wrap' }}>
            <button className="btn-primary" style={{ width: 'auto' }} onClick={exportRanking}>📊 Exportar Ranking</button>
            <button className="btn-secondary" onClick={exportAllPredictions}>📋 Exportar Todos os Palpites</button>
          </div>

          <div style={{ marginTop: 30, padding: 14, background: 'rgba(0,0,0,0.3)', borderRadius: 10, border: '1px solid var(--line)' }}>
            <h4 style={{ fontFamily: 'Bebas Neue', fontSize: 16, color: 'var(--gold)', marginBottom: 8 }}>☁️ DADOS SINCRONIZADOS</h4>
            <p style={{ fontSize: 12, color: 'var(--text-dim)', marginBottom: 10 }}>
              Seus dados estão salvos com segurança no banco de dados online (Supabase). Todos os usuários e palpites ficam sincronizados em tempo real entre todos os dispositivos.
            </p>
            <button className="btn-secondary" onClick={() => {
              const blob = new Blob([JSON.stringify(store, null, 2)], { type: 'application/json' });
              const url = URL.createObjectURL(blob);
              const a = document.createElement('a');
              a.href = url; a.download = `bolao-backup-${new Date().toISOString().slice(0,10)}.json`;
              a.click();
              showToast('Backup exportado');
            }}>💾 Baixar Backup JSON (todos os dados)</button>
          </div>
        </div>
      )}
    </div>
  );
}

// =====================================================================
// ADMIN KNOCKOUT SECTION
// =====================================================================
function AdminKnockoutSection({ store, updateOfficialKnockout }) {
  const [activePhase, setActivePhase] = useState('R32');
  const [viewMode, setViewMode] = useState('visual');
  const [editingMatchId, setEditingMatchId] = useState(null);

  const allKO = useMemo(() => {
    return resolveAllKnockout(store.results.matches || {}, store.results.knockout || {});
  }, [store.results.matches, store.results.knockout]);

  const phaseStats = useMemo(() => {
    const out = {};
    KO_PHASE_ORDER.forEach(phase => {
      const matches = allKO[phase] || [];
      out[phase] = {
        total: matches.length,
        filled: matches.filter(m => m.winnerTeam).length,
      };
    });
    return out;
  }, [allKO]);

  const findMatchById = (id) => {
    for (const phase of KO_PHASE_ORDER) {
      const m = (allKO[phase] || []).find(mm => mm.id === id);
      if (m) return { ...m, phase };
    }
    return null;
  };
  const editingMatch = editingMatchId ? findMatchById(editingMatchId) : null;

  const allMatchesFlat = useMemo(() => {
    const flat = [];
    KO_PHASE_ORDER.forEach(phase => {
      (allKO[phase] || []).forEach(m => flat.push({ ...m, phase }));
    });
    return flat;
  }, [allKO]);
  const currentIdx = editingMatchId ? allMatchesFlat.findIndex(m => m.id === editingMatchId) : -1;
  const prevMatch = currentIdx > 0 ? allMatchesFlat[currentIdx - 1] : null;
  const nextMatch = currentIdx >= 0 && currentIdx < allMatchesFlat.length - 1 ? allMatchesFlat[currentIdx + 1] : null;

  return (
    <div className="admin-section">
      <h3>Resultados Oficiais — Mata-Mata</h3>
      <p style={{ color: 'var(--text-dim)', fontSize: 13, marginBottom: 16 }}>
        Lance aqui os placares oficiais dos jogos eliminatórios. Em caso de empate, escolha quem avança nos pênaltis. Os vencedores aparecem automaticamente na próxima fase.
      </p>

      <div className="bracket-toggle">
        <button
          className={`bracket-toggle-btn ${viewMode === 'visual' ? 'active' : ''}`}
          onClick={() => setViewMode('visual')}
        >
          🏆 Chaveamento
        </button>
        <button
          className={`bracket-toggle-btn ${viewMode === 'list' ? 'active' : ''}`}
          onClick={() => setViewMode('list')}
        >
          📋 Por Fase
        </button>
      </div>

      {viewMode === 'visual' && (
        <BracketVisual allKO={allKO} onMatchClick={setEditingMatchId} />
      )}

      {viewMode === 'list' && (
        <>
          <div className="ko-phases-nav">
            {KO_PHASE_ORDER.map(phase => {
              const info = KO_PHASE_INFO[phase];
              const stats = phaseStats[phase];
              const done = stats.filled === stats.total && stats.total > 0;
              return (
                <button
                  key={phase}
                  className={`ko-phase-btn ${activePhase === phase ? 'active' : ''} ${done ? 'done' : ''}`}
                  onClick={() => setActivePhase(phase)}
                >
                  <span>{info.icon} {info.shortLabel}</span>
                  <span className="badge-mini">{stats.filled}/{stats.total}</span>
                </button>
              );
            })}
          </div>

          <KoPhaseSection
            phase={activePhase}
            matches={allKO[activePhase] || []}
            updateKnockout={updateOfficialKnockout}
            isAdmin={true}
          />
        </>
      )}

      {editingMatch && (
        <BracketEditModal
          match={editingMatch}
          updateKnockout={updateOfficialKnockout}
          isAdmin={true}
          onClose={() => setEditingMatchId(null)}
          onPrev={prevMatch ? () => setEditingMatchId(prevMatch.id) : null}
          onNext={nextMatch ? () => setEditingMatchId(nextMatch.id) : null}
        />
      )}
    </div>
  );
}

// =====================================================================
// RENDER
// =====================================================================
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
